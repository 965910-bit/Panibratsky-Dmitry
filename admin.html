<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аналитический центр | Панибратский</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* (стили те же, что в предыдущей версии) */
        /* ... */
    </style>
</head>
<body>
    <div class="container">
        <!-- ... шапка и вкладки ... -->
        <div id="sessions" class="tab-content">
            <div class="table-card">
                <h3><i class="fas fa-users"></i> Список сессий</h3>
                <table id="sessionsTable">
                    <thead>
                        <tr>
                            <th>Дата начала</th>
                            <th>Источник</th>
                            <th>Устройство</th>
                            <th>Размер экрана</th>
                            <th>Язык</th>
                            <th>Страна</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
        <!-- ... остальные вкладки ... -->
    </div>

    <script>
        function getData(key) { return JSON.parse(localStorage.getItem(key) || '[]'); }
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }

        // ... остальные функции (renderOverview и т.д.) ...

        function renderSessions() {
            const sessions = getData('sessions');
            const tbody = document.querySelector('#sessionsTable tbody');
            tbody.innerHTML = sessions.slice().reverse().map(s => {
                // Определяем дату: если есть startTime, используем её, иначе пробуем timestamp (если есть)
                let dateStr = '—';
                if (s.startTime) dateStr = new Date(s.startTime).toLocaleString();
                else if (s.timestamp) dateStr = new Date(s.timestamp).toLocaleString();
                return `
                    <tr>
                        <td>${dateStr}</td>
                        <td>${escapeHtml(s.referrer)}</td>
                        <td>${escapeHtml(s.userAgent?.split(' ')[0] || '')}</td>
                        <td>${s.screenSize || ''}</td>
                        <td>${s.language || ''}</td>
                        <td>${s.country || '—'}</td>
                    </tr>
                `;
            }).join('');
        }

        // ... остальной код ...

        window.addEventListener('load', () => {
            initDateFilters();
            lastMessageCount = getData('messages').length;
            refreshAll();
        });
    </script>
</body>
</html>
