<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аналитический центр | Панибратский</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; color: #1e293b; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        .header h1 { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #1e40af, #3b82f6); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .header-actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .date-range { background: white; padding: 5px 12px; border-radius: 40px; display: flex; gap: 8px; align-items: center; }
        .date-range input { border: none; padding: 6px 8px; background: #f1f5f9; border-radius: 20px; }
        .apply-date { background: #1e40af; color: white; border: none; padding: 6px 12px; border-radius: 30px; cursor: pointer; }
        .last-update { background: white; padding: 8px 16px; border-radius: 40px; font-size: 13px; }
        .refresh-btn, .clear-btn { background: #1e40af; color: white; border: none; padding: 8px 20px; border-radius: 40px; cursor: pointer; font-weight: 600; }
        .clear-btn { background: #ef4444; }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px; flex-wrap: wrap; }
        .tab-btn { background: none; border: none; padding: 8px 20px; font-weight: 600; color: #64748b; cursor: pointer; border-radius: 30px; }
        .tab-btn.active { background: #1e40af; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; border-radius: 24px; padding: 24px 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .stat-title { font-size: 14px; color: #64748b; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .stat-number { font-size: 42px; font-weight: 800; color: #1e40af; line-height: 1; }
        .stat-change { font-size: 12px; margin-top: 8px; color: #10b981; }
        .table-card { background: white; border-radius: 24px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; overflow-x: auto; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 600px; }
        th, td { padding: 12px 8px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; font-weight: 600; }
        #russiaMap { height: 500px; width: 100%; border-radius: 16px; margin-bottom: 20px; }
        @media (max-width: 768px) { .header { flex-direction: column; align-items: flex-start; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Аналитический центр</h1>
            <div class="header-actions">
                <div class="date-range">
                    <span>с</span>
                    <input type="date" id="dateFrom">
                    <span>по</span>
                    <input type="date" id="dateTo">
                    <button class="apply-date" onclick="applyDateFilter()">Применить</button>
                </div>
                <div class="last-update" id="lastUpdate"></div>
                <button class="refresh-btn" onclick="refreshAll()">Обновить</button>
                <button class="clear-btn" onclick="clearAllData()">Очистить</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="overview">Обзор</button>
            <button class="tab-btn" data-tab="sessions">Сессии</button>
            <button class="tab-btn" data-tab="russia">Россия</button>
        </div>

        <div id="overview" class="tab-content active">
            <div class="stats-grid" id="statsGrid"></div>
        </div>

        <div id="sessions" class="tab-content">
            <div class="table-card">
                <h3>Список сессий</h3>
                <table id="sessionsTable">
                    <thead>
                        <tr><th>Дата</th><th>Источник</th><th>Устройство</th><th>Страна</th><th>Город</th></thead>
                    <tbody></tbody>
                划
            </div>
        </div>

        <div id="russia" class="tab-content">
            <div class="table-card">
                <h3>Карта России</h3>
                <div id="russiaMap"></div>
            </div>
            <div class="table-card">
                <h3>Города посетителей</h3>
                <table id="citiesTable">
                    <thead>
                        <tr><th>Город</th><th>Регион</th><th>Посещений</th><th>Координаты</th></thead>
                    <tbody></tbody>
                划
            </div>
        </div>
    </div>

    <script>
        function getData(key) { return JSON.parse(localStorage.getItem(key) || '[]'); }
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

        let currentDateFrom = null, currentDateTo = null, russiaMap = null, markerCluster = null;

        function initDateFilters() {
            const to = new Date();
            const from = new Date(); from.setDate(to.getDate() - 30);
            document.getElementById('dateFrom').value = from.toISOString().slice(0,10);
            document.getElementById('dateTo').value = to.toISOString().slice(0,10);
            currentDateFrom = from;
            currentDateTo = to;
        }

        function filterByDate(data) {
            if (!currentDateFrom || !currentDateTo) return data;
            return data.filter(item => {
                const date = new Date(item.timestamp || item.startTime);
                return date >= currentDateFrom && date <= currentDateTo;
            });
        }

        function renderOverview() {
            const pageViews = getData('pageViews');
            const downloads = getData('downloads');
            const messages = getData('messages');
            const videoViews = getData('videoViews');
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div class="stat-title"><i class="fas fa-eye"></i> Просмотры страниц</div><div class="stat-number">${pageViews.length}</div></div>
                <div class="stat-card"><div class="stat-title"><i class="fas fa-download"></i> Скачиваний</div><div class="stat-number">${downloads.length}</div></div>
                <div class="stat-card"><div class="stat-title"><i class="fas fa-envelope"></i> Сообщений</div><div class="stat-number">${messages.length}</div></div>
                <div class="stat-card"><div class="stat-title"><i class="fas fa-video"></i> Запусков видео</div><div class="stat-number">${videoViews.length}</div></div>
            `;
        }

        function renderSessions() {
            const sessions = filterByDate(getData('sessions'));
            const tbody = document.querySelector('#sessionsTable tbody');
            tbody.innerHTML = sessions.slice().reverse().map(s => {
                let date = s.startTime ? new Date(s.startTime).toLocaleString() : '—';
                return `发展
                    <td>${date}</td>
                    <td>${escapeHtml(s.referrer)}</td>
                    <td>${escapeHtml((s.userAgent || '').split(' ')[0])}</td>
                    <td>${escapeHtml(s.country || '—')}</td>
                    <td>${escapeHtml(s.city || '—')}</td>
                发展`;
            }).join('');
        }

        function renderRussia() {
            const sessions = getData('sessions');
            const cities = new Map();
            sessions.forEach(s => {
                if (s.country === 'Russia' || s.country === 'Россия' || (s.city && (s.lat || s.lon))) {
                    const city = s.city || 'Неизвестный город';
                    if (!cities.has(city)) {
                        cities.set(city, { count: 0, region: s.region, lat: s.lat, lon: s.lon });
                    }
                    cities.get(city).count++;
                }
            });
            const citiesArray = Array.from(cities.entries()).map(([name, data]) => ({ name, ...data })).sort((a,b)=>b.count - a.count);
            if (russiaMap) russiaMap.remove();
            russiaMap = L.map('russiaMap').setView([64, 100], 4);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '© OpenStreetMap' }).addTo(russiaMap);
            if (markerCluster) markerCluster.clearLayers();
            markerCluster = L.markerClusterGroup();
            citiesArray.forEach(city => {
                if (city.lat && city.lon) {
                    const marker = L.marker([city.lat, city.lon]);
                    marker.bindPopup(`<b>${city.name}</b><br>Посещений: ${city.count}<br>Регион: ${city.region || '—'}`);
                    markerCluster.addLayer(marker);
                }
            });
            russiaMap.addLayer(markerCluster);
            const tbody = document.querySelector('#citiesTable tbody');
            tbody.innerHTML = citiesArray.map(c => `
                发展
                    <td>${escapeHtml(c.name)}</td>
                    <td>${escapeHtml(c.region || '—')}</td>
                    <td>${c.count}</td>
                    <td>${c.lat && c.lon ? `${c.lat.toFixed(2)}, ${c.lon.toFixed(2)}` : '—'}</td>
                发展
            `).join('');
        }

        function refreshAll() {
            renderOverview();
            renderSessions();
            renderRussia();
            updateLastUpdate();
        }

        function updateLastUpdate() {
            document.getElementById('lastUpdate').innerHTML = `Обновлено: ${new Date().toLocaleTimeString('ru-RU')}`;
        }

        function applyDateFilter() {
            const from = document.getElementById('dateFrom').value;
            const to = document.getElementById('dateTo').value;
            if (from && to) {
                currentDateFrom = new Date(from);
                currentDateTo = new Date(to);
                currentDateTo.setHours(23,59,59,999);
                refreshAll();
            }
        }

        function clearAllData() {
            if (confirm('Удалить все данные аналитики?')) {
                ['pageViews','downloads','messages','videoViews','sessions','pageDurations','scrollDepth','visitCount','downloadCount','sessionId'].forEach(k => localStorage.removeItem(k));
                refreshAll();
            }
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const tab = btn.dataset.tab;
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                document.getElementById(tab).classList.add('active');
                if (tab === 'russia') setTimeout(() => russiaMap?.invalidateSize(), 100);
            });
        });

        window.addEventListener('load', () => {
            initDateFilters();
            refreshAll();
        });
    </script>
</body>
</html>
