<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет – аналитика</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            padding: 40px;
            color: #0f172a;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #475569;
            margin-bottom: 40px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 30px 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            text-align: center;
        }
        .stat-number {
            font-size: 44px;
            font-weight: 700;
            color: #1e40af;
            margin-bottom: 10px;
        }
        .stat-label {
            color: #64748b;
            font-size: 14px;
        }
        .chart-container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            margin-bottom: 40px;
        }
        canvas {
            max-height: 400px;
        }
        table {
            width: 100%;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border-collapse: collapse;
            margin-bottom: 40px;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            background: #f8fafc;
            font-weight: 600;
            color: #1e293b;
        }
        tr:hover {
            background: #f1f5f9;
        }
        .badge {
            background: #d4af37;
            color: #0f172a;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 12px;
        }
        .logout {
            float: right;
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .logout:hover {
            background: #c0392b;
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="logout" onclick="logout()">Выйти</button>
        <h1>Личный кабинет</h1>
        <div class="subtitle">Статистика посещений, просмотров видео, скачиваний и запросов</div>

        <div class="stats-grid" id="statsGrid"></div>

        <div class="chart-container">
            <h3>Посещения по дням (последние 14 дней)</h3>
            <canvas id="viewsChart"></canvas>
        </div>

        <h3>Запросы материалов</h3>
        <table id="requestsTable">
            <thead>
                <tr><th>Дата</th><th>Имя</th><th>Email</th><th>Компания</th><th>Статус</th></tr>
            </thead>
            <tbody></tbody>
        </table>

        <h3>Сообщения из формы обратной связи</h3>
        <table id="messagesTable">
            <thead>
                <tr><th>Дата</th><th>Имя</th><th>Email</th><th>Сообщение</th></tr>
            </thead>
            <tbody></tbody>
        </table>

        <h3>Недавние скачивания</h3>
        <table id="downloadsTable">
            <thead>
                <tr><th>Дата</th><th>Файл</th><th>Сессия</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDgr8mgQxBTTTGvmf70VkuEiELcNdiAR9U",
            authDomain: "my-portfolio-analytics-d36ff.firebaseapp.com",
            projectId: "my-portfolio-analytics-d36ff",
            storageBucket: "my-portfolio-analytics-d36ff.firebasestorage.app",
            messagingSenderId: "321281212756",
            appId: "1:321281212756:web:87a10f3e5f352fcdf608c1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        auth.onAuthStateChanged(user => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                loadData();
            }
        });

        function logout() {
            auth.signOut().then(() => {
                window.location.href = 'login.html';
            });
        }

        async function loadData() {
            try {
                // Получаем данные из коллекций
                const [pageViewsSnap, videoViewsSnap, downloadsSnap, requestsSnap, messagesSnap] = await Promise.all([
                    db.collection('pageViews').orderBy('timestamp', 'desc').get(),
                    db.collection('videoViews').get(),
                    db.collection('downloads').orderBy('timestamp', 'desc').limit(50).get(),
                    db.collection('requests').orderBy('timestamp', 'desc').limit(50).get(),
                    db.collection('messages').orderBy('timestamp', 'desc').limit(20).get()
                ]);

                const pageViews = pageViewsSnap.docs.map(d => d.data());
                const videoViews = videoViewsSnap.docs.length;
                const downloads = downloadsSnap.docs.map(d => d.data());
                const requests = requestsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                const messages = messagesSnap.docs.map(d => ({ id: d.id, ...d.data() }));

                // Общая статистика
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card"><div class="stat-number">${pageViews.length}</div><div class="stat-label">Просмотров страниц</div></div>
                    <div class="stat-card"><div class="stat-number">${videoViews}</div><div class="stat-label">Запусков видео</div></div>
                    <div class="stat-card"><div class="stat-number">${downloads.length}</div><div class="stat-label">Скачиваний</div></div>
                    <div class="stat-card"><div class="stat-number">${requests.length}</div><div class="stat-label">Запросов материалов</div></div>
                    <div class="stat-card"><div class="stat-number">${messages.length}</div><div class="stat-label">Сообщений</div></div>
                `;

                // График посещений по дням (последние 14 дней)
                const last14Days = [...Array(14)].map((_, i) => {
                    const d = new Date();
                    d.setDate(d.getDate() - i);
                    return d.toISOString().split('T')[0];
                }).reverse();

                const counts = last14Days.map(day => {
                    return pageViews.filter(p => p.timestamp && p.timestamp.toDate().toISOString().split('T')[0] === day).length;
                });

                const ctx = document.getElementById('viewsChart').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: last14Days.map(d => d.slice(5)), // месяц-день
                        datasets: [{
                            label: 'Просмотры',
                            data: counts,
                            backgroundColor: '#1e40af',
                            borderRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { display: false }
                        }
                    }
                });

                // Таблица запросов материалов
                const requestsTbody = document.querySelector('#requestsTable tbody');
                requestsTbody.innerHTML = requests.map(req => `
                    <tr>
                        <td>${req.timestamp ? req.timestamp.toDate().toLocaleString() : '—'}</td>
                        <td>${req.name || '—'}</td>
                        <td>${req.email || '—'}</td>
                        <td>${req.company || '—'}</td>
                        <td><span class="badge">${req.status || 'new'}</span></td>
                    </tr>
                `).join('');

                // Таблица сообщений
                const messagesTbody = document.querySelector('#messagesTable tbody');
                messagesTbody.innerHTML = messages.map(msg => `
                    <tr>
                        <td>${msg.timestamp ? msg.timestamp.toDate().toLocaleString() : '—'}</td>
                        <td>${msg.name || '—'}</td>
                        <td>${msg.email || '—'}</td>
                        <td>${msg.message || '—'}</td>
                    </tr>
                `).join('');

                // Таблица скачиваний
                const downloadsTbody = document.querySelector('#downloadsTable tbody');
                downloadsTbody.innerHTML = downloads.map(d => `
                    <tr>
                        <td>${d.timestamp ? d.timestamp.toDate().toLocaleString() : '—'}</td>
                        <td><span class="badge">${d.fileName || '—'}</span></td>
                        <td style="font-size:12px;">${d.sessionId || ''}</td>
                    </tr>
                `).join('');

            } catch (error) {
                console.error('Ошибка загрузки данных:', error);
            }
        }
    </script>
</body>
</html>
