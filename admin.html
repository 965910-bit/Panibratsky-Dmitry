<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панибратский | Аналитический центр</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            color: #1e293b;
            padding: 30px 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Шапка */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .last-update {
            background: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 13px;
            color: #475569;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .refresh-btn {
            background: #1e40af;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .refresh-btn:hover {
            background: #0f172a;
            transform: translateY(-2px);
        }
        .clear-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .clear-btn:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        /* Карточки статистики */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 24px;
            padding: 24px 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }
        .stat-title {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .stat-number {
            font-size: 42px;
            font-weight: 800;
            color: #1e40af;
            line-height: 1;
        }

        /* Графики */
        .charts-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        .chart-card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .chart-card h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chart-container {
            position: relative;
            height: 300px;
        }

        /* Таблицы */
        .tables-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        .table-card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            overflow-x: auto;
        }
        .table-card h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            font-weight: 600;
            color: #475569;
            background: #f8fafc;
        }
        tr:hover {
            background: #f8fafc;
        }
        .badge {
            background: #d4af37;
            color: #0f172a;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .charts-section, .tables-section {
                grid-template-columns: 1fr;
            }
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            .header-actions {
                width: 100%;
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i class="fas fa-chart-line"></i>
                Аналитический центр
                <span style="font-size: 12px; background: #e2e8f0; padding: 4px 12px; border-radius: 30px;">локальная версия</span>
            </h1>
            <div class="header-actions">
                <div class="last-update" id="lastUpdate">
                    <i class="fas fa-clock"></i> Обновлено: --:--:--
                </div>
                <button class="refresh-btn" onclick="refreshAll()">
                    <i class="fas fa-sync-alt"></i> Обновить
                </button>
                <button class="clear-btn" onclick="clearAllData()">
                    <i class="fas fa-trash-alt"></i> Очистить
                </button>
            </div>
        </div>

        <div class="stats-grid" id="statsGrid"></div>

        <div class="charts-section">
            <div class="chart-card">
                <h3><i class="fas fa-calendar-week" style="color:#1e40af;"></i> Посещения по дням (последние 14 дней)</h3>
                <div class="chart-container">
                    <canvas id="viewsChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h3><i class="fas fa-chart-bar" style="color:#3b82f6;"></i> Популярность страниц</h3>
                <div class="chart-container">
                    <canvas id="pagesChart"></canvas>
                </div>
            </div>
        </div>

        <div class="tables-section">
            <div class="table-card">
                <h3><i class="fas fa-envelope" style="color:#ef4444;"></i> Последние сообщения</h3>
                <table id="messagesTable">
                    <thead>
                        <tr>
                            <th>Дата</th>
                            <th>Имя</th>
                            <th>Email</th>
                            <th>Сообщение</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
            <div class="table-card">
                <h3><i class="fas fa-download" style="color:#f59e0b;"></i> Недавние скачивания</h3>
                <table id="downloadsTable">
                    <thead>
                        <tr>
                            <th>Дата</th>
                            <th>Файл</th>
                            <th>Сессия</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div class="tables-section">
            <div class="table-card">
                <h3><i class="fas fa-video" style="color:#10b981;"></i> Запуски видео</h3>
                <table id="videoTable">
                    <thead>
                        <tr>
                            <th>Дата</th>
                            <th>Видео</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
            <div class="table-card">
                <h3><i class="fas fa-users" style="color:#06b6d4;"></i> Активные сессии</h3>
                <table id="sessionsTable">
                    <thead>
                        <tr>
                            <th>Сессия</th>
                            <th>Действий</th>
                            <th>Последняя активность</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Функции работы с localStorage
        function getData(key) {
            return JSON.parse(localStorage.getItem(key) || '[]');
        }

        function clearAllData() {
            if (confirm('Удалить все данные аналитики? Это действие необратимо.')) {
                localStorage.removeItem('pageViews');
                localStorage.removeItem('downloads');
                localStorage.removeItem('messages');
                localStorage.removeItem('videoViews');
                localStorage.removeItem('visitCount');
                localStorage.removeItem('downloadCount');
                localStorage.removeItem('sessionId');
                refreshAll();
            }
        }

        // Рендер статистики
        let viewsChart, pagesChart;

        function renderStats() {
            const pageViews = getData('pageViews');
            const downloads = getData('downloads');
            const messages = getData('messages');
            const videoViews = getData('videoViews');

            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div class="stat-title"><i class="fas fa-eye"></i> Просмотры страниц</div><div class="stat-number">${pageViews.length}</div></div>
                <div class="stat-card"><div class="stat-title"><i class="fas fa-download"></i> Скачиваний</div><div class="stat-number">${downloads.length}</div></div>
                <div class="stat-card"><div class="stat-title"><i class="fas fa-envelope"></i> Сообщений</div><div class="stat-number">${messages.length}</div></div>
                <div class="stat-card"><div class="stat-title"><i class="fas fa-video"></i> Запусков видео</div><div class="stat-number">${videoViews.length}</div></div>
            `;

            // График посещений по дням (последние 14 дней)
            const last14Days = [...Array(14)].map((_, i) => {
                const d = new Date();
                d.setDate(d.getDate() - i);
                return d.toISOString().split('T')[0];
            }).reverse();
            const counts = last14Days.map(day => {
                return pageViews.filter(p => p.timestamp && p.timestamp.slice(0,10) === day).length;
            });

            const ctx = document.getElementById('viewsChart').getContext('2d');
            if (viewsChart) viewsChart.destroy();
            viewsChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: last14Days.map(d => d.slice(5)),
                    datasets: [{ label: 'Просмотры', data: counts, backgroundColor: '#1e40af', borderRadius: 8 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            // Популярность страниц
            const pageCounts = {};
            pageViews.forEach(v => {
                const page = v.page || 'unknown';
                pageCounts[page] = (pageCounts[page] || 0) + 1;
            });
            const sortedPages = Object.entries(pageCounts).sort((a,b)=>b[1]-a[1]).slice(0,8);
            const ctx2 = document.getElementById('pagesChart').getContext('2d');
            if (pagesChart) pagesChart.destroy();
            pagesChart = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: sortedPages.map(p => p[0].split('/').pop() || p[0]),
                    datasets: [{ label: 'Просмотры', data: sortedPages.map(p => p[1]), backgroundColor: '#3b82f6', borderRadius: 8 }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        // Таблицы
        function renderTables() {
            const messages = getData('messages');
            const downloads = getData('downloads');
            const videoViews = getData('videoViews');
            const pageViews = getData('pageViews');

            // Сообщения
            const messagesTbody = document.querySelector('#messagesTable tbody');
            messagesTbody.innerHTML = messages.slice(-20).reverse().map(m => `
                <tr>
                    <td>${new Date(m.timestamp).toLocaleString()}</td>
                    <td>${escapeHtml(m.name || '')}</td>
                    <td>${escapeHtml(m.email || '')}</td>
                    <td style="max-width:250px; overflow:hidden; text-overflow:ellipsis;">${escapeHtml(m.message || '')}</td>
                </tr>
            `).join('');

            // Скачивания
            const downloadsTbody = document.querySelector('#downloadsTable tbody');
            downloadsTbody.innerHTML = downloads.slice(-20).reverse().map(d => `
                <tr>
                    <td>${new Date(d.timestamp).toLocaleString()}</td>
                    <td><span class="badge">${escapeHtml(d.fileName || '')}</span></td>
                    <td><small>${d.sessionId?.slice(-8) || '—'}</small></td>
                </tr>
            `).join('');

            // Видео
            const videoTbody = document.querySelector('#videoTable tbody');
            videoTbody.innerHTML = videoViews.slice(-20).reverse().map(v => `
                <tr>
                    <td>${new Date(v.timestamp).toLocaleString()}</td>
                    <td>${escapeHtml(v.videoName || '')}</td>
                </tr>
            `).join('');

            // Активные сессии
            const sessions = {};
            pageViews.forEach(v => {
                if (v.sessionId) {
                    if (!sessions[v.sessionId]) sessions[v.sessionId] = { count: 0, last: v.timestamp };
                    sessions[v.sessionId].count++;
                    if (v.timestamp && (!sessions[v.sessionId].last || v.timestamp > sessions[v.sessionId].last)) {
                        sessions[v.sessionId].last = v.timestamp;
                    }
                }
            });
            const sortedSessions = Object.entries(sessions).sort((a,b) => b[1].count - a[1].count).slice(0, 10);
            const sessionsTbody = document.querySelector('#sessionsTable tbody');
            sessionsTbody.innerHTML = sortedSessions.map(([id, data]) => `
                <tr>
                    <td><small>${id.slice(-12)}</small></td>
                    <td><strong>${data.count}</strong></td>
                    <td>${data.last ? new Date(data.last).toLocaleString() : '—'}</td>
                </tr>
            `).join('');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function updateLastUpdate() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.querySelector('#lastUpdate').innerHTML = `<i class="fas fa-clock"></i> Обновлено: ${timeString}`;
        }

        function refreshAll() {
            renderStats();
            renderTables();
            updateLastUpdate();
        }

        window.addEventListener('load', () => {
            refreshAll();
        });
    </script>
</body>
</html>
