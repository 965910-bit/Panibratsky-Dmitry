<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сотрудничество | Дмитрий Панибратский</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            color: #0f172a;
            padding: 40px 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #64748b;
            margin-bottom: 24px;
        }
        label {
            font-weight: 600;
            display: block;
            margin: 16px 0 8px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
        }
        button {
            background: #1e40af;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 24px;
            width: 100%;
        }
        button:hover {
            background: #0f172a;
        }
        .status {
            margin-top: 16px;
            font-size: 14px;
            text-align: center;
        }
        .success { color: #10b981; }
        .error { color: #dc2626; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📩 Сотрудничество и партнёрство</h1>
        <p class="subtitle">Оставьте заявку, и мы свяжемся с вами в ближайшее время</p>
        <form id="leadForm">
            <label for="name">Имя *</label>
            <input type="text" id="name" required>

            <label for="email">Email *</label>
            <input type="email" id="email" required>

            <label for="phone">Телефон</label>
            <input type="tel" id="phone">

            <label for="type">Тип заявки *</label>
            <select id="type" required>
                <option value="Сотрудничество">Сотрудничество (коммерческое)</option>
                <option value="Партнёрство">Партнёрство (интеграция)</option>
                <option value="Вакансия">Вакансия / HR</option>
                <option value="Другое">Другое</option>
            </select>

            <label for="message">Сообщение *</label>
            <textarea id="message" rows="4" required></textarea>

            <button type="submit">Отправить заявку</button>
            <div id="status" class="status"></div>
        </form>
    </div>

    <script>
        const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbzYy1VSd7mK-l90BJ7Rb2I3D6EGqz3dQPtwi6Tjb7ERDsGMictAwCPP_QgJs1vaT1NI/exec';

        document.getElementById('leadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const type = document.getElementById('type').value;
            const message = document.getElementById('message').value.trim();

            if (!name || !email || !message) {
                showStatus('Заполните обязательные поля', 'error');
                return;
            }

            const data = {
                type: 'lead',
                name,
                email,
                phone,
                requestType: type,
                message,
                timestamp: new Date().toISOString(),
                status: 'новый'
            };

            try {
                await fetch(BACKEND_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                showStatus('✅ Заявка отправлена. Мы свяжемся с вами!', 'success');
                document.getElementById('leadForm').reset();
            } catch (err) {
                console.error(err);
                showStatus('❌ Ошибка отправки. Попробуйте позже.', 'error');
            }
        });

        function showStatus(msg, type) {
            const div = document.getElementById('status');
            div.innerHTML = msg;
            div.className = `status ${type}`;
            setTimeout(() => { div.innerHTML = ''; }, 5000);
        }
    </script>
</body>
</html>
