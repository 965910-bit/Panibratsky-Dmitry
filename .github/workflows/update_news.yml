name: Update News

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'data/manual_news.json'

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests
      - name: Generate news pages from manual_news.json
        run: python scripts/generate_news_pages.py
      - name: Run fetch script (RSS)
        run: python scripts/fetch_news.py
      - name: Run hh.ru analytics
        run: python scripts/hh_analytics.py
      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/news.json data/manual_news.json news/ data/hh_analytics.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Обновление новостей и аналитики" && git push)
