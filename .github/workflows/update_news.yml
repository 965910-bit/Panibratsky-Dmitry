name: Update News

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'data/manual_news.json'

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4

      - name: Run fetch script (RSS + Sitemap)
        run: python scripts/fetch_news.py

      - name: Set up Node.js for Telegram publisher
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node.js dependencies
        run: npm install

      - name: Send new news to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/telegram-news.js

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/news.json data/sent_news.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Обновление новостей и отправка в Telegram" && git push)
