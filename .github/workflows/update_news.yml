name: Update News

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          pip install requests beautifulsoup4 feedparser python-dateutil

      - name: Google Alerts (if email configured)
        run: |
          python -c "from collectors.google_alerts import GoogleAlertsCollector; c = GoogleAlertsCollector('$GMAIL_USER', '$GMAIL_PASSWORD'); alerts = c.fetch(); import json; open('data/google_alerts.json','w').write(json.dumps(alerts, ensure_ascii=False))"
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        continue-on-error: true

      - name: Fetch news (RSS + sitemap + Google Alerts)
        run: python scripts/fetch_news.py

      - name: Collect government news (optional)
        run: python -c "from collectors.gov_ru import GovRuCollector; c = GovRuCollector(); data = c.fetch(); import json; open('data/gov_news.json','w').write(json.dumps(data, ensure_ascii=False))" || true
        continue-on-error: true

      - name: Collect ATI stats (optional)
        run: python -c "from collectors.ati_stats import ATIStatsCollector; c = ATIStatsCollector(); data = c.fetch_indexes(); import json; open('data/ati_stats.json','w').write(json.dumps(data, ensure_ascii=False))" || true
        continue-on-error: true

      - name: Generate sitemap
        run: python scripts/generate_sitemap.py

      - name: Generate RSS feed
        run: python scripts/generate_rss.py

      - name: Save daily snapshot
        run: |
          mkdir -p data/news-history
          cp data/news.json data/news-history/$(date +'%Y-%m-%d').json

      - name: Update metadata in trends.html
        run: python scripts/update_metadata.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ trends.html sitemap.xml rss.xml
          git diff --quiet && git diff --staged --quiet || (git commit -m "Обновление новостей, sitemap, RSS, метатегов" && git push)
