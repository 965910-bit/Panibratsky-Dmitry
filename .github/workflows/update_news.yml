name: Update News

on:
  schedule:
    # Запуск каждый день в 00:00, 06:00, 12:00, 18:00 (UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch:   # позволяет запустить вручную на вкладке Actions

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # разрешаем запись в репозиторий (чтобы закоммитить news.json)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run fetch script
        run: python scripts/fetch_news.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/news.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Обновление новостей" && git push)
