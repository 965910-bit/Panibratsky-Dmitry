name: Replace Surname

on:
  workflow_dispatch:

jobs:
  replace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run replacement script
        run: |
          curl -O https://raw.githubusercontent.com/965910-bit/Panibratsky-Dmitry/main/rename_surname.py
          python3 rename_surname.py
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "Replace surname"
          git push
