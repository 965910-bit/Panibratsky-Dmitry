                "Процент брака в поставках (менее 1% – хорошо, более 5% – плохо)?",
                "Наличие сертификатов качества (ISO 9001, IATF 16949 и др.)?",
                "Возвраты и рекламации за последние 12 месяцев (нет возвратов – хорошо, более 10 – плохо)?",
                "Соблюдение сроков поставки (95%+ – хорошо, менее 80% – плохо)?",
                "Полнота поставки (отсутствие недопоставок)?",
                "Условия доставки (инкотермс, возможность отсрочки, минимальная партия)?",
                "Скорость ответа на запрос (в течение 24 часов – хорошо, более 72 – плохо)?",
                "Готовность предоставлять отсрочку платежа?",
                "Ведение электронного документооборота?",
                "Финансовое состояние (публичная отчётность, кредитный рейтинг)?",
                "Ценовая конкурентоспособность (сравнение с рынком)?",
                "Внедрение новых технологий, R&D?"
            ]
        },
        "supply_chain_security": {
            title: "Безопасность цепи поставок",
            questions: [
                "Провести анализ рисков для всех звеньев цепи поставок (поставщики, софт, логистика)?",
                "Идентифицировать критически важные компоненты и зависимости?",
                "Требовать от поставщиков соблюдения стандартов безопасности (ISO 27001)?",
                "Включить требования по безопасности в договоры (NDA, пункты о кибербезопасности)?",
                "Регулярно проверять поставщиков на соответствие требованиям (опросные листы, аудиты)?",
                "Проводить анализ безопасности программного обеспечения (SAST/DAST) перед интеграцией?",
                "Ограничить доступ к системам только авторизованным сотрудникам и партнерам?",
                "Шифровать передаваемые данные (TLS, VPN)?",
                "Использовать пломбы и датчики вскрытия для контейнеров?",
                "Вести мониторинг грузов в реальном времени (GPS, трекинг)?",
                "Проверять благонадежность перевозчиков и таможенных брокеров?",
                "Разработать план реагирования на инциденты (кибератака, утеря груза)?",
                "Проводить учения по реагированию на инциденты?"
            ]
        },
        "last_mile_delivery": {
            title: "Доставка последней мили",
            questions: [
                "Оптимизировать маршруты доставки с учётом временных окон и пробок?",
                "Сгруппировать заказы по районам для уменьшения пробега?",
                "Уведомить клиента о дате и времени доставки (SMS, email, push)?",
                "Проверить соответствие заказов маршруту (по количеству и весу)?",
                "Разместить груз в кузове в порядке объезда (первый заказ – ближе к дверям)?",
                "Сфотографировать расположение груза перед выездом?",
                "Связаться с клиентом за 15-30 минут до прибытия?",
                "Передать заказ лично в руки или оставить в постамате/ПВЗ по договорённости?",
                "Получить подпись или электронное подтверждение получения?",
                "Сделать фото переданного заказа (место, товар, упаковка)?",
                "При отсутствии клиента – оставить уведомление, позвонить повторно?",
                "Зафиксировать отказ от получения или повреждение груза (акт, фото)?",
                "Заполнить маршрутный лист (фактические время, пробег, расход топлива)?",
                "Передать подписанные документы в офис?"
            ]
        }
    };

    let currentUser = null;
    let currentChecklistId = null;
    let currentQuestions = [];
    let answers = [];

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = '/login.html';
            return;
        }
        currentUser = user;
        const urlParams = new URLSearchParams(window.location.search);
        currentChecklistId = urlParams.get('id');
        if (!currentChecklistId) {
            document.getElementById('questionsContainer').innerHTML = '<p>Ошибка: не указан ID чек-листа.</p>';
            return;
        }
        const data = questionsDB[currentChecklistId];
        if (!data) {
            document.getElementById('questionsContainer').innerHTML = '<p>Чек-лист не найден.</p>';
            return;
        }
        document.getElementById('checklistTitle').innerText = data.title;
        currentQuestions = data.questions;
        
        const docRef = doc(db, 'users', user.uid, 'checklists', currentChecklistId);
        const docSnap = await getDoc(docRef);
        if (docSnap.exists() && docSnap.data().answers) {
            answers = docSnap.data().answers;
            const last = docSnap.data().lastUpdated;
            if (last) document.getElementById('lastUpdated').innerText = new Date(last.toDate()).toLocaleString();
        } else {
            answers = new Array(currentQuestions.length).fill(false);
        }
        renderQuestions();
        updateProgress();
    });

    function renderQuestions() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        currentQuestions.forEach((q, idx) => {
            const div = document.createElement('div');
            div.className = 'question-card';
            div.innerHTML = `
                <div class="question-text">${idx+1}. ${q}</div>
                <div class="options">
                    <label><input type="checkbox" data-idx="${idx}" ${answers[idx] ? 'checked' : ''}> Выполнено / Да</label>
                </div>
            `;
            container.appendChild(div);
        });
        document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
            cb.addEventListener('change', (e) => {
                const idx = parseInt(e.target.dataset.idx);
                answers[idx] = e.target.checked;
                updateProgress();
            });
        });
    }

    function updateProgress() {
        const completed = answers.filter(v => v === true).length;
        const percent = Math.round((completed / currentQuestions.length) * 100);
        document.getElementById('progressPercent').innerText = percent;
        document.getElementById('progressFill').style.width = percent + '%';
    }

    document.getElementById('saveBtn').addEventListener('click', async () => {
        if (!currentUser) return;
        const docRef = doc(db, 'users', currentUser.uid, 'checklists', currentChecklistId);
        await setDoc(docRef, {
            answers: answers,
            lastUpdated: serverTimestamp(),
            checklistId: currentChecklistId
        }, { merge: true });
        alert('Прогресс сохранён!');
        document.getElementById('lastUpdated').innerText = new Date().toLocaleString();
    });

    document.getElementById('logoutBtn').addEventListener('click', async (e) => {
        e.preventDefault();
        await signOut(auth);
        window.location.href = '/login.html';
    });
</script>
</body>
</html>
