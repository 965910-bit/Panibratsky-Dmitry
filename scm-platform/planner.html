<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Планер SCM – финальная версия</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="scm-style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #0f172a; }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: white; border-right: 1px solid #e2e8f0; padding: 24px 16px; position: fixed; height: 100vh; overflow-y: auto; }
        .sidebar .logo { font-size: 18px; font-weight: 700; margin-bottom: 32px; display: block; text-decoration: none; color: #0f172a; }
        .sidebar .logo span { color: #d4af37; }
        .sidebar nav ul { list-style: none; }
        .sidebar nav ul li { margin-bottom: 8px; }
        .sidebar nav ul li a { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 12px; text-decoration: none; color: #334155; font-weight: 500; transition: 0.2s; }
        .sidebar nav ul li a:hover, .sidebar nav ul li a.active { background: #eef2ff; color: #1e40af; }
        .main-content { margin-left: 260px; flex: 1; padding: 24px 32px; }
        .view-switch { display: flex; gap: 8px; margin-bottom: 24px; background: white; border-radius: 40px; padding: 4px; border: 1px solid #e2e8f0; width: fit-content; flex-wrap: wrap; }
        .view-switch button { background: transparent; color: #334155; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; font-size: 14px; }
        .view-switch button.active { background: #1e40af; color: white; }
        .controls { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; }
        .nav-buttons { display: flex; gap: 8px; align-items: center; background: white; padding: 6px 16px; border-radius: 40px; border: 1px solid #e2e8f0; }
        .nav-buttons button { background: transparent; color: #1e40af; border: none; padding: 6px 12px; border-radius: 30px; cursor: pointer; }
        .date-picker { padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 30px; background: white; }
        .filter-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; background: white; padding: 12px 20px; border-radius: 60px; border: 1px solid #e2e8f0; }
        .filter-bar select, .filter-bar input { padding: 6px 12px; border-radius: 30px; border: 1px solid #e2e8f0; background: white; font-size: 13px; }
        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
        button { background: #1e40af; color: white; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; font-weight: 500; font-size: 13px; }
        .print-btn { background: #f59e0b; }
        .report-btn { background: #10b981; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 24px; padding: 24px; width: 500px; max-width: 90%; max-height: 80%; overflow-y: auto; }
        .task-item { background: white; border-radius: 12px; padding: 6px 8px; margin-bottom: 6px; cursor: pointer; border-left: 4px solid; box-shadow: 0 1px 2px rgba(0,0,0,0.05); font-size: 12px; }
        .kanban-board { display: flex; gap: 20px; overflow-x: auto; padding: 16px 0; }
        .kanban-column { background: #f8fafc; border-radius: 20px; min-width: 280px; padding: 16px; border: 1px solid #e2e8f0; }
        .kanban-column h3 { font-size: 16px; margin-bottom: 12px; color: #1e40af; }
        .kanban-tasks { min-height: 200px; }
        .kanban-task { background: white; border-radius: 12px; padding: 8px; margin-bottom: 8px; cursor: grab; border-left: 3px solid; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .backlog-list { background: white; border-radius: 24px; padding: 24px; }
        .backlog-item { background: #f8fafc; border-radius: 16px; padding: 12px; margin-bottom: 12px; border-left: 4px solid; }
        .tag { display: inline-block; background: #e2e8f0; border-radius: 20px; padding: 2px 6px; font-size: 10px; margin-right: 4px; }
        .stat-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; margin: 16px 0; }
        .stat-item { background: #f8fafc; padding: 12px; border-radius: 16px; text-align: center; }
        .stat-count { font-size: 28px; font-weight: 700; }
        .calendar-grid { background: white; border-radius: 24px; border: 1px solid #e2e8f0; overflow-x: auto; }
        .week-grid { display: grid; grid-template-columns: 80px repeat(7, 1fr); min-width: 800px; }
        .week-day-header { text-align: center; font-weight: 600; padding: 12px; background: #eef2ff; border-bottom: 1px solid #e2e8f0; }
        .week-hour-cell { background: #f8fafc; font-size: 12px; text-align: center; padding: 8px; border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; }
        .week-cell { padding: 8px; border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; vertical-align: top; min-height: 80px; }
        .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); min-width: 700px; }
        .month-day-header { text-align: center; font-weight: 600; padding: 12px; background: #eef2ff; border-bottom: 1px solid #e2e8f0; }
        .month-cell { padding: 8px; border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; vertical-align: top; min-height: 100px; }
        .date-number { font-weight: 500; margin-bottom: 8px; font-size: 14px; }
        .add-task-btn { background: none; border: none; color: #1e40af; cursor: pointer; font-size: 12px; margin-top: 4px; }
        @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0; padding: 16px; } .filter-bar { border-radius: 20px; } }
        @media print { .sidebar, .controls, .filter-bar, .btn-group, .view-switch { display: none; } }
    </style>
</head>
<body>
<div class="app-container">
    <aside class="sidebar">
        <a href="dashboard.html" class="logo">ДМИТРИЙ<span>.</span>ПАНИБРАТСКИЙ</a>
        <nav>
            <ul>
                <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Дашборд</a></li>
                <li><a href="kpi-center.html"><i class="fas fa-chart-line"></i> KPI-центр</a></li>
                <li><a href="auditor.html"><i class="fas fa-clipboard-list"></i> Аудитор</a></li>
                <li><a href="library.html"><i class="fas fa-book"></i> Библиотека</a></li>
                <li><a href="inventory-methodology.html"><i class="fas fa-boxes"></i> Управление запасами</a></li>
                <li><a href="roadmap.html"><i class="fas fa-road"></i> Дорожная карта</a></li>
                <li><a href="checklists.html"><i class="fas fa-check-square"></i> Чек-листы</a></li>
                <li><a href="standards.html"><i class="fas fa-table"></i> Нормативы</a></li>
                <li><a href="calculators.html"><i class="fas fa-calculator"></i> Калькуляторы</a></li>
                <li><a href="processes.html"><i class="fas fa-diagram-project"></i> Процессы SCM</a></li>
                <li><a href="audit-registry.html"><i class="fas fa-history"></i> Реестр аудитов</a></li>
                <li><a href="planner.html" class="active"><i class="fas fa-calendar-alt"></i> Планер</a></li>
            </ul>
        </nav>
    </aside>
    <main class="main-content">
        <h1>📅 Планер задач SCM</h1>
        <div class="view-switch">
            <button data-view="day">День</button>
            <button data-view="week">Неделя</button>
            <button data-view="month">Месяц</button>
            <button data-view="kanban">Канбан</button>
            <button data-view="backlog">Бэклог</button>
            <button data-view="myday">Мой день</button>
        </div>
        <div class="controls">
            <div class="nav-buttons">
                <button id="prevBtn"><i class="fas fa-chevron-left"></i></button>
                <span id="currentDateLabel" style="font-weight:600; min-width:200px;"></span>
                <button id="nextBtn"><i class="fas fa-chevron-right"></i></button>
                <input type="date" id="datePicker" class="date-picker">
            </div>
            <div style="display: flex; gap: 8px;">
                <button id="reportBtn" class="report-btn"><i class="fas fa-chart-pie"></i> Отчёт</button>
                <button id="exportIcsBtn" class="print-btn"><i class="fas fa-calendar-plus"></i> iCalendar</button>
                <button id="exportJsonBtn"><i class="fas fa-download"></i> JSON</button>
                <button id="importJsonBtn"><i class="fas fa-upload"></i> Импорт</button>
                <input type="file" id="importFile" accept=".json" style="display: none;">
                <button id="printViewBtn" class="print-btn"><i class="fas fa-print"></i> Печать</button>
                <button id="newTaskBtn"><i class="fas fa-plus"></i> Новая задача</button>
            </div>
        </div>
        <div class="filter-bar">
            <select id="filterStatus"><option value="">Все статусы</option><option value="gray">⚪ Не распределено</option><option value="purple">📌 Запланировано</option><option value="red">🔴 Срочно</option><option value="yellow">🟡 Важно</option><option value="blue">🔵 В работе</option><option value="green">🟢 Выполнено</option></select>
            <select id="filterPriority"><option value="">Все приоритеты</option><option value="high">Высокий</option><option value="medium">Средний</option><option value="low">Низкий</option></select>
            <input type="text" id="filterTag" placeholder="Тег">
            <input type="text" id="searchText" placeholder="Поиск">
            <button id="clearFilters">Сбросить</button>
        </div>
        <div id="calendarContainer"></div>
    </main>
</div>

<script>
    let tasks = {};
    function loadTasks() { const s = localStorage.getItem('scm_planner_tasks_v4'); if(s) tasks = JSON.parse(s); else tasks = { backlog: [] }; }
    function saveTasks() { localStorage.setItem('scm_planner_tasks_v4', JSON.stringify(tasks)); }
    function addTask(target, data) { if(!tasks[target]) tasks[target]=[]; const id = Date.now().toString(); tasks[target].push({ id, createdAt: new Date().toISOString(), subtasks:[], tags:[], priority:'medium', status:'gray', ...data }); saveTasks(); renderCurrentView(); }
    function updateTask(target, tid, nd) { const idx = tasks[target].findIndex(t=>t.id===tid); if(idx!==-1){ tasks[target][idx]={...tasks[target][idx],...nd}; saveTasks(); renderCurrentView(); } }
    function deleteTask(target, tid) { tasks[target]=tasks[target].filter(t=>t.id!==tid); if(tasks[target].length===0 && target!=='backlog') delete tasks[target]; saveTasks(); renderCurrentView(); }
    function moveToDate(tid, from, toDate) { const t = tasks[from].find(t=>t.id===tid); if(!t) return; deleteTask(from, tid); if(!tasks[toDate]) tasks[toDate]=[]; tasks[toDate].push({...t, date:toDate}); saveTasks(); renderCurrentView(); }
    function formatTime(t){ return t?t.substring(0,5):''; }
    function formatDateKey(d){ return d.toISOString().split('T')[0]; }
    function escapeHtml(s){ return s?s.replace(/[&<>]/g, m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'):''; }
    function getColor(st){ const c={gray:'#94a3b8', purple:'#8b5cf6', red:'#dc2626', yellow:'#f59e0b', blue:'#1e40af', green:'#10b981'}; return c[st]||'#94a3b8'; }

    let currentView = 'week';
    let currentDate = new Date();

    function getWeekDates(date){
        const d = new Date(date);
        const day = d.getDay();
        const diff = d.getDate() - day + (day===0?-6:1);
        const monday = new Date(d.setDate(diff));
        return Array.from({length:7},(_,i)=>{const nd=new Date(monday); nd.setDate(monday.getDate()+i); return nd;});
    }
    function getMonthDates(y,m){
        const first = new Date(y,m,1);
        const startDay = first.getDay();
        const off = startDay===0?6:startDay-1;
        const start = new Date(y,m,1-off);
        return Array.from({length:42},(_,i)=>{const nd=new Date(start); nd.setDate(start.getDate()+i); return nd;});
    }
    function getFilteredForDate(dateKey){
        let arr = tasks[dateKey]||[];
        const st = document.getElementById('filterStatus').value;
        const pr = document.getElementById('filterPriority').value;
        const tg = document.getElementById('filterTag').value.trim().toLowerCase();
        const sr = document.getElementById('searchText').value.trim().toLowerCase();
        return arr.filter(t=>{
            if(st && t.status!==st) return false;
            if(pr && t.priority!==pr) return false;
            if(tg && !(t.tags||[]).some(tt=>tt.toLowerCase().includes(tg))) return false;
            if(sr && !t.text.toLowerCase().includes(sr)) return false;
            return true;
        });
    }

    function renderCurrentView(){
        if(currentView==='day') renderDay();
        else if(currentView==='week') renderWeek();
        else if(currentView==='month') renderMonth();
        else if(currentView==='kanban') renderKanban();
        else if(currentView==='backlog') renderBacklog();
        else if(currentView==='myday') renderMyDay();
    }

    function renderDay(){
        const dk = formatDateKey(currentDate);
        const list = getFilteredForDate(dk);
        list.sort((a,b)=>(a.startTime||'00:00').localeCompare(b.startTime||'00:00'));
        const cont = document.getElementById('calendarContainer');
        cont.innerHTML = `<div style="background:white; border-radius:24px; padding:24px;"><h3>${currentDate.toLocaleDateString('ru-RU',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</h3><div id="dayTasksList"></div><button class="add-task-btn" onclick="openTaskModalForDate('${dk}')">+ Добавить задачу</button></div>`;
        const div = document.getElementById('dayTasksList');
        if(!list.length) div.innerHTML='<div class="badge">Нет задач</div>';
        else div.innerHTML = list.map(t=>`<div class="task-item" style="border-left-color:${getColor(t.status)};" onclick="openTaskModal('${dk}','${t.id}')"><div><strong>${escapeHtml(t.text)}</strong> ${t.startTime?formatTime(t.startTime):''}${t.endTime?' - '+formatTime(t.endTime):''}</div><div>${(t.tags||[]).map(tg=>`<span class="tag">${escapeHtml(tg)}</span>`).join('')}</div></div>`).join('');
    }

    function renderWeek(){
        const week = getWeekDates(currentDate);
        let html = `<div class="calendar-grid"><div class="week-grid"><div class="week-day-header">Время</div>`;
        week.forEach(d=>html+=`<div class="week-day-header">${d.toLocaleDateString('ru-RU',{weekday:'short',day:'numeric'})}</div>`);
        html+=`</div>`;
        for(let hour=0;hour<24;hour++){
            html+=`<div class="week-grid"><div class="week-hour-cell">${hour}:00</div>`;
            for(let d of week){
                const dk = formatDateKey(d);
                const dayTasks = getFilteredForDate(dk);
                const hourTasks = dayTasks.filter(t=>{
                    if(!t.startTime) return false;
                    const sh = parseInt(t.startTime.split(':')[0]);
                    const eh = t.endTime?parseInt(t.endTime.split(':')[0]):sh;
                    return hour>=sh && hour<=eh;
                });
                html+=`<div class="week-cell">${hourTasks.map(t=>`<div class="task-item" style="border-left-color:${getColor(t.status)}; margin-bottom:4px;" onclick="openTaskModal('${dk}','${t.id}')">${escapeHtml(t.text)}</div>`).join('')}<button class="add-task-btn" onclick="openTaskModalForDate('${dk}')">+</button></div>`;
            }
            html+=`</div>`;
        }
        html+=`</div>`;
        document.getElementById('calendarContainer').innerHTML = html;
    }

    function renderMonth(){
        const y = currentDate.getFullYear(), m = currentDate.getMonth();
        const days = getMonthDates(y,m);
        let html = `<div class="calendar-grid"><div class="month-grid">${['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d=>`<div class="month-day-header">${d}</div>`).join('')}`;
        days.forEach(d=>{
            const dk = formatDateKey(d);
            const dayTasks = getFilteredForDate(dk);
            const isCurr = d.getMonth()===m;
            html+=`<div class="month-cell" style="${!isCurr?'background:#f8fafc; color:#94a3b8;':''}"><div class="date-number">${d.getDate()}</div>${dayTasks.slice(0,3).map(t=>`<div class="task-item" style="border-left-color:${getColor(t.status)}; margin-bottom:2px;" onclick="openTaskModal('${dk}','${t.id}')">${escapeHtml(t.text)}</div>`).join('')}${dayTasks.length>3?`<div style="font-size:10px;">+${dayTasks.length-3} ещё</div>`:''}<button class="add-task-btn" onclick="openTaskModalForDate('${dk}')">+</button></div>`;
        });
        html+=`</div></div>`;
        document.getElementById('calendarContainer').innerHTML = html;
    }

    function renderKanban(){
        const statuses = [
            {key:'gray', title:'⚪ Не распределено', color:'#94a3b8'},
            {key:'purple', title:'📌 Запланировано', color:'#8b5cf6'},
            {key:'red', title:'🔴 Срочно', color:'#dc2626'},
            {key:'yellow', title:'🟡 Важно', color:'#f59e0b'},
            {key:'blue', title:'🔵 В работе', color:'#1e40af'},
            {key:'green', title:'🟢 Выполнено', color:'#10b981'}
        ];
        let all = [];
        for(const [date, list] of Object.entries(tasks)) if(date!=='backlog') list.forEach(t=>all.push({...t, date}));
        const st = document.getElementById('filterStatus').value, pr = document.getElementById('filterPriority').value, tg = document.getElementById('filterTag').value.trim().toLowerCase(), sr = document.getElementById('searchText').value.trim().toLowerCase();
        const filtered = all.filter(t=>{
            if(st && t.status!==st) return false;
            if(pr && t.priority!==pr) return false;
            if(tg && !(t.tags||[]).some(tt=>tt.toLowerCase().includes(tg))) return false;
            if(sr && !t.text.toLowerCase().includes(sr)) return false;
            return true;
        });
        let html = `<div class="kanban-board">`;
        for(let s of statuses){
            const col = filtered.filter(t=>(t.status||'gray')===s.key);
            html+=`<div class="kanban-column" data-status="${s.key}"><h3>${s.title}</h3><div class="kanban-tasks" data-status="${s.key}">${col.map(t=>`<div class="kanban-task" draggable="true" data-id="${t.id}" data-date="${t.date}" style="border-left-color:${s.color}" onclick="openTaskModal('${t.date}','${t.id}')"><div><strong>${escapeHtml(t.text)}</strong></div><div style="font-size:10px;">${t.date} ${t.startTime||''}</div></div>`).join('')}</div></div>`;
        }
        html+=`</div>`;
        document.getElementById('calendarContainer').innerHTML = html;
        attachKanbanDragDrop();
    }

    function attachKanbanDragDrop(){
        const draggables = document.querySelectorAll('.kanban-task');
        const containers = document.querySelectorAll('.kanban-tasks');
        draggables.forEach(d=>{
            d.setAttribute('draggable','true');
            d.addEventListener('dragstart',(e)=>{
                e.dataTransfer.setData('text/plain',JSON.stringify({id:d.dataset.id, date:d.dataset.date}));
                d.style.opacity='0.5';
            });
            d.addEventListener('dragend',e=>d.style.opacity='1');
        });
        containers.forEach(c=>{
            c.addEventListener('dragover',e=>e.preventDefault());
            c.addEventListener('drop',e=>{
                e.preventDefault();
                const data = JSON.parse(e.dataTransfer.getData('text/plain'));
                const newStatus = c.parentElement.dataset.status;
                updateTask(data.date, data.id, { status: newStatus });
            });
        });
    }

    function renderBacklog(){
        const backlog = tasks.backlog||[];
        const st = document.getElementById('filterStatus').value, pr = document.getElementById('filterPriority').value, tg = document.getElementById('filterTag').value.trim().toLowerCase(), sr = document.getElementById('searchText').value.trim().toLowerCase();
        const filtered = backlog.filter(t=>{
            if(st && t.status!==st) return false;
            if(pr && t.priority!==pr) return false;
            if(tg && !(t.tags||[]).some(tt=>tt.toLowerCase().includes(tg))) return false;
            if(sr && !t.text.toLowerCase().includes(sr)) return false;
            return true;
        });
        const cont = document.getElementById('calendarContainer');
        cont.innerHTML = `<div class="backlog-list"><h3>📋 Бэклог (задачи без даты)</h3><div id="backlogTasksList"></div><button class="add-task-btn" onclick="openTaskModalForBacklog()">+ Новая задача в бэклог</button></div>`;
        const div = document.getElementById('backlogTasksList');
        if(!filtered.length) div.innerHTML='<div class="badge">Нет задач</div>';
        else div.innerHTML = filtered.map(t=>`<div class="backlog-item" style="border-left-color:${getColor(t.status)};"><div><strong>${escapeHtml(t.text)}</strong></div><div>${(t.tags||[]).map(tg=>`<span class="tag">${escapeHtml(tg)}</span>`).join('')}</div><div style="margin-top:8px; display:flex; gap:8px;"><button class="edit-backlog" data-id="${t.id}">✏️ Редактировать</button><button class="assign-date" data-id="${t.id}">📅 Назначить дату</button><button class="delete-backlog" data-id="${t.id}">🗑️</button></div></div>`).join('');
        attachBacklogEvents();
    }

    function attachBacklogEvents(){
        document.querySelectorAll('.edit-backlog').forEach(btn=>btn.addEventListener('click',(e)=>{ const id=btn.dataset.id; openTaskModal('backlog',id); e.stopPropagation(); }));
        document.querySelectorAll('.delete-backlog').forEach(btn=>btn.addEventListener('click',(e)=>{ if(confirm('Удалить?')) deleteTask('backlog',btn.dataset.id); e.stopPropagation(); }));
        document.querySelectorAll('.assign-date').forEach(btn=>btn.addEventListener('click',(e)=>{
            const tid = btn.dataset.id;
            const date = prompt('Введите дату в формате ГГГГ-ММ-ДД', new Date().toISOString().split('T')[0]);
            if(date && /^\d{4}-\d{2}-\d{2}$/.test(date)) moveToDate(tid,'backlog',date);
            else alert('Неверный формат');
            e.stopPropagation();
        }));
    }

    function renderMyDay(){
        const today = formatDateKey(new Date());
        const list = getFilteredForDate(today);
        list.sort((a,b)=>(a.startTime||'00:00').localeCompare(b.startTime||'00:00'));
        const cont = document.getElementById('calendarContainer');
        cont.innerHTML = `<div style="background:white; border-radius:24px; padding:24px;"><h3>Мой день – ${new Date().toLocaleDateString('ru-RU')}</h3><div id="mydayTasksList"></div><button class="add-task-btn" onclick="openTaskModalForDate('${today}')">+ Добавить задачу</button></div>`;
        const div = document.getElementById('mydayTasksList');
        if(!list.length) div.innerHTML='<div class="badge">Нет задач</div>';
        else div.innerHTML = list.map(t=>`<div class="task-item" style="border-left-color:${getColor(t.status)};" onclick="openTaskModal('${today}','${t.id}')"><div><strong>${escapeHtml(t.text)}</strong> ${t.startTime?formatTime(t.startTime):''}</div><div>${(t.tags||[]).map(tg=>`<span class="tag">${escapeHtml(tg)}</span>`).join('')}</div></div>`).join('');
    }

    let currentTarget=null, currentTaskId=null;
    function openTaskModalForDate(dk){ currentTarget=dk; currentTaskId=null; fillModal(); document.getElementById('taskModal').style.display='flex'; }
    function openTaskModalForBacklog(){ currentTarget='backlog'; currentTaskId=null; fillModal(); document.getElementById('taskModal').style.display='flex'; }
    function openTaskModal(target, tid){ currentTarget=target; currentTaskId=tid; const task = tasks[target].find(t=>t.id===tid); if(task){ document.getElementById('modalTaskText').value=task.text; document.getElementById('modalTaskStatus').value=task.status||'gray'; document.getElementById('modalPriority').value=task.priority||'medium'; document.getElementById('modalStartTime').value=task.startTime||''; document.getElementById('modalEndTime').value=task.endTime||''; document.getElementById('modalTags').value=(task.tags||[]).join(', '); } else fillModal(); document.getElementById('taskModal').style.display='flex'; }
    function fillModal(){ document.getElementById('modalTaskText').value=''; document.getElementById('modalTaskStatus').value='gray'; document.getElementById('modalPriority').value='medium'; document.getElementById('modalStartTime').value=''; document.getElementById('modalEndTime').value=''; document.getElementById('modalTags').value=''; }
    function saveModalTask(){ const text = document.getElementById('modalTaskText').value.trim(); if(!text) return; const status = document.getElementById('modalTaskStatus').value; const priority = document.getElementById('modalPriority').value; const start = document.getElementById('modalStartTime').value; const end = document.getElementById('modalEndTime').value; const tags = document.getElementById('modalTags').value.split(',').map(s=>s.trim()).filter(s=>s); if(currentTaskId) updateTask(currentTarget, currentTaskId, {text, status, priority, startTime:start, endTime:end, tags}); else addTask(currentTarget, {text, status, priority, startTime:start, endTime:end, tags}); closeModal(); }
    function deleteModalTask(){ if(currentTaskId && confirm('Удалить задачу?')){ deleteTask(currentTarget, currentTaskId); closeModal(); } }
    function closeModal(){ document.getElementById('taskModal').style.display='none'; currentTarget=null; currentTaskId=null; }

    function showStatusReport(){
        let all = [];
        for(const [date,list] of Object.entries(tasks)) if(date!=='backlog') list.forEach(t=>all.push(t));
        const stats = {gray:0, purple:0, red:0, yellow:0, blue:0, green:0};
        all.forEach(t=>{ const c=t.status||'gray'; stats[c]++; });
        const total = all.length;
        const modal = document.createElement('div'); modal.className='modal'; modal.style.display='flex';
        modal.innerHTML = `<div class="modal-content"><h3>📊 Отчёт по статусам задач</h3><div class="stat-grid"><div class="stat-item">⚪ Не распределено<br><span class="stat-count">${stats.gray}</span></div><div class="stat-item">📌 Запланировано<br><span class="stat-count">${stats.purple}</span></div><div class="stat-item">🔴 Срочно<br><span class="stat-count">${stats.red}</span></div><div class="stat-item">🟡 Важно<br><span class="stat-count">${stats.yellow}</span></div><div class="stat-item">🔵 В работе<br><span class="stat-count">${stats.blue}</span></div><div class="stat-item">🟢 Выполнено<br><span class="stat-count">${stats.green}</span></div></div><p>Всего задач: ${total}</p><div class="btn-group"><button id="printReportBtn">🖨️ Печать</button><button id="closeReportBtn">Закрыть</button></div></div>`;
        document.body.appendChild(modal);
        modal.querySelector('#closeReportBtn').addEventListener('click',()=>modal.remove());
        modal.querySelector('#printReportBtn').addEventListener('click',()=>{ window.print(); modal.remove(); });
    }
    function exportICS(){
        let ics="BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//SCM Planner//RU\n";
        for(const [date,list] of Object.entries(tasks)) if(date!=='backlog') for(const t of list){ const st = t.startTime?`${date}T${t.startTime.replace(':','')}00`:`${date}T000000`; const en = t.endTime?`${date}T${t.endTime.replace(':','')}00`:`${date}T010000`; ics+=`BEGIN:VEVENT\nUID:${t.id}\nDTSTAMP:${new Date().toISOString().replace(/[-:]/g,'').split('.')[0]}Z\nDTSTART:${st}\nDTEND:${en}\nSUMMARY:${escapeHtml(t.text)}\nEND:VEVENT\n`; }
        ics+="END:VCALENDAR";
        const blob = new Blob([ics],{type:'text/calendar'});
        const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='scm_tasks.ics'; a.click();
    }
    function exportJSON(){ const blob = new Blob([JSON.stringify(tasks,null,2)],{type:'application/json'}); const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='scm_tasks.json'; a.click(); }
    function importJSON(file){ const r = new FileReader(); r.onload=e=>{ try{ tasks=JSON.parse(e.target.result); saveTasks(); renderCurrentView(); alert('Импорт выполнен'); }catch(err){ alert('Ошибка импорта'); } }; r.readAsText(file); }

    function updateDateLabel(){
        const lab = document.getElementById('currentDateLabel');
        if(currentView==='day') lab.innerText = currentDate.toLocaleDateString('ru-RU',{year:'numeric',month:'long',day:'numeric'});
        else if(currentView==='week'){ const w = getWeekDates(currentDate); lab.innerText = `${w[0].toLocaleDateString('ru-RU',{day:'numeric',month:'short'})} - ${w[6].toLocaleDateString('ru-RU',{day:'numeric',month:'short',year:'numeric'})}`; }
        else lab.innerText = currentDate.toLocaleDateString('ru-RU',{year:'numeric',month:'long'});
        document.getElementById('datePicker').value = formatDateKey(currentDate);
    }
    function prev(){ if(currentView==='day') currentDate.setDate(currentDate.getDate()-1); else if(currentView==='week') currentDate.setDate(currentDate.getDate()-7); else currentDate.setMonth(currentDate.getMonth()-1); updateDateLabel(); renderCurrentView(); }
    function next(){ if(currentView==='day') currentDate.setDate(currentDate.getDate()+1); else if(currentView==='week') currentDate.setDate(currentDate.getDate()+7); else currentDate.setMonth(currentDate.getMonth()+1); updateDateLabel(); renderCurrentView(); }
    function goToDate(){ const nd = new Date(document.getElementById('datePicker').value); if(!isNaN(nd)){ if(currentView==='day') currentDate=nd; else if(currentView==='week') currentDate=nd; else currentDate = new Date(nd.getFullYear(), nd.getMonth(),1); updateDateLabel(); renderCurrentView(); } }
    function setView(v){ currentView=v; document.querySelectorAll('[data-view]').forEach(btn=>{ if(btn.dataset.view===v) btn.classList.add('active'); else btn.classList.remove('active'); }); updateDateLabel(); renderCurrentView(); }

    document.addEventListener('DOMContentLoaded',()=>{
        loadTasks();
        currentDate = new Date();
        setView('week');
        document.getElementById('prevBtn').addEventListener('click',prev);
        document.getElementById('nextBtn').addEventListener('click',next);
        document.getElementById('datePicker').addEventListener('change',goToDate);
        document.getElementById('printViewBtn').addEventListener('click',()=>window.print());
        document.getElementById('reportBtn').addEventListener('click',showStatusReport);
        document.getElementById('exportIcsBtn').addEventListener('click',exportICS);
        document.getElementById('exportJsonBtn').addEventListener('click',exportJSON);
        document.getElementById('importJsonBtn').addEventListener('click',()=>document.getElementById('importFile').click());
        document.getElementById('importFile').addEventListener('change',e=>{ if(e.target.files[0]) importJSON(e.target.files[0]); e.target.value=''; });
        document.getElementById('clearFilters').addEventListener('click',()=>{
            document.getElementById('filterStatus').value='';
            document.getElementById('filterPriority').value='';
            document.getElementById('filterTag').value='';
            document.getElementById('searchText').value='';
            renderCurrentView();
        });
        document.querySelectorAll('[data-view]').forEach(btn=>btn.addEventListener('click',()=>setView(btn.dataset.view)));
        document.getElementById('newTaskBtn').addEventListener('click',()=>{
            if(currentView==='kanban') openTaskModalForBacklog();
            else if(currentView==='backlog') openTaskModalForBacklog();
            else { const today = formatDateKey(currentDate); openTaskModalForDate(today); }
        });
        const modalHtml = `<div id="taskModal" class="modal"><div class="modal-content"><h3>Задача</h3><input type="text" id="modalTaskText" placeholder="Текст задачи"><select id="modalTaskStatus"><option value="gray">⚪ Не распределено</option><option value="purple">📌 Запланировано</option><option value="red">🔴 Срочно</option><option value="yellow">🟡 Важно</option><option value="blue">🔵 В работе</option><option value="green">🟢 Выполнено</option></select><select id="modalPriority"><option value="high">Высокий</option><option value="medium">Средний</option><option value="low">Низкий</option></select><div style="display:flex; gap:8px;"><input type="time" id="modalStartTime" placeholder="Начало"><input type="time" id="modalEndTime" placeholder="Конец"></div><input type="text" id="modalTags" placeholder="Теги (через запятую)"><div style="display:flex; justify-content:flex-end; gap:12px; margin-top:16px;"><button id="modalDeleteBtn" style="background:#dc2626;">Удалить</button><button id="modalCancelBtn">Отмена</button><button id="modalSaveBtn">Сохранить</button></div></div></div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        document.getElementById('taskModal').addEventListener('click',e=>{ if(e.target===document.getElementById('taskModal')) closeModal(); });
        document.getElementById('modalCancelBtn').addEventListener('click',closeModal);
        document.getElementById('modalSaveBtn').addEventListener('click',saveModalTask);
        document.getElementById('modalDeleteBtn').addEventListener('click',deleteModalTask);
        window.openTaskModalForDate = openTaskModalForDate;
        window.openTaskModalForBacklog = openTaskModalForBacklog;
        window.openTaskModal = openTaskModal;
        window.deleteTask = deleteTask;
    });
</script>
</body>
</html>
