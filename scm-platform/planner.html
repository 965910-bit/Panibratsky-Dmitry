<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Планер SCM – полная версия с бэклогом и перетаскиванием</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="scm-style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #0f172a; }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: white; border-right: 1px solid #e2e8f0; padding: 24px 16px; position: fixed; height: 100vh; overflow-y: auto; }
        .sidebar .logo { font-size: 18px; font-weight: 700; margin-bottom: 32px; display: block; text-decoration: none; color: #0f172a; }
        .sidebar .logo span { color: #d4af37; }
        .sidebar nav ul { list-style: none; }
        .sidebar nav ul li { margin-bottom: 8px; }
        .sidebar nav ul li a { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 12px; text-decoration: none; color: #334155; font-weight: 500; transition: 0.2s; }
        .sidebar nav ul li a:hover, .sidebar nav ul li a.active { background: #eef2ff; color: #1e40af; }
        .main-content { margin-left: 260px; flex: 1; padding: 24px 32px; }
        .view-switch { display: flex; gap: 12px; margin-bottom: 24px; background: white; border-radius: 40px; padding: 6px; border: 1px solid #e2e8f0; width: fit-content; flex-wrap: wrap; }
        .view-switch button { background: transparent; color: #334155; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; }
        .view-switch button.active { background: #1e40af; color: white; }
        .controls { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; }
        .nav-buttons { display: flex; gap: 8px; align-items: center; }
        .nav-buttons button { background: #e2e8f0; color: #1e40af; border: none; padding: 6px 12px; border-radius: 30px; cursor: pointer; }
        .date-picker { padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 30px; }
        .filter-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
        .filter-bar select, .filter-bar input { padding: 6px 12px; border-radius: 30px; border: 1px solid #e2e8f0; background: white; }
        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
        button { background: #1e40af; color: white; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; }
        .print-btn { background: #f59e0b; }
        .report-btn { background: #10b981; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 24px; padding: 24px; width: 550px; max-width: 90%; max-height: 80%; overflow-y: auto; }
        .task-item { background: #eef2ff; border-radius: 12px; padding: 8px; margin-bottom: 8px; cursor: pointer; border-left: 4px solid; }
        .kanban-board { display: flex; gap: 20px; overflow-x: auto; padding: 16px 0; }
        .kanban-column { background: #f8fafc; border-radius: 20px; min-width: 280px; padding: 16px; border: 1px solid #e2e8f0; }
        .kanban-column h3 { font-size: 16px; margin-bottom: 12px; color: #1e40af; }
        .kanban-tasks { min-height: 200px; }
        .kanban-task { background: white; border-radius: 12px; padding: 8px; margin-bottom: 8px; cursor: grab; border-left: 3px solid; }
        .kanban-task:active { cursor: grabbing; }
        .backlog-list { background: white; border-radius: 20px; padding: 20px; }
        .backlog-item { background: #f8fafc; border-radius: 16px; padding: 12px; margin-bottom: 12px; cursor: grab; border-left: 4px solid; }
        .tag { display: inline-block; background: #e2e8f0; border-radius: 20px; padding: 2px 6px; font-size: 10px; margin-right: 4px; }
        .stat-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; margin: 16px 0; }
        .stat-item { background: #f8fafc; padding: 12px; border-radius: 16px; text-align: center; }
        .stat-count { font-size: 28px; font-weight: 700; }
        @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0; padding: 16px; } }
        @media print { .sidebar, .controls, .filter-bar, .btn-group, .view-switch { display: none; } }
    </style>
</head>
<body>
<div class="app-container">
    <aside class="sidebar">
        <a href="dashboard.html" class="logo">ДМИТРИЙ<span>.</span>ПАНИБРАТСКИЙ</a>
        <nav>
            <ul>
                <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Дашборд</a></li>
                <li><a href="kpi-center.html"><i class="fas fa-chart-line"></i> KPI-центр</a></li>
                <li><a href="auditor.html"><i class="fas fa-clipboard-list"></i> Аудитор</a></li>
                <li><a href="library.html"><i class="fas fa-book"></i> Библиотека</a></li>
                <li><a href="inventory-methodology.html"><i class="fas fa-boxes"></i> Управление запасами</a></li>
                <li><a href="roadmap.html"><i class="fas fa-road"></i> Дорожная карта</a></li>
                <li><a href="checklists.html"><i class="fas fa-check-square"></i> Чек-листы</a></li>
                <li><a href="standards.html"><i class="fas fa-table"></i> Нормативы</a></li>
                <li><a href="calculators.html"><i class="fas fa-calculator"></i> Калькуляторы</a></li>
                <li><a href="processes.html"><i class="fas fa-diagram-project"></i> Процессы SCM</a></li>
                <li><a href="audit-registry.html"><i class="fas fa-history"></i> Реестр аудитов</a></li>
                <li><a href="planner.html" class="active"><i class="fas fa-calendar-alt"></i> Планер</a></li>
            </ul>
        </nav>
    </aside>
    <main class="main-content">
        <h1>📅 Планер задач SCM</h1>
        <div class="view-switch">
            <button data-view="day">День</button>
            <button data-view="week">Неделя</button>
            <button data-view="month">Месяц</button>
            <button data-view="kanban">Канбан</button>
            <button data-view="backlog">Бэклог</button>
            <button data-view="myday">Мой день</button>
        </div>
        <div class="controls">
            <div class="nav-buttons">
                <button id="prevBtn"><i class="fas fa-chevron-left"></i></button>
                <span id="currentDateLabel" style="font-weight:600; min-width:200px;"></span>
                <button id="nextBtn"><i class="fas fa-chevron-right"></i></button>
                <input type="date" id="datePicker" class="date-picker">
            </div>
            <div style="display: flex; gap: 8px;">
                <button id="reportBtn" class="report-btn"><i class="fas fa-chart-pie"></i> Отчёт</button>
                <button id="exportIcsBtn" class="print-btn"><i class="fas fa-calendar-plus"></i> iCalendar</button>
                <button id="exportJsonBtn"><i class="fas fa-download"></i> JSON</button>
                <button id="importJsonBtn"><i class="fas fa-upload"></i> Импорт</button>
                <input type="file" id="importFile" accept=".json" style="display: none;">
                <button id="printViewBtn" class="print-btn"><i class="fas fa-print"></i> Печать</button>
                <button id="newTaskBtn"><i class="fas fa-plus"></i> Новая задача</button>
            </div>
        </div>
        <div class="filter-bar">
            <select id="filterStatus"><option value="">Все статусы</option><option value="gray">⚪ Не распределено</option><option value="purple">📌 Запланировано</option><option value="red">🔴 Срочно</option><option value="yellow">🟡 Важно</option><option value="blue">🔵 В работе</option><option value="green">🟢 Выполнено</option></select>
            <select id="filterPriority"><option value="">Все приоритеты</option><option value="high">Высокий</option><option value="medium">Средний</option><option value="low">Низкий</option></select>
            <input type="text" id="filterTag" placeholder="Тег">
            <input type="text" id="searchText" placeholder="Поиск">
            <button id="clearFilters">Сбросить</button>
        </div>
        <div id="calendarContainer"></div>
    </main>
</div>

<script>
    // ------------------------------ ХРАНИЛИЩЕ ------------------------------
    let tasks = {}; // ключ: "YYYY-MM-DD" или "backlog" для задач без даты

    function loadTasks() {
        const saved = localStorage.getItem('scm_planner_tasks_v2');
        if (saved) tasks = JSON.parse(saved);
        else tasks = { backlog: [] };
    }
    function saveTasks() {
        localStorage.setItem('scm_planner_tasks_v2', JSON.stringify(tasks));
    }

    function addTask(target, taskData) {
        if (!tasks[target]) tasks[target] = [];
        const newId = Date.now().toString();
        tasks[target].push({ id: newId, createdAt: new Date().toISOString(), subtasks: [], tags: [], priority: 'medium', status: 'gray', ...taskData });
        saveTasks();
        renderCurrentView();
    }

    function updateTask(target, taskId, newData) {
        const index = tasks[target].findIndex(t => t.id === taskId);
        if (index !== -1) {
            tasks[target][index] = { ...tasks[target][index], ...newData };
            saveTasks();
            renderCurrentView();
        }
    }

    function deleteTask(target, taskId) {
        tasks[target] = tasks[target].filter(t => t.id !== taskId);
        if (tasks[target].length === 0 && target !== 'backlog') delete tasks[target];
        saveTasks();
        renderCurrentView();
    }

    function moveTaskToDate(taskId, fromTarget, toDate) {
        const task = tasks[fromTarget].find(t => t.id === taskId);
        if (!task) return;
        deleteTask(fromTarget, taskId);
        if (!tasks[toDate]) tasks[toDate] = [];
        tasks[toDate].push({ ...task, date: toDate });
        saveTasks();
        renderCurrentView();
    }

    // ------------------------------ ВСПОМОГАТЕЛЬНЫЕ ------------------------------
    function formatTime(timeStr) { return timeStr ? timeStr.substring(0,5) : ''; }
    function formatDateKey(date) { return date.toISOString().split('T')[0]; }
    function escapeHtml(str) { return str ? str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;') : ''; }

    let currentView = 'week';
    let currentDate = new Date();

    function getWeekDates(date) {
        const start = new Date(date);
        const day = start.getDay();
        const diff = start.getDate() - day + (day === 0 ? -6 : 1);
        const monday = new Date(start.setDate(diff));
        const week = [];
        for (let i = 0; i < 7; i++) {
            const d = new Date(monday);
            d.setDate(monday.getDate() + i);
            week.push(d);
        }
        return week;
    }

    function getMonthDates(year, month) {
        const firstDay = new Date(year, month, 1);
        const startDay = firstDay.getDay();
        const startOffset = startDay === 0 ? 6 : startDay - 1;
        const startDate = new Date(year, month, 1 - startOffset);
        const days = [];
        for (let i = 0; i < 42; i++) {
            const d = new Date(startDate);
            d.setDate(startDate.getDate() + i);
            days.push(d);
        }
        return days;
    }

    function getFilteredTasksForDate(dateKey) {
        let dayTasks = tasks[dateKey] || [];
        const status = document.getElementById('filterStatus').value;
        const priority = document.getElementById('filterPriority').value;
        const tag = document.getElementById('filterTag').value.trim().toLowerCase();
        const search = document.getElementById('searchText').value.trim().toLowerCase();
        return dayTasks.filter(task => {
            if (status && task.status !== status) return false;
            if (priority && task.priority !== priority) return false;
            if (tag && !(task.tags || []).some(t => t.toLowerCase().includes(tag))) return false;
            if (search && !task.text.toLowerCase().includes(search)) return false;
            return true;
        });
    }

    // ------------------------------ РЕНДЕРИНГ ------------------------------
    function renderCurrentView() {
        if (currentView === 'day') renderDayView();
        else if (currentView === 'week') renderWeekView();
        else if (currentView === 'month') renderMonthView();
        else if (currentView === 'kanban') renderKanban();
        else if (currentView === 'backlog') renderBacklog();
        else if (currentView === 'myday') renderMyDay();
    }

    function renderDayView() {
        const dateKey = formatDateKey(currentDate);
        const dayTasks = getFilteredTasksForDate(dateKey);
        dayTasks.sort((a,b) => (a.startTime || '00:00').localeCompare(b.startTime || '00:00'));
        const container = document.getElementById('calendarContainer');
        container.innerHTML = `
            <div style="background:white; border-radius:24px; padding:20px;">
                <h3>${currentDate.toLocaleDateString('ru-RU', { weekday:'long', year:'numeric', month:'long', day:'numeric' })}</h3>
                <div id="dayTasksList"></div>
                <button class="add-task-btn" onclick="openTaskModalForDate('${dateKey}')"><i class="fas fa-plus"></i> Добавить задачу</button>
            </div>
        `;
        const tasksDiv = document.getElementById('dayTasksList');
        if (dayTasks.length === 0) tasksDiv.innerHTML = '<div class="badge">Нет задач</div>';
        else {
            tasksDiv.innerHTML = dayTasks.map(task => `
                <div class="task-item" style="border-left-color: ${getColorForStatus(task.status)}; background:#f8fafc;" onclick="openTaskModal('${dateKey}', '${task.id}')">
                    <div><strong>${escapeHtml(task.text)}</strong> <span class="task-time">${task.startTime || ''}${task.endTime ? '-'+task.endTime : ''}</span></div>
                    <div>${(task.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
                </div>
            `).join('');
        }
    }

    function renderWeekView() {
        const weekDates = getWeekDates(currentDate);
        let html = `<div class="calendar-grid"><div class="week-grid"><div class="week-day-header">Время</div>`;
        weekDates.forEach(d => html += `<div class="week-day-header">${d.toLocaleDateString('ru-RU', { weekday:'short', day:'numeric' })}</div>`);
        html += `</div>`;
        for (let hour = 0; hour < 24; hour++) {
            html += `<div class="week-grid"><div class="week-hour-cell">${hour}:00</div>`;
            for (let d of weekDates) {
                const dateKey = formatDateKey(d);
                const dayTasks = getFilteredTasksForDate(dateKey);
                const hourTasks = dayTasks.filter(t => {
                    if (!t.startTime) return false;
                    const startHour = parseInt(t.startTime.split(':')[0]);
                    const endHour = t.endTime ? parseInt(t.endTime.split(':')[0]) : startHour;
                    return hour >= startHour && hour <= endHour;
                });
                html += `<div class="week-cell">${hourTasks.map(t => `<div class="task-item" style="border-left-color:${getColorForStatus(t.status)}; margin-bottom:2px;" onclick="openTaskModal('${dateKey}','${t.id}')">${escapeHtml(t.text)}</div>`).join('')}<button class="add-task-btn" style="font-size:10px;" onclick="openTaskModalForDate('${dateKey}')">+</button></div>`;
            }
            html += `</div>`;
        }
        html += `</div>`;
        document.getElementById('calendarContainer').innerHTML = html;
    }

    function renderMonthView() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        const days = getMonthDates(year, month);
        let html = `<div class="calendar-grid"><div class="month-grid">${['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d => `<div class="month-day-header">${d}</div>`).join('')}`;
        days.forEach(d => {
            const dateKey = formatDateKey(d);
            const dayTasks = getFilteredTasksForDate(dateKey);
            const isCurrentMonth = d.getMonth() === month;
            html += `<div class="month-cell" style="${!isCurrentMonth ? 'background:#f8fafc; color:#94a3b8;' : ''}">
                        <div class="date-number">${d.getDate()}</div>
                        ${dayTasks.map(t => `<div class="task-item" style="border-left-color:${getColorForStatus(t.status)}; margin-bottom:2px;" onclick="openTaskModal('${dateKey}','${t.id}')">${escapeHtml(t.text)}</div>`).join('')}
                        <button class="add-task-btn" onclick="openTaskModalForDate('${dateKey}')">+</button>
                    </div>`;
        });
        html += `</div></div>`;
        document.getElementById('calendarContainer').innerHTML = html;
    }

    function renderKanban() {
        const statuses = [
            { key: 'gray', title: '⚪ Не распределено', color: '#94a3b8' },
            { key: 'purple', title: '📌 Запланировано', color: '#8b5cf6' },
            { key: 'red', title: '🔴 Срочно', color: '#dc2626' },
            { key: 'yellow', title: '🟡 Важно', color: '#f59e0b' },
            { key: 'blue', title: '🔵 В работе', color: '#1e40af' },
            { key: 'green', title: '🟢 Выполнено', color: '#10b981' }
        ];
        let allTasks = [];
        for (const [date, taskList] of Object.entries(tasks)) {
            if (date === 'backlog') continue;
            for (const task of taskList) allTasks.push({ ...task, date });
        }
        const filtered = allTasks.filter(task => {
            const status = document.getElementById('filterStatus').value;
            const priority = document.getElementById('filterPriority').value;
            const tag = document.getElementById('filterTag').value.trim().toLowerCase();
            const search = document.getElementById('searchText').value.trim().toLowerCase();
            if (status && task.status !== status) return false;
            if (priority && task.priority !== priority) return false;
            if (tag && !(task.tags || []).some(t => t.toLowerCase().includes(tag))) return false;
            if (search && !task.text.toLowerCase().includes(search)) return false;
            return true;
        });
        let html = `<div class="kanban-board">`;
        for (let s of statuses) {
            const columnTasks = filtered.filter(t => (t.status || 'gray') === s.key);
            html += `<div class="kanban-column" data-status="${s.key}">
                        <h3>${s.title}</h3>
                        <div class="kanban-tasks" data-status="${s.key}">
                            ${columnTasks.map(task => `
                                <div class="kanban-task" draggable="true" data-id="${task.id}" data-date="${task.date}" data-status="${task.status}" style="border-left-color:${s.color}">
                                    <div><strong>${escapeHtml(task.text)}</strong></div>
                                    <div style="font-size:10px;">${task.date} ${task.startTime || ''}</div>
                                    <div>${(task.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
        }
        html += `</div>`;
        document.getElementById('calendarContainer').innerHTML = html;
        attachKanbanDragDrop();
    }

    function attachKanbanDragDrop() {
        const draggables = document.querySelectorAll('.kanban-task');
        const containers = document.querySelectorAll('.kanban-tasks');
        draggables.forEach(drag => {
            drag.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', JSON.stringify({ id: drag.dataset.id, date: drag.dataset.date, status: drag.dataset.status }));
                drag.style.opacity = '0.5';
            });
            drag.addEventListener('dragend', (e) => { drag.style.opacity = '1'; });
        });
        containers.forEach(container => {
            container.addEventListener('dragover', (e) => e.preventDefault());
            container.addEventListener('drop', (e) => {
                e.preventDefault();
                const data = JSON.parse(e.dataTransfer.getData('text/plain'));
                const newStatus = container.parentElement.dataset.status;
                const taskDate = data.date;
                updateTask(taskDate, data.id, { status: newStatus });
            });
        });
    }

    function renderBacklog() {
        const backlogTasks = tasks.backlog || [];
        const filtered = backlogTasks.filter(task => {
            const status = document.getElementById('filterStatus').value;
            const priority = document.getElementById('filterPriority').value;
            const tag = document.getElementById('filterTag').value.trim().toLowerCase();
            const search = document.getElementById('searchText').value.trim().toLowerCase();
            if (status && task.status !== status) return false;
            if (priority && task.priority !== priority) return false;
            if (tag && !(task.tags || []).some(t => t.toLowerCase().includes(tag))) return false;
            if (search && !task.text.toLowerCase().includes(search)) return false;
            return true;
        });
        const container = document.getElementById('calendarContainer');
        container.innerHTML = `
            <div class="backlog-list">
                <h3>📋 Бэклог (задачи без даты)</h3>
                <div id="backlogTasksList"></div>
                <button class="add-task-btn" onclick="openTaskModalForBacklog()"><i class="fas fa-plus"></i> Новая задача в бэклог</button>
            </div>
        `;
        const tasksDiv = document.getElementById('backlogTasksList');
        if (filtered.length === 0) tasksDiv.innerHTML = '<div class="badge">Нет задач в бэклоге</div>';
        else {
            tasksDiv.innerHTML = filtered.map(task => `
                <div class="backlog-item" draggable="true" data-id="${task.id}" style="border-left-color: ${getColorForStatus(task.status)}">
                    <div><strong>${escapeHtml(task.text)}</strong></div>
                    <div>${(task.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
                    <div style="display:flex; gap:8px; margin-top:8px;">
                        <button class="edit-backlog" data-id="${task.id}">✏️ Редактировать</button>
                        <button class="assign-date" data-id="${task.id}">📅 Назначить дату</button>
                        <button class="delete-backlog" data-id="${task.id}">🗑️</button>
                    </div>
                </div>
            `).join('');
            attachBacklogEvents();
        }
    }

    function attachBacklogEvents() {
        document.querySelectorAll('.edit-backlog').forEach(btn => btn.addEventListener('click', (e) => { const id = btn.dataset.id; openTaskModal('backlog', id); e.stopPropagation(); }));
        document.querySelectorAll('.delete-backlog').forEach(btn => btn.addEventListener('click', (e) => { if(confirm('Удалить?')) deleteTask('backlog', btn.dataset.id); e.stopPropagation(); }));
        document.querySelectorAll('.assign-date').forEach(btn => btn.addEventListener('click', (e) => {
            const taskId = btn.dataset.id;
            const date = prompt('Введите дату в формате ГГГГ-ММ-ДД', new Date().toISOString().split('T')[0]);
            if (date && /^\d{4}-\d{2}-\d{2}$/.test(date)) {
                moveTaskToDate(taskId, 'backlog', date);
            } else alert('Неверный формат');
            e.stopPropagation();
        }));
        const draggables = document.querySelectorAll('.backlog-item');
        draggables.forEach(drag => {
            drag.setAttribute('draggable', 'true');
            drag.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', JSON.stringify({ id: drag.dataset.id, from: 'backlog' }));
            });
        });
        const kanbanColumns = document.querySelectorAll('.kanban-tasks');
        if (kanbanColumns.length) {
            kanbanColumns.forEach(col => {
                col.addEventListener('dragover', (e) => e.preventDefault());
                col.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const data = JSON.parse(e.dataTransfer.getData('text/plain'));
                    if (data.from === 'backlog') {
                        const newStatus = col.parentElement.dataset.status;
                        const task = tasks.backlog.find(t => t.id === data.id);
                        if (task) {
                            deleteTask('backlog', data.id);
                            const today = formatDateKey(new Date());
                            if (!tasks[today]) tasks[today] = [];
                            tasks[today].push({ ...task, status: newStatus, date: today });
                            saveTasks();
                            renderCurrentView();
                        }
                    }
                });
            });
        }
    }

    function renderMyDay() {
        const today = formatDateKey(new Date());
        const dayTasks = getFilteredTasksForDate(today);
        dayTasks.sort((a,b) => (a.startTime || '00:00').localeCompare(b.startTime || '00:00'));
        const container = document.getElementById('calendarContainer');
        container.innerHTML = `
            <div style="background:white; border-radius:24px; padding:20px;">
                <h3>Мой день – ${new Date().toLocaleDateString('ru-RU')}</h3>
                <div id="mydayTasksList"></div>
                <button class="add-task-btn" onclick="openTaskModalForDate('${today}')"><i class="fas fa-plus"></i> Добавить задачу</button>
            </div>
        `;
        const tasksDiv = document.getElementById('mydayTasksList');
        if (dayTasks.length === 0) tasksDiv.innerHTML = '<div class="badge">Нет задач на сегодня</div>';
        else {
            tasksDiv.innerHTML = dayTasks.map(task => `
                <div class="task-item" style="border-left-color: ${getColorForStatus(task.status)};" onclick="openTaskModal('${today}', '${task.id}')">
                    <div><strong>${escapeHtml(task.text)}</strong> ${task.startTime ? formatTime(task.startTime) : ''}</div>
                    <div>${(task.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
                </div>
            `).join('');
        }
    }

    function getColorForStatus(status) {
        const colors = { gray:'#94a3b8', purple:'#8b5cf6', red:'#dc2626', yellow:'#f59e0b', blue:'#1e40af', green:'#10b981' };
        return colors[status] || '#94a3b8';
    }

    // ------------------------------ МОДАЛЬНОЕ ОКНО ------------------------------
    let currentModalTarget = null;
    let currentModalTaskId = null;

    function openTaskModalForDate(dateKey) {
        currentModalTarget = dateKey;
        currentModalTaskId = null;
        document.getElementById('modalTaskText').value = '';
        document.getElementById('modalTaskStatus').value = 'gray';
        document.getElementById('modalPriority').value = 'medium';
        document.getElementById('modalStartTime').value = '09:00';
        document.getElementById('modalEndTime').value = '10:00';
        document.getElementById('modalTags').value = '';
        document.getElementById('taskModal').style.display = 'flex';
    }

    function openTaskModalForBacklog() {
        currentModalTarget = 'backlog';
        currentModalTaskId = null;
        document.getElementById('modalTaskText').value = '';
        document.getElementById('modalTaskStatus').value = 'gray';
        document.getElementById('modalPriority').value = 'medium';
        document.getElementById('modalStartTime').value = '';
        document.getElementById('modalEndTime').value = '';
        document.getElementById('modalTags').value = '';
        document.getElementById('taskModal').style.display = 'flex';
    }

    function openTaskModal(target, taskId) {
        currentModalTarget = target;
        currentModalTaskId = taskId;
        const task = tasks[target].find(t => t.id === taskId);
        if (task) {
            document.getElementById('modalTaskText').value = task.text;
            document.getElementById('modalTaskStatus').value = task.status || 'gray';
            document.getElementById('modalPriority').value = task.priority || 'medium';
            document.getElementById('modalStartTime').value = task.startTime || '';
            document.getElementById('modalEndTime').value = task.endTime || '';
            document.getElementById('modalTags').value = (task.tags || []).join(', ');
        }
        document.getElementById('taskModal').style.display = 'flex';
    }

    function saveModalTask() {
        const text = document.getElementById('modalTaskText').value.trim();
        if (!text) return;
        const status = document.getElementById('modalTaskStatus').value;
        const priority = document.getElementById('modalPriority').value;
        const startTime = document.getElementById('modalStartTime').value;
        const endTime = document.getElementById('modalEndTime').value;
        const tags = document.getElementById('modalTags').value.split(',').map(s => s.trim()).filter(s => s);
        if (currentModalTaskId) {
            updateTask(currentModalTarget, currentModalTaskId, { text, status, priority, startTime, endTime, tags });
        } else {
            addTask(currentModalTarget, { text, status, priority, startTime, endTime, tags });
        }
        closeModal();
    }

    function deleteModalTask() {
        if (currentModalTaskId && confirm('Удалить задачу?')) {
            deleteTask(currentModalTarget, currentModalTaskId);
            closeModal();
        }
    }

    function closeModal() {
        document.getElementById('taskModal').style.display = 'none';
        currentModalTarget = null;
        currentModalTaskId = null;
    }

    // ------------------------------ ОТЧЁТ, ЭКСПОРТ, ИМПОРТ ------------------------------
    function showStatusReport() {
        let allTasks = [];
        for (const [date, taskList] of Object.entries(tasks)) {
            if (date === 'backlog') continue;
            for (const task of taskList) allTasks.push(task);
        }
        const stats = { gray:0, purple:0, red:0, yellow:0, blue:0, green:0 };
        allTasks.forEach(t => { const c = t.status || 'gray'; stats[c]++; });
        const total = allTasks.length;
        const modal = document.createElement('div'); modal.className = 'modal'; modal.style.display = 'flex';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>📊 Отчёт по статусам задач</h3>
                <div class="stat-grid">
                    <div class="stat-item">⚪ Не распределено<br><span class="stat-count">${stats.gray}</span></div>
                    <div class="stat-item">📌 Запланировано<br><span class="stat-count">${stats.purple}</span></div>
                    <div class="stat-item">🔴 Срочно<br><span class="stat-count">${stats.red}</span></div>
                    <div class="stat-item">🟡 Важно<br><span class="stat-count">${stats.yellow}</span></div>
                    <div class="stat-item">🔵 В работе<br><span class="stat-count">${stats.blue}</span></div>
                    <div class="stat-item">🟢 Выполнено<br><span class="stat-count">${stats.green}</span></div>
                </div>
                <p>Всего задач: ${total}</p>
                <div class="btn-group"><button id="printReportBtn">🖨️ Печать</button><button id="closeReportBtn">Закрыть</button></div>
            </div>
        `;
        document.body.appendChild(modal);
        modal.querySelector('#closeReportBtn').addEventListener('click', () => modal.remove());
        modal.querySelector('#printReportBtn').addEventListener('click', () => { window.print(); modal.remove(); });
    }

    function exportICS() {
        let ics = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//SCM Planner//RU\n";
        for (const [date, taskList] of Object.entries(tasks)) {
            if (date === 'backlog') continue;
            for (const task of taskList) {
                const start = task.startTime ? `${date}T${task.startTime.replace(':', '')}00` : `${date}T000000`;
                const end = task.endTime ? `${date}T${task.endTime.replace(':', '')}00` : `${date}T010000`;
                ics += `BEGIN:VEVENT\nUID:${task.id}\nDTSTAMP:${new Date().toISOString().replace(/[-:]/g, '').split('.')[0]}Z\nDTSTART:${start}\nDTEND:${end}\nSUMMARY:${escapeHtml(task.text)}\nEND:VEVENT\n`;
            }
        }
        ics += "END:VCALENDAR";
        const blob = new Blob([ics], {type: 'text/calendar'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'scm_tasks.ics'; a.click();
    }

    function exportJSON() {
        const data = JSON.stringify(tasks, null, 2);
        const blob = new Blob([data], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'scm_tasks.json'; a.click();
    }

    function importJSON(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try { tasks = JSON.parse(e.target.result); saveTasks(); renderCurrentView(); alert('Импорт выполнен'); }
            catch(err) { alert('Ошибка импорта'); }
        };
        reader.readAsText(file);
    }

    // ------------------------------ НАВИГАЦИЯ ------------------------------
    function updateDateLabel() {
        const label = document.getElementById('currentDateLabel');
        if (currentView === 'day') label.innerText = currentDate.toLocaleDateString('ru-RU', { year:'numeric', month:'long', day:'numeric' });
        else if (currentView === 'week') { const week = getWeekDates(currentDate); label.innerText = `${week[0].toLocaleDateString('ru-RU',{day:'numeric',month:'short'})} - ${week[6].toLocaleDateString('ru-RU',{day:'numeric',month:'short',year:'numeric'})}`; }
        else label.innerText = currentDate.toLocaleDateString('ru-RU', { year:'numeric', month:'long' });
        document.getElementById('datePicker').value = formatDateKey(currentDate);
    }

    function prev() {
        if (currentView === 'day') currentDate.setDate(currentDate.getDate() - 1);
        else if (currentView === 'week') currentDate.setDate(currentDate.getDate() - 7);
        else currentDate.setMonth(currentDate.getMonth() - 1);
        updateDateLabel(); renderCurrentView();
    }
    function next() {
        if (currentView === 'day') currentDate.setDate(currentDate.getDate() + 1);
        else if (currentView === 'week') currentDate.setDate(currentDate.getDate() + 7);
        else currentDate.setMonth(currentDate.getMonth() + 1);
        updateDateLabel(); renderCurrentView();
    }
    function goToDate() {
        const newDate = new Date(document.getElementById('datePicker').value);
        if (!isNaN(newDate.getTime())) {
            if (currentView === 'day') currentDate = newDate;
            else if (currentView === 'week') currentDate = newDate;
            else currentDate = new Date(newDate.getFullYear(), newDate.getMonth(), 1);
            updateDateLabel(); renderCurrentView();
        }
    }
    function setView(view) {
        currentView = view;
        document.querySelectorAll('[data-view]').forEach(btn => { if (btn.dataset.view === view) btn.classList.add('active'); else btn.classList.remove('active'); });
        updateDateLabel(); renderCurrentView();
    }

    // ------------------------------ ИНИЦИАЛИЗАЦИЯ ------------------------------
    document.addEventListener('DOMContentLoaded', () => {
        loadTasks();
        currentDate = new Date();
        setView('week');
        document.getElementById('prevBtn').addEventListener('click', prev);
        document.getElementById('nextBtn').addEventListener('click', next);
        document.getElementById('datePicker').addEventListener('change', goToDate);
        document.getElementById('printViewBtn').addEventListener('click', () => window.print());
        document.getElementById('reportBtn').addEventListener('click', showStatusReport);
        document.getElementById('exportIcsBtn').addEventListener('click', exportICS);
        document.getElementById('exportJsonBtn').addEventListener('click', exportJSON);
        document.getElementById('importJsonBtn').addEventListener('click', () => document.getElementById('importFile').click());
        document.getElementById('importFile').addEventListener('change', (e) => { if(e.target.files[0]) importJSON(e.target.files[0]); e.target.value=''; });
        document.getElementById('clearFilters').addEventListener('click', () => {
            document.getElementById('filterStatus').value = '';
            document.getElementById('filterPriority').value = '';
            document.getElementById('filterTag').value = '';
            document.getElementById('searchText').value = '';
            renderCurrentView();
        });
        document.querySelectorAll('[data-view]').forEach(btn => btn.addEventListener('click', () => setView(btn.dataset.view)));
        document.getElementById('newTaskBtn').addEventListener('click', () => {
            if (currentView === 'backlog') openTaskModalForBacklog();
            else if (currentView === 'day' || currentView === 'week' || currentView === 'month') {
                const today = formatDateKey(currentDate);
                openTaskModalForDate(today);
            } else openTaskModalForBacklog();
        });
        // Модальное окно
        const modalHtml = `
            <div id="taskModal" class="modal">
                <div class="modal-content">
                    <h3 id="modalTitle">Задача</h3>
                    <input type="text" id="modalTaskText" placeholder="Текст задачи">
                    <select id="modalTaskStatus">
                        <option value="gray">⚪ Не распределено</option>
                        <option value="purple">📌 Запланировано</option>
                        <option value="red">🔴 Срочно</option>
                        <option value="yellow">🟡 Важно</option>
                        <option value="blue">🔵 В работе</option>
                        <option value="green">🟢 Выполнено</option>
                    </select>
                    <select id="modalPriority">
                        <option value="high">Высокий приоритет</option>
                        <option value="medium">Средний приоритет</option>
                        <option value="low">Низкий приоритет</option>
                    </select>
                    <div class="time-row" style="display:flex; gap:8px;">
                        <input type="time" id="modalStartTime" placeholder="Начало">
                        <input type="time" id="modalEndTime" placeholder="Конец">
                    </div>
                    <input type="text" id="modalTags" placeholder="Теги (через запятую)">
                    <div class="modal-buttons" style="display:flex; justify-content:flex-end; gap:12px; margin-top:16px;">
                        <button id="modalDeleteBtn" style="background:#dc2626;">Удалить</button>
                        <button id="modalCancelBtn">Отмена</button>
                        <button id="modalSaveBtn">Сохранить</button>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        document.getElementById('taskModal').addEventListener('click', (e) => { if(e.target===document.getElementById('taskModal')) closeModal(); });
        document.getElementById('modalCancelBtn').addEventListener('click', closeModal);
        document.getElementById('modalSaveBtn').addEventListener('click', saveModalTask);
        document.getElementById('modalDeleteBtn').addEventListener('click', deleteModalTask);
        window.openTaskModalForDate = openTaskModalForDate;
        window.openTaskModalForBacklog = openTaskModalForBacklog;
        window.openTaskModal = openTaskModal;
        window.deleteTask = deleteTask;
        window.updateTask = updateTask;
    });
</script>
</body>
</html>
