<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Планер SCM – продвинутая версия с бэклогом</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="scm-style.css">
    <style>
        /* Стили (как в предыдущей версии) + новые для бэклога */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #0f172a; }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: white; border-right: 1px solid #e2e8f0; padding: 24px 16px; position: fixed; height: 100vh; overflow-y: auto; }
        .sidebar .logo { font-size: 18px; font-weight: 700; margin-bottom: 32px; display: block; text-decoration: none; color: #0f172a; }
        .sidebar .logo span { color: #d4af37; }
        .sidebar nav ul { list-style: none; }
        .sidebar nav ul li { margin-bottom: 8px; }
        .sidebar nav ul li a { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 12px; text-decoration: none; color: #334155; font-weight: 500; transition: 0.2s; }
        .sidebar nav ul li a:hover, .sidebar nav ul li a.active { background: #eef2ff; color: #1e40af; }
        .main-content { margin-left: 260px; flex: 1; padding: 24px 32px; }
        .view-switch { display: flex; gap: 12px; margin-bottom: 24px; background: white; border-radius: 40px; padding: 6px; border: 1px solid #e2e8f0; width: fit-content; flex-wrap: wrap; }
        .view-switch button { background: transparent; color: #334155; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; }
        .view-switch button.active { background: #1e40af; color: white; }
        .controls { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; }
        .nav-buttons { display: flex; gap: 8px; align-items: center; }
        .nav-buttons button { background: #e2e8f0; color: #1e40af; border: none; padding: 6px 12px; border-radius: 30px; cursor: pointer; }
        .date-picker { padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 30px; }
        .calendar-grid { background: white; border-radius: 24px; border: 1px solid #e2e8f0; overflow-x: auto; }
        .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); min-width: 700px; }
        .week-grid { display: grid; grid-template-columns: 80px repeat(7, 1fr); min-width: 800px; }
        .day-view, .myday-view, .backlog-view { background: white; border-radius: 24px; padding: 20px; }
        .week-day-header, .month-day-header { text-align: center; font-weight: 600; padding: 12px; background: #eef2ff; border-bottom: 1px solid #e2e8f0; }
        .month-cell, .week-cell { min-height: 100px; padding: 8px; border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; vertical-align: top; position: relative; }
        .week-hour-cell { background: #f8fafc; font-size: 12px; text-align: center; border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; }
        .date-number { font-weight: 500; margin-bottom: 8px; }
        .task-item { background: #eef2ff; border-radius: 12px; padding: 4px 8px; margin-bottom: 4px; font-size: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .task-item.red { background: #fee2e2; border-left: 3px solid #dc2626; }
        .task-item.yellow { background: #fef9c3; border-left: 3px solid #f59e0b; }
        .task-item.green { background: #d1fae5; border-left: 3px solid #10b981; }
        .task-item.blue { background: #dbeafe; border-left: 3px solid #1e40af; }
        .task-item.gray { background: #f1f5f9; border-left: 3px solid #94a3b8; }
        .task-item.purple { background: #e9d5ff; border-left: 3px solid #8b5cf6; }
        .task-text { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .task-time { font-size: 10px; color: #64748b; margin-left: 8px; }
        .delete-task { background: none; border: none; color: #dc2626; cursor: pointer; font-size: 10px; margin-left: 4px; }
        .add-task-btn { background: none; border: none; color: #1e40af; cursor: pointer; font-size: 14px; margin-top: 4px; }
        /* Канбан-доска */
        .kanban-board { display: flex; gap: 20px; overflow-x: auto; padding: 16px 0; }
        .kanban-column { background: #f8fafc; border-radius: 20px; min-width: 280px; padding: 16px; border: 1px solid #e2e8f0; }
        .kanban-column h3 { font-size: 16px; margin-bottom: 12px; color: #1e40af; }
        .kanban-task { background: white; border-radius: 12px; padding: 8px; margin-bottom: 8px; cursor: grab; border-left: 3px solid; }
        .kanban-task:active { cursor: grabbing; }
        /* Бэклог (не распределённые) */
        .backlog-card { background: white; border-radius: 16px; padding: 12px; margin-bottom: 12px; border-left: 4px solid; cursor: grab; }
        .backlog-card:active { cursor: grabbing; }
        /* Фильтры и теги */
        .tag { display: inline-block; background: #e2e8f0; border-radius: 20px; padding: 2px 6px; font-size: 10px; margin-right: 4px; }
        .priority-high { border-left-color: #dc2626; }
        .priority-medium { border-left-color: #f59e0b; }
        .priority-low { border-left-color: #10b981; }
        .filter-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
        .filter-bar select, .filter-bar input { padding: 6px 12px; border-radius: 30px; border: 1px solid #e2e8f0; background: white; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 24px; padding: 24px; width: 550px; max-width: 90%; max-height: 80%; overflow-y: auto; }
        .subtask-item { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
        button { background: #1e40af; color: white; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; }
        .print-btn { background: #f59e0b; }
        .report-btn { background: #10b981; }
        .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 16px 0; }
        .stat-item { background: #f8fafc; padding: 12px; border-radius: 16px; text-align: center; }
        .stat-count { font-size: 28px; font-weight: 700; }
        @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0; padding: 16px; } }
        @media print { .sidebar, .view-switch, .controls, .btn-group, .add-task-btn, .delete-task, .filter-bar { display: none; } }
    </style>
</head>
<body>
<div class="app-container">
    <aside class="sidebar">
        <a href="dashboard.html" class="logo">ДМИТРИЙ<span>.</span>ПАНИБРАТСКИЙ</a>
        <nav>
            <ul>
                <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Дашборд</a></li>
                <li><a href="kpi-center.html"><i class="fas fa-chart-line"></i> KPI-центр</a></li>
                <li><a href="auditor.html"><i class="fas fa-clipboard-list"></i> Аудитор</a></li>
                <li><a href="library.html"><i class="fas fa-book"></i> Библиотека</a></li>
                <li><a href="inventory-methodology.html"><i class="fas fa-boxes"></i> Управление запасами</a></li>
                <li><a href="roadmap.html"><i class="fas fa-road"></i> Дорожная карта</a></li>
                <li><a href="checklists.html"><i class="fas fa-check-square"></i> Чек-листы</a></li>
                <li><a href="standards.html"><i class="fas fa-table"></i> Нормативы</a></li>
                <li><a href="calculators.html"><i class="fas fa-calculator"></i> Калькуляторы</a></li>
                <li><a href="processes.html"><i class="fas fa-diagram-project"></i> Процессы SCM</a></li>
                <li><a href="audit-registry.html"><i class="fas fa-history"></i> Реестр аудитов</a></li>
                <li><a href="planner.html" class="active"><i class="fas fa-calendar-alt"></i> Планер</a></li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <h1>📅 Планер задач SCM</h1>
        <div class="view-switch">
            <button data-view="day">День</button>
            <button data-view="week">Неделя</button>
            <button data-view="month">Месяц</button>
            <button data-view="kanban">Канбан</button>
            <button data-view="myday">Мой день</button>
            <button data-view="backlog">Без даты</button>
        </div>
        <div class="controls">
            <div class="nav-buttons">
                <button id="prevBtn"><i class="fas fa-chevron-left"></i></button>
                <span id="currentDateLabel" style="font-weight:600; min-width:200px;"></span>
                <button id="nextBtn"><i class="fas fa-chevron-right"></i></button>
                <input type="date" id="datePicker" class="date-picker">
            </div>
            <div style="display: flex; gap: 8px;">
                <button id="reportBtn" class="report-btn"><i class="fas fa-chart-pie"></i> Отчёт по статусам</button>
                <button id="exportIcsBtn" class="print-btn"><i class="fas fa-calendar-plus"></i> Экспорт iCalendar</button>
                <button id="exportJsonBtn"><i class="fas fa-download"></i> Экспорт JSON</button>
                <button id="importJsonBtn"><i class="fas fa-upload"></i> Импорт JSON</button>
                <input type="file" id="importFile" accept=".json" style="display: none;">
                <button id="printViewBtn" class="print-btn"><i class="fas fa-print"></i> Печать</button>
            </div>
        </div>
        <div class="filter-bar">
            <select id="filterStatus"><option value="">Все статусы</option><option value="gray">Не распределено</option><option value="purple">Запланировано</option><option value="red">Срочно</option><option value="yellow">Важно</option><option value="blue">В работе</option><option value="green">Выполнено</option></select>
            <select id="filterPriority"><option value="">Все приоритеты</option><option value="high">Высокий</option><option value="medium">Средний</option><option value="low">Низкий</option></select>
            <input type="text" id="filterTag" placeholder="Тег">
            <input type="text" id="searchText" placeholder="Поиск по тексту">
            <button id="clearFilters">Сбросить фильтры</button>
        </div>
        <div id="calendarContainer"></div>
    </main>
</div>

<script>
    // ---------- Хранилище задач (расширенное) ----------
    let tasks = {};       // ключ: "YYYY-MM-DD", значение: массив задач
    let undatedTasks = []; // задачи без даты

    function loadTasks() {
        const saved = localStorage.getItem('scm_planner_tasks');
        if (saved) tasks = JSON.parse(saved);
        else tasks = {};
        const savedUndated = localStorage.getItem('scm_planner_undated_tasks');
        if (savedUndated) undatedTasks = JSON.parse(savedUndated);
        else undatedTasks = [];
    }
    function saveTasks() {
        localStorage.setItem('scm_planner_tasks', JSON.stringify(tasks));
        localStorage.setItem('scm_planner_undated_tasks', JSON.stringify(undatedTasks));
    }

    function addTask(date, taskData) {
        if (date === null || date === undefined || date === '') {
            // задача без даты
            const newId = Date.now().toString();
            undatedTasks.push({ id: newId, createdAt: new Date().toISOString(), subtasks: [], tags: [], priority: 'medium', ...taskData });
        } else {
            if (!tasks[date]) tasks[date] = [];
            const newId = Date.now().toString();
            tasks[date].push({ id: newId, createdAt: new Date().toISOString(), subtasks: [], tags: [], priority: 'medium', ...taskData });
        }
        saveTasks();
        renderCurrentView();
    }

    function updateTask(date, taskId, newData) {
        if (date !== null && date !== undefined && tasks[date]) {
            const index = tasks[date].findIndex(t => t.id === taskId);
            if (index !== -1) {
                tasks[date][index] = { ...tasks[date][index], ...newData };
                // если в newData есть date и она отличается от текущей, переносим
                if (newData.date && newData.date !== date) {
                    const task = tasks[date][index];
                    deleteTask(date, taskId);
                    addTask(newData.date, task);
                } else {
                    saveTasks();
                    renderCurrentView();
                }
                return;
            }
        }
        // поиск в undatedTasks
        const uIndex = undatedTasks.findIndex(t => t.id === taskId);
        if (uIndex !== -1) {
            undatedTasks[uIndex] = { ...undatedTasks[uIndex], ...newData };
            if (newData.date && newData.date !== null) {
                const task = undatedTasks[uIndex];
                undatedTasks.splice(uIndex, 1);
                addTask(newData.date, task);
            } else {
                saveTasks();
                renderCurrentView();
            }
            return;
        }
        saveTasks();
        renderCurrentView();
    }

    function deleteTask(date, taskId) {
        if (date !== null && date !== undefined && tasks[date]) {
            tasks[date] = tasks[date].filter(t => t.id !== taskId);
            if (tasks[date].length === 0) delete tasks[date];
        } else {
            undatedTasks = undatedTasks.filter(t => t.id !== taskId);
        }
        saveTasks();
        renderCurrentView();
    }

    // Вспомогательные функции
    function formatTime(timeStr) { return timeStr ? timeStr.substring(0,5) : ''; }
    function formatDateKey(date) { return date.toISOString().split('T')[0]; }

    function getWeekDates(date) {
        const start = new Date(date);
        const day = start.getDay();
        const diff = start.getDate() - day + (day === 0 ? -6 : 1);
        const monday = new Date(start.setDate(diff));
        const week = [];
        for (let i = 0; i < 7; i++) {
            const d = new Date(monday);
            d.setDate(monday.getDate() + i);
            week.push(d);
        }
        return week;
    }

    function getMonthDates(year, month) {
        const firstDay = new Date(year, month, 1);
        const startDay = firstDay.getDay();
        const startOffset = startDay === 0 ? 6 : startDay - 1;
        const startDate = new Date(year, month, 1 - startOffset);
        const days = [];
        for (let i = 0; i < 42; i++) {
            const d = new Date(startDate);
            d.setDate(startDate.getDate() + i);
            days.push(d);
        }
        return days;
    }

    // Фильтрация задач
    function getFilteredTasksForDate(dateKey) {
        let dayTasks = tasks[dateKey] || [];
        const status = document.getElementById('filterStatus').value;
        const priority = document.getElementById('filterPriority').value;
        const tag = document.getElementById('filterTag').value.trim().toLowerCase();
        const search = document.getElementById('searchText').value.trim().toLowerCase();
        return dayTasks.filter(task => {
            if (status && task.color !== status) return false;
            if (priority && task.priority !== priority) return false;
            if (tag && !(task.tags || []).some(t => t.toLowerCase().includes(tag))) return false;
            if (search && !task.text.toLowerCase().includes(search)) return false;
            return true;
        });
    }

    function getFilteredUndatedTasks() {
        const status = document.getElementById('filterStatus').value;
        const priority = document.getElementById('filterPriority').value;
        const tag = document.getElementById('filterTag').value.trim().toLowerCase();
        const search = document.getElementById('searchText').value.trim().toLowerCase();
        return undatedTasks.filter(task => {
            if (status && task.color !== status) return false;
            if (priority && task.priority !== priority) return false;
            if (tag && !(task.tags || []).some(t => t.toLowerCase().includes(tag))) return false;
            if (search && !task.text.toLowerCase().includes(search)) return false;
            return true;
        });
    }

    // Рендер дня
    function renderDayView() {
        const date = currentDate;
        const dateKey = formatDateKey(date);
        let dayTasks = getFilteredTasksForDate(dateKey);
        dayTasks.sort((a,b) => (a.startTime || '00:00').localeCompare(b.startTime || '00:00'));
        const container = document.getElementById('calendarContainer');
        container.innerHTML = `
            <div class="day-view">
                <h3 style="margin-bottom:16px;">${date.toLocaleDateString('ru-RU', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</h3>
                <div id="dayTasksList"></div>
                <button class="add-task-btn" onclick="openTaskModal('${dateKey}')"><i class="fas fa-plus"></i> Добавить задачу</button>
            </div>
        `;
        const tasksDiv = document.getElementById('dayTasksList');
        if (dayTasks.length === 0) tasksDiv.innerHTML = '<div class="badge">Нет задач на этот день</div>';
        else {
            tasksDiv.innerHTML = dayTasks.map(task => `
                <div class="task-item ${task.color || 'gray'}" style="display:flex; justify-content:space-between; margin-bottom:8px;">
                    <span style="flex:1; cursor:pointer;" onclick="openTaskModal('${dateKey}', '${task.id}')">
                        ${escapeHtml(task.text)}
                        <span class="task-time">${task.startTime ? formatTime(task.startTime) : ''}${task.endTime ? ' - '+formatTime(task.endTime) : ''}</span>
                        ${(task.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
                    </span>
                    <button class="delete-task" onclick="deleteTask('${dateKey}', '${task.id}')"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }
    }

    // Рендер недели (почасовой)
    function renderWeekView() {
        const weekDates = getWeekDates(currentDate);
        let html = `<div class="calendar-grid"><div class="week-grid">
            <div class="week-day-header" style="background:#f8fafc;">Время</div>
            ${weekDates.map(d => `<div class="week-day-header">${d.toLocaleDateString('ru-RU', { weekday: 'short', day: 'numeric' })}</div>`).join('')}
        `;
        for (let hour = 0; hour < 24; hour++) {
            html += `<div style="display:contents;"><div class="week-hour-cell">${hour}:00</div>`;
            for (let d of weekDates) {
                const dateKey = formatDateKey(d);
                const dayTasks = getFilteredTasksForDate(dateKey);
                const hourTasks = dayTasks.filter(task => {
                    if (!task.startTime) return false;
                    const startHour = parseInt(task.startTime.split(':')[0]);
                    const endHour = task.endTime ? parseInt(task.endTime.split(':')[0]) : startHour;
                    return hour >= startHour && hour <= endHour;
                });
                const tasksHtml = hourTasks.map(task => `
                    <div class="task-item ${task.color || 'gray'}" style="margin-bottom:2px; font-size:10px;" onclick="openTaskModal('${dateKey}', '${task.id}')">
                        ${escapeHtml(task.text)}<span class="task-time">${formatTime(task.startTime)}${task.endTime ? '-'+formatTime(task.endTime) : ''}</span>
                    </div>
                `).join('');
                html += `<div class="week-cell" data-date="${dateKey}">${tasksHtml}<button class="add-task-btn" style="font-size:10px;" onclick="openTaskModal('${dateKey}')">+</button></div>`;
            }
            html += `</div>`;
        }
        html += `</div></div>`;
        document.getElementById('calendarContainer').innerHTML = html;
        attachDropToCalendarCells();
    }

    // Рендер месяца
    function renderMonthView() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        const days = getMonthDates(year, month);
        let html = `<div class="calendar-grid"><div class="month-grid">
            ${['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'].map(d => `<div class="month-day-header">${d}</div>`).join('')}
        `;
        for (let d of days) {
            const dateKey = formatDateKey(d);
            const dayTasks = getFilteredTasksForDate(dateKey);
            const isCurrentMonth = d.getMonth() === month;
            const tasksHtml = dayTasks.map(task => `<div class="task-item ${task.color || 'gray'}" onclick="openTaskModal('${dateKey}', '${task.id}')">${escapeHtml(task.text)}</div>`).join('');
            html += `<div class="month-cell" data-date="${dateKey}" style="${!isCurrentMonth ? 'background:#f8fafc; color:#94a3b8;' : ''}">
                        <div class="date-number">${d.getDate()}</div>
                        ${tasksHtml}
                        <button class="add-task-btn" onclick="openTaskModal('${dateKey}')">+</button>
                    </div>`;
        }
        html += `</div></div>`;
        document.getElementById('calendarContainer').innerHTML = html;
        attachDropToCalendarCells();
    }

    // Канбан-доска
    function renderKanban() {
        const statuses = [
            { key: 'gray', title: '⚪ Не распределено', color: 'gray' },
            { key: 'purple', title: '📌 Запланировано', color: 'purple' },
            { key: 'red', title: '🔴 Срочно', color: 'red' },
            { key: 'yellow', title: '🟡 Важно', color: 'yellow' },
            { key: 'blue', title: '🔵 В работе', color: 'blue' },
            { key: 'green', title: '🟢 Выполнено', color: 'green' }
        ];
        let allTasks = [];
        for (const [date, taskList] of Object.entries(tasks)) {
            for (const task of taskList) allTasks.push({ ...task, date });
        }
        for (const task of undatedTasks) allTasks.push({ ...task, date: null });
        const filtered = allTasks.filter(task => {
            const status = document.getElementById('filterStatus').value;
            const priority = document.getElementById('filterPriority').value;
            const tag = document.getElementById('filterTag').value.trim().toLowerCase();
            const search = document.getElementById('searchText').value.trim().toLowerCase();
            if (status && task.color !== status) return false;
            if (priority && task.priority !== priority) return false;
            if (tag && !(task.tags || []).some(t => t.toLowerCase().includes(tag))) return false;
            if (search && !task.text.toLowerCase().includes(search)) return false;
            return true;
        });
        let html = `<div class="kanban-board">`;
        for (let s of statuses) {
            const columnTasks = filtered.filter(t => (t.color || 'gray') === s.key);
            html += `<div class="kanban-column" data-status="${s.key}">
                        <h3>${s.title}</h3>
                        <div class="kanban-tasks-container">
                            ${columnTasks.map(task => `
                                <div class="kanban-task" draggable="true" data-id="${task.id}" data-date="${task.date || ''}" style="border-left-color: ${s.color === 'gray' ? '#94a3b8' : s.color}">
                                    <div><strong>${escapeHtml(task.text)}</strong></div>
                                    <div style="font-size:10px; color:#64748b;">${task.date || 'без даты'} ${task.startTime || ''}</div>
                                    <div>${(task.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
        }
        html += `</div>`;
        document.getElementById('calendarContainer').innerHTML = html;
        attachDragAndDropForKanban();
    }

    // "Мой день"
    function renderMyDay() {
        const today = formatDateKey(new Date());
        let dayTasks = getFilteredTasksForDate(today);
        dayTasks.sort((a,b) => (a.startTime || '00:00').localeCompare(b.startTime || '00:00'));
        const container = document.getElementById('calendarContainer');
        container.innerHTML = `
            <div class="myday-view">
                <h3>Мой день – ${new Date().toLocaleDateString('ru-RU')}</h3>
                <div id="mydayTasksList"></div>
                <button class="add-task-btn" onclick="openTaskModal('${today}')"><i class="fas fa-plus"></i> Добавить задачу</button>
            </div>
        `;
        const tasksDiv = document.getElementById('mydayTasksList');
        if (dayTasks.length === 0) tasksDiv.innerHTML = '<div class="badge">Нет задач на сегодня</div>';
        else {
            tasksDiv.innerHTML = dayTasks.map(task => `
                <div class="task-item ${task.color || 'gray'}" style="display:flex; justify-content:space-between; margin-bottom:8px;">
                    <span style="flex:1; cursor:pointer;" onclick="openTaskModal('${today}', '${task.id}')">
                        ${escapeHtml(task.text)} <span class="task-time">${task.startTime || ''}${task.endTime ? '-'+task.endTime : ''}</span>
                        ${(task.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
                    </span>
                    <button class="delete-task" onclick="deleteTask('${today}', '${task.id}')"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }
    }

    // Бэклог (без даты)
    function renderBacklog() {
        let backlog = getFilteredUndatedTasks();
        backlog.sort((a,b) => (a.createdAt || '').localeCompare(b.createdAt || ''));
        const container = document.getElementById('calendarContainer');
        container.innerHTML = `
            <div class="backlog-view">
                <h3>📌 Задачи без даты (не распределённые)</h3>
                <div id="backlogList"></div>
                <button class="add-task-btn" onclick="openTaskModal(null)"><i class="fas fa-plus"></i> Добавить задачу без даты</button>
            </div>
        `;
        const listDiv = document.getElementById('backlogList');
        if (backlog.length === 0) listDiv.innerHTML = '<div class="badge">Нет задач без даты</div>';
        else {
            listDiv.innerHTML = backlog.map(task => `
                <div class="backlog-card" draggable="true" data-id="${task.id}" data-date="" style="border-left-color: ${task.color === 'gray' ? '#94a3b8' : task.color}">
                    <div style="display:flex; justify-content:space-between;">
                        <strong>${escapeHtml(task.text)}</strong>
                        <button class="delete-task" onclick="deleteTask(null, '${task.id}')"><i class="fas fa-trash"></i></button>
                    </div>
                    <div class="task-time">${task.startTime || ''}${task.endTime ? ' - '+task.endTime : ''}</div>
                    <div>${(task.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
                    <button style="margin-top:4px; padding:2px 8px; font-size:10px;" onclick="openTaskModal(null, '${task.id}')">✏️ Редактировать</button>
                </div>
            `).join('');
        }
        attachDragFromBacklog();
    }

    // Перетаскивание из бэклога в календарь
    function attachDragFromBacklog() {
        const cards = document.querySelectorAll('.backlog-card');
        cards.forEach(card => {
            card.setAttribute('draggable', 'true');
            card.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', JSON.stringify({ id: card.dataset.id, date: null }));
                card.style.opacity = '0.5';
            });
            card.addEventListener('dragend', (e) => { card.style.opacity = '1'; });
        });
    }

    function attachDropToCalendarCells() {
        const cells = document.querySelectorAll('.week-cell, .month-cell');
        cells.forEach(cell => {
            cell.addEventListener('dragover', (e) => e.preventDefault());
            cell.addEventListener('drop', (e) => {
                e.preventDefault();
                const data = JSON.parse(e.dataTransfer.getData('text/plain'));
                const targetDate = cell.dataset.date;
                if (targetDate) {
                    updateTask(data.date, data.id, { date: targetDate });
                }
            });
        });
    }

    function attachDragAndDropForKanban() {
        const draggables = document.querySelectorAll('.kanban-task');
        const containers = document.querySelectorAll('.kanban-tasks-container');
        draggables.forEach(drag => {
            drag.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', JSON.stringify({ id: drag.dataset.id, date: drag.dataset.date || null }));
                drag.style.opacity = '0.5';
            });
            drag.addEventListener('dragend', (e) => { drag.style.opacity = '1'; });
        });
        containers.forEach(container => {
            container.addEventListener('dragover', (e) => e.preventDefault());
            container.addEventListener('drop', (e) => {
                e.preventDefault();
                const data = JSON.parse(e.dataTransfer.getData('text/plain'));
                const newStatus = container.parentElement.dataset.status;
                updateTask(data.date, data.id, { color: newStatus });
            });
        });
    }

    // Модальное окно для задач
    let currentModalDate = null;
    let currentModalTaskId = null;

    function openTaskModal(dateKey, taskId = null) {
        currentModalDate = dateKey;
        currentModalTaskId = taskId;
        let task = null;
        if (taskId) {
            if (dateKey !== null && dateKey !== undefined && tasks[dateKey]) {
                task = tasks[dateKey].find(t => t.id === taskId);
            } else {
                task = undatedTasks.find(t => t.id === taskId);
            }
        }
        document.getElementById('modalTaskText').value = task ? task.text : '';
        document.getElementById('modalTaskColor').value = task ? task.color : 'gray';
        document.getElementById('modalPriority').value = task ? task.priority : 'medium';
        document.getElementById('modalTags').value = task ? (task.tags || []).join(', ') : '';
        document.getElementById('modalStartTime').value = task ? (task.startTime || '09:00') : '09:00';
        document.getElementById('modalEndTime').value = task ? (task.endTime || '10:00') : '10:00';
        document.getElementById('modalTaskDate').value = (dateKey && dateKey !== 'null') ? dateKey : '';
        document.getElementById('taskModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('taskModal').style.display = 'none';
        currentModalDate = null;
        currentModalTaskId = null;
    }

    function saveModalTask() {
        const text = document.getElementById('modalTaskText').value.trim();
        const color = document.getElementById('modalTaskColor').value;
        const priority = document.getElementById('modalPriority').value;
        const tags = document.getElementById('modalTags').value.split(',').map(s => s.trim()).filter(s => s);
        const startTime = document.getElementById('modalStartTime').value;
        const endTime = document.getElementById('modalEndTime').value;
        let date = document.getElementById('modalTaskDate').value;
        if (!text) return;
        if (currentModalTaskId) {
            updateTask(currentModalDate, currentModalTaskId, { text, color, priority, tags, startTime, endTime, date: date || null });
        } else {
            addTask(date || null, { text, color, priority, tags, startTime, endTime });
        }
        closeModal();
    }

    function deleteModalTask() {
        if (currentModalTaskId && confirm('Удалить задачу?')) {
            deleteTask(currentModalDate, currentModalTaskId);
            closeModal();
        }
    }

    // Навигация и прочее
    let currentView = 'week';
    let currentDate = new Date();

    function updateDateLabel() {
        const label = document.getElementById('currentDateLabel');
        if (currentView === 'day') {
            label.innerText = currentDate.toLocaleDateString('ru-RU', { year: 'numeric', month: 'long', day: 'numeric' });
        } else if (currentView === 'week') {
            const week = getWeekDates(currentDate);
            label.innerText = `${week[0].toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' })} - ${week[6].toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', year: 'numeric' })}`;
        } else if (currentView === 'month') {
            label.innerText = currentDate.toLocaleDateString('ru-RU', { year: 'numeric', month: 'long' });
        } else {
            label.innerText = '';
        }
        document.getElementById('datePicker').value = formatDateKey(currentDate);
    }

    function prev() {
        if (currentView === 'day') currentDate.setDate(currentDate.getDate() - 1);
        else if (currentView === 'week') currentDate.setDate(currentDate.getDate() - 7);
        else if (currentView === 'month') currentDate.setMonth(currentDate.getMonth() - 1);
        updateDateLabel();
        renderCurrentView();
    }

    function next() {
        if (currentView === 'day') currentDate.setDate(currentDate.getDate() + 1);
        else if (currentView === 'week') currentDate.setDate(currentDate.getDate() + 7);
        else if (currentView === 'month') currentDate.setMonth(currentDate.getMonth() + 1);
        updateDateLabel();
        renderCurrentView();
    }

    function goToDate() {
        const picker = document.getElementById('datePicker');
        const newDate = new Date(picker.value);
        if (!isNaN(newDate.getTime())) {
            if (currentView === 'day') currentDate = newDate;
            else if (currentView === 'week') currentDate = newDate;
            else if (currentView === 'month') currentDate = new Date(newDate.getFullYear(), newDate.getMonth(), 1);
            updateDateLabel();
            renderCurrentView();
        }
    }

    function setView(view) {
        currentView = view;
        document.querySelectorAll('[data-view]').forEach(btn => {
            if (btn.getAttribute('data-view') === view) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        updateDateLabel();
        renderCurrentView();
    }

    function renderCurrentView() {
        if (currentView === 'day') renderDayView();
        else if (currentView === 'week') renderWeekView();
        else if (currentView === 'month') renderMonthView();
        else if (currentView === 'kanban') renderKanban();
        else if (currentView === 'myday') renderMyDay();
        else if (currentView === 'backlog') renderBacklog();
    }

    // Отчёт по статусам (печать)
    function showStatusReport() {
        let allTasks = [];
        for (const [date, taskList] of Object.entries(tasks)) {
            for (const task of taskList) allTasks.push(task);
        }
        for (const task of undatedTasks) allTasks.push(task);
        const stats = { gray:0, purple:0, red:0, yellow:0, blue:0, green:0 };
        allTasks.forEach(t => { const c = t.color || 'gray'; if (stats[c]!==undefined) stats[c]++; else stats.gray++; });
        const total = allTasks.length;
        const modal = document.createElement('div'); modal.className = 'modal'; modal.style.display = 'flex';
        modal.innerHTML = `
            <div class="modal-content" style="width:600px;">
                <h3>📊 Отчёт по статусам задач</h3>
                <div class="stat-grid">
                    <div class="stat-item"><div>⚪ Не распределено</div><div class="stat-count">${stats.gray}</div></div>
                    <div class="stat-item"><div>📌 Запланировано</div><div class="stat-count">${stats.purple}</div></div>
                    <div class="stat-item"><div>🔴 Срочно</div><div class="stat-count">${stats.red}</div></div>
                    <div class="stat-item"><div>🟡 Важно</div><div class="stat-count">${stats.yellow}</div></div>
                    <div class="stat-item"><div>🔵 В работе</div><div class="stat-count">${stats.blue}</div></div>
                    <div class="stat-item"><div>🟢 Выполнено</div><div class="stat-count">${stats.green}</div></div>
                </div>
                <p><strong>Всего задач: ${total}</strong></p>
                <div class="btn-group"><button id="printReportBtn">🖨️ Печать отчёта</button><button id="closeReportBtn">Закрыть</button></div>
            </div>
        `;
        document.body.appendChild(modal);
        modal.querySelector('#closeReportBtn').addEventListener('click', () => modal.remove());
        modal.querySelector('#printReportBtn').addEventListener('click', () => {
            const printWin = window.open('', '_blank');
            printWin.document.write(`
                <html><head><title>Отчёт по статусам задач</title><style>body{font-family:Inter;margin:20px}.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.stat-item{background:#f8fafc;padding:12px;border-radius:16px;text-align:center}.stat-count{font-size:28px;font-weight:700}</style></head>
                <body><h1>Отчёт по статусам задач</h1><div class="stat-grid">
                    <div class="stat-item">⚪ Не распределено<br><span class="stat-count">${stats.gray}</span></div>
                    <div class="stat-item">📌 Запланировано<br><span class="stat-count">${stats.purple}</span></div>
                    <div class="stat-item">🔴 Срочно<br><span class="stat-count">${stats.red}</span></div>
                    <div class="stat-item">🟡 Важно<br><span class="stat-count">${stats.yellow}</span></div>
                    <div class="stat-item">🔵 В работе<br><span class="stat-count">${stats.blue}</span></div>
                    <div class="stat-item">🟢 Выполнено<br><span class="stat-count">${stats.green}</span></div>
                </div><p>Всего задач: ${total}</p></body></html>
            `);
            printWin.document.close(); printWin.print();
        });
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
    }

    function exportICS() {
        let ics = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//SCM Planner//RU\n";
        for (const [date, taskList] of Object.entries(tasks)) {
            for (const task of taskList) {
                const start = task.startTime ? `${date}T${task.startTime.replace(':', '')}00` : `${date}T000000`;
                const end = task.endTime ? `${date}T${task.endTime.replace(':', '')}00` : `${date}T010000`;
                ics += `BEGIN:VEVENT\nUID:${task.id}\nDTSTAMP:${new Date().toISOString().replace(/[-:]/g, '').split('.')[0]}Z\nDTSTART:${start}\nDTEND:${end}\nSUMMARY:${escapeHtml(task.text)}\nDESCRIPTION:Приоритет: ${task.priority}\\nТеги: ${(task.tags || []).join(', ')}\nEND:VEVENT\n`;
            }
        }
        ics += "END:VCALENDAR";
        const blob = new Blob([ics], {type: 'text/calendar'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'scm_tasks.ics'; a.click();
    }

    function exportJSON() {
        const data = JSON.stringify({ tasks, undatedTasks }, null, 2);
        const blob = new Blob([data], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'scm_tasks.json'; a.click();
    }

    function importJSON(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                tasks = data.tasks || {};
                undatedTasks = data.undatedTasks || [];
                saveTasks();
                renderCurrentView();
                alert('Импорт выполнен');
            } catch(err) { alert('Ошибка импорта'); }
        };
        reader.readAsText(file);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    // Инициализация
    document.addEventListener('DOMContentLoaded', () => {
        loadTasks();
        currentDate = new Date();
        setView('week');
        document.getElementById('prevBtn').addEventListener('click', prev);
        document.getElementById('nextBtn').addEventListener('click', next);
        document.getElementById('datePicker').addEventListener('change', goToDate);
        document.getElementById('printViewBtn').addEventListener('click', () => window.print());
        document.getElementById('reportBtn').addEventListener('click', showStatusReport);
        document.getElementById('exportIcsBtn').addEventListener('click', exportICS);
        document.getElementById('exportJsonBtn').addEventListener('click', exportJSON);
        document.getElementById('importJsonBtn').addEventListener('click', () => document.getElementById('importFile').click());
        document.getElementById('importFile').addEventListener('change', (e) => { if(e.target.files[0]) importJSON(e.target.files[0]); e.target.value=''; });
        document.getElementById('clearFilters').addEventListener('click', () => {
            document.getElementById('filterStatus').value = '';
            document.getElementById('filterPriority').value = '';
            document.getElementById('filterTag').value = '';
            document.getElementById('searchText').value = '';
            renderCurrentView();
        });
        document.querySelectorAll('[data-view]').forEach(btn => btn.addEventListener('click', () => setView(btn.dataset.view)));

        // Модальное окно
        const modalHtml = `
            <div id="taskModal" class="modal">
                <div class="modal-content">
                    <h3 id="modalTitle">Новая задача</h3>
                    <input type="text" id="modalTaskText" placeholder="Текст задачи">
                    <select id="modalTaskColor">
                        <option value="gray">⚪ Не распределено</option>
                        <option value="purple">📌 Запланировано</option>
                        <option value="red">🔴 Срочно</option>
                        <option value="yellow">🟡 Важно</option>
                        <option value="blue">🔵 В работе</option>
                        <option value="green">🟢 Выполнено</option>
                    </select>
                    <select id="modalPriority">
                        <option value="high">🔴 Высокий приоритет</option>
                        <option value="medium">🟡 Средний приоритет</option>
                        <option value="low">🟢 Низкий приоритет</option>
                    </select>
                    <input type="text" id="modalTags" placeholder="Теги (через запятую)">
                    <div class="time-row" style="display:flex; gap:8px;">
                        <input type="time" id="modalStartTime" placeholder="Начало">
                        <input type="time" id="modalEndTime" placeholder="Конец">
                    </div>
                    <input type="date" id="modalTaskDate" placeholder="Дата (оставьте пустой для бэклога)">
                    <div class="modal-buttons">
                        <button id="modalDeleteBtn" style="background:#dc2626;">Удалить</button>
                        <button id="modalCancelBtn">Отмена</button>
                        <button id="modalSaveBtn">Сохранить</button>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        document.getElementById('taskModal').addEventListener('click', (e) => { if (e.target === document.getElementById('taskModal')) closeModal(); });
        document.getElementById('modalCancelBtn').addEventListener('click', closeModal);
        document.getElementById('modalSaveBtn').addEventListener('click', saveModalTask);
        document.getElementById('modalDeleteBtn').addEventListener('click', deleteModalTask);
        window.openTaskModal = openTaskModal;
        window.deleteTask = deleteTask;
        window.updateTask = updateTask;
    });
</script>
</body>
</html>
