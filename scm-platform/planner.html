<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ежедневник руководителя SCM – Планер и задачи</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="scm-style.css">
    <script src="scm-common.js"></script>
    <style>
        /* дополнительные стили для ежедневника */
        .daily-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
            gap: 16px;
        }
        .kpi-day-widget {
            background: #f8fafc;
            border-radius: 20px;
            padding: 12px 20px;
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            border: 1px solid #e2e8f0;
        }
        .kpi-item {
            text-align: center;
        }
        .kpi-item .value {
            font-size: 24px;
            font-weight: 700;
        }
        .kpi-item .label {
            font-size: 12px;
            color: #64748b;
        }
        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 24px;
            margin-bottom: 24px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #e2e8f0;
        }
        .card h3 {
            font-size: 18px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .event-item, .task-category-item {
            background: #f8fafc;
            padding: 8px 12px;
            margin-bottom: 8px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .event-time {
            font-weight: 600;
            color: #1e40af;
        }
        .task-checkbox {
            margin-right: 12px;
        }
        .frog-elephant {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }
        .memo-area {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            font-family: inherit;
        }
        .subtasks-list {
            margin-top: 8px;
            padding-left: 20px;
            font-size: 13px;
        }
        .btn-icon {
            background: none;
            border: none;
            color: #1e40af;
            cursor: pointer;
            font-size: 14px;
        }
        .date-nav {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        @media (max-width: 768px) {
            .two-columns, .frog-elephant {
                grid-template-columns: 1fr;
            }
        }
        @media print {
            .sidebar, .btn-group, .theme-switch, .branch-selector-container, .date-nav button, .btn-icon, .add-event, .add-task-category {
                display: none;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <aside class="sidebar">...</aside>
    <main class="main-content">
        <div class="theme-switch" id="themeToggle"><i class="fas fa-moon"></i> <span>Тёмная тема</span></div>
        <div class="daily-header">
            <div class="branch-selector-container">
                <label><i class="fas fa-building"></i> Бизнес-единица:</label>
                <select id="branchSelector"></select>
            </div>
            <div class="date-nav">
                <button id="prevDayBtn"><i class="fas fa-chevron-left"></i></button>
                <input type="date" id="datePicker" style="padding: 6px 10px; border-radius: 30px; border:1px solid #e2e8f0;">
                <button id="nextDayBtn"><i class="fas fa-chevron-right"></i></button>
                <button id="todayBtn">Сегодня</button>
            </div>
            <div>
                <button id="printDayBtn" style="background:#f59e0b;"><i class="fas fa-print"></i> Печать дня</button>
                <button id="emailDayBtn" style="background:#10b981;"><i class="fas fa-envelope"></i> Отправить на почту</button>
            </div>
        </div>

        <!-- KPI дня -->
        <div class="kpi-day-widget" id="kpiWidget"></div>

        <div class="two-columns">
            <!-- Левая колонка: Жёсткая сетка (встречи, дедлайны) -->
            <div class="card">
                <h3><i class="fas fa-calendar-alt"></i> Жёсткая сетка (встречи и сроки)</h3>
                <div id="eventsContainer"></div>
                <button id="addEventBtn" class="btn-icon"><i class="fas fa-plus"></i> Добавить событие</button>
            </div>

            <!-- Правая колонка: Гибкие задачи по категориям -->
            <div class="card">
                <h3><i class="fas fa-tasks"></i> Гибкие задачи</h3>
                <div id="categoryTabs" class="tabs" style="display:flex; gap:8px; margin-bottom:16px;"></div>
                <div id="categoryTasksContainer"></div>
                <button id="addTaskInCurrentCategoryBtn" class="btn-icon"><i class="fas fa-plus"></i> Добавить задачу</button>
            </div>
        </div>

        <!-- Лягушка и Слон -->
        <div class="frog-elephant">
            <div class="card">
                <h3><i class="fas fa-frog"></i> Лягушка (самое неприятное дело дня)</h3>
                <div id="frogContainer"></div>
                <button id="setFrogBtn" class="btn-icon">Назначить лягушку</button>
            </div>
            <div class="card">
                <h3><i class="fas fa-elephant"></i> Слон (стратегическая задача)</h3>
                <div id="elephantContainer"></div>
                <button id="setElephantBtn" class="btn-icon">Назначить слона</button>
                <button id="splitElephantBtn" class="btn-icon" style="margin-left:8px;"><i class="fas fa-cut"></i> Разбить на бифштексы</button>
            </div>
        </div>

        <!-- Мемуарник -->
        <div class="card">
            <h3><i class="fas fa-pencil-alt"></i> Мемуарник (быстрые заметки)</h3>
            <textarea id="memoText" class="memo-area" placeholder="Идеи, вопросы, важная информация..."></textarea>
        </div>

        <div class="btn-group" style="margin-top: 16px;">
            <button id="saveAllBtn">💾 Сохранить весь день</button>
        </div>
    </main>
</div>

<script>
(function() {
    // ---------- 1. Тёмная тема ----------
    const themeToggle = document.getElementById('themeToggle');
    const body = document.body;
    if (localStorage.getItem('scm_theme') === 'dark') body.classList.add('dark-theme');
    themeToggle.addEventListener('click', () => {
        body.classList.toggle('dark-theme');
        localStorage.setItem('scm_theme', body.classList.contains('dark-theme') ? 'dark' : 'light');
    });

    // ---------- 2. Филиал ----------
    let currentBranchId = 'default';
    function loadBranchSelector() {
        const branches = BranchManager.getBranches();
        const tree = BranchManager.buildTree(branches);
        const select = document.getElementById('branchSelector');
        select.innerHTML = '';
        const addOptions = (nodes, prefix = '') => {
            for (let node of nodes) {
                const opt = document.createElement('option');
                opt.value = node.id;
                opt.textContent = prefix + node.name + ' (' + node.type + ')';
                if (node.id === currentBranchId) opt.selected = true;
                select.appendChild(opt);
                if (node.children) addOptions(node.children, prefix + '— ');
            }
        };
        addOptions(tree);
        select.addEventListener('change', (e) => {
            setCurrentBranch(e.target.value);
            currentBranchId = e.target.value;
            loadDayData();
            renderKPIWidget();
        });
    }

    // ---------- 3. KPI дня ----------
    function renderKPIWidget() {
        const container = document.getElementById('kpiWidget');
        const kpis = [
            { id: 'otd', label: 'OTD (%)', target: 96 },
            { id: 'fillrate', label: 'Fill Rate (%)', target: 95 },
            { id: 'turnover', label: 'Оборачиваемость (раз)', target: 5 },
            { id: 'pickErrors', label: 'Ошибки сборки (%)', target: 0.8, lowerBetter: true }
        ];
        let html = '';
        for (let k of kpis) {
            let val = SCMData.loadKPI(k.id, currentBranchId);
            let value = val ? val.result : '—';
            let color = '';
            if (value !== '—') {
                if (k.lowerBetter) color = value <= k.target ? 'kpi-good' : 'kpi-bad';
                else color = value >= k.target ? 'kpi-good' : 'kpi-bad';
            }
            html += `<div class="kpi-item"><div class="value ${color}">${value}</div><div class="label">${k.label}</div></div>`;
        }
        container.innerHTML = html;
    }

    // ---------- 4. Работа с данными дня (хранилище) ----------
    let currentDate = new Date();
    let dayData = {
        events: [],      // { id, time, title }
        tasks: [],       // { id, category, text, completed, priority, frog, elephant, parentId, subtasks }
        frogTaskId: null,
        elephantTaskId: null,
        memo: ''
    };
    const categories = ['Закупки', 'Логистика', 'S&OP', 'Проекты'];
    let currentCategory = categories[0];

    function getStorageKey() {
        const dateStr = currentDate.toISOString().split('T')[0];
        return `daily_planner_${currentBranchId}_${dateStr}`;
    }

    function loadDayData() {
        const key = getStorageKey();
        const saved = localStorage.getItem(key);
        if (saved) {
            dayData = JSON.parse(saved);
        } else {
            dayData = { events: [], tasks: [], frogTaskId: null, elephantTaskId: null, memo: '' };
        }
        // синхронизация с глобальными задачами планера (scm_planner_tasks_v5) – импортируем задачи, у которых есть поле date = текущая дата и branchId
        const plannerTasks = getPlannerTasks(currentBranchId);
        const dateStr = currentDate.toISOString().split('T')[0];
        const dayPlannerTasks = [];
        for (let [date, list] of Object.entries(plannerTasks)) {
            if (date === dateStr && Array.isArray(list)) {
                for (let t of list) {
                    if (!dayData.tasks.find(tt => tt.id === t.id)) {
                        dayData.tasks.push({
                            id: t.id,
                            category: t.category || 'Закупки',
                            text: t.text,
                            completed: t.completed || false,
                            priority: t.priority,
                            frog: t.frog || false,
                            elephant: t.elephant || false,
                            parentId: t.parentId || null,
                            subtasks: t.subtasks || []
                        });
                    }
                }
                break;
            }
        }
        renderEvents();
        renderCategoryTabs();
        renderCategoryTasks();
        renderFrogElephant();
        document.getElementById('memoText').value = dayData.memo || '';
    }

    function saveDayData() {
        const key = getStorageKey();
        localStorage.setItem(key, JSON.stringify(dayData));
        // также синхронизируем задачи с глобальным планером
        const plannerTasks = getPlannerTasks(currentBranchId);
        const dateStr = currentDate.toISOString().split('T')[0];
        if (!plannerTasks[dateStr]) plannerTasks[dateStr] = [];
        // обновляем/добавляем задачи из dayData.tasks
        for (let task of dayData.tasks) {
            const existingIndex = plannerTasks[dateStr].findIndex(t => t.id === task.id);
            const plannerTask = {
                id: task.id,
                text: task.text,
                completed: task.completed,
                priority: task.priority,
                category: task.category,
                frog: task.frog,
                elephant: task.elephant,
                parentId: task.parentId,
                subtasks: task.subtasks,
                date: dateStr,
                branchId: currentBranchId
            };
            if (existingIndex !== -1) {
                plannerTasks[dateStr][existingIndex] = plannerTask;
            } else {
                plannerTasks[dateStr].push(plannerTask);
            }
        }
        savePlannerTasks(plannerTasks, currentBranchId);
        alert('День сохранён');
    }

    // ---------- 5. Жёсткая сетка (события) ----------
    function renderEvents() {
        const container = document.getElementById('eventsContainer');
        if (!dayData.events.length) {
            container.innerHTML = '<div class="badge">Нет событий</div>';
        } else {
            container.innerHTML = dayData.events.map(ev => `
                <div class="event-item">
                    <div><span class="event-time">${ev.time}</span> ${escapeHtml(ev.title)}</div>
                    <button class="delete-event btn-icon" data-id="${ev.id}"><i class="fas fa-trash-alt"></i></button>
                </div>
            `).join('');
            document.querySelectorAll('.delete-event').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = btn.getAttribute('data-id');
                    dayData.events = dayData.events.filter(ev => ev.id !== id);
                    renderEvents();
                    saveDayData();
                });
            });
        }
    }
    document.getElementById('addEventBtn').addEventListener('click', () => {
        const time = prompt('Время (например, 14:00):', '12:00');
        if (!time) return;
        const title = prompt('Описание события:', '');
        if (!title) return;
        dayData.events.push({ id: Date.now().toString(), time, title });
        renderEvents();
        saveDayData();
    });

    // ---------- 6. Гибкие задачи по категориям ----------
    function renderCategoryTabs() {
        const container = document.getElementById('categoryTabs');
        container.innerHTML = categories.map(cat => `<button class="tab ${currentCategory === cat ? 'active' : ''}" data-category="${cat}">${cat}</button>`).join('');
        document.querySelectorAll('#categoryTabs .tab').forEach(btn => {
            btn.addEventListener('click', () => {
                currentCategory = btn.getAttribute('data-category');
                renderCategoryTabs();
                renderCategoryTasks();
            });
        });
    }
    function renderCategoryTasks() {
        const container = document.getElementById('categoryTasksContainer');
        const filtered = dayData.tasks.filter(t => t.category === currentCategory && !t.frog && !t.elephant);
        if (!filtered.length) {
            container.innerHTML = '<div class="badge">Нет задач</div>';
            return;
        }
        container.innerHTML = filtered.map(task => `
            <div class="task-category-item">
                <div style="display:flex; align-items:center; gap:8px;">
                    <input type="checkbox" class="task-complete" data-id="${task.id}" ${task.completed ? 'checked' : ''}>
                    <span style="${task.completed ? 'text-decoration:line-through; color:#94a3b8;' : ''}">${escapeHtml(task.text)}</span>
                </div>
                <div>
                    <button class="edit-task btn-icon" data-id="${task.id}"><i class="fas fa-edit"></i></button>
                    <button class="delete-task btn-icon" data-id="${task.id}"><i class="fas fa-trash-alt"></i></button>
                </div>
            </div>
        `).join('');
        attachTaskEvents();
    }
    function attachTaskEvents() {
        document.querySelectorAll('.task-complete').forEach(cb => {
            cb.addEventListener('change', (e) => {
                const id = cb.getAttribute('data-id');
                const task = dayData.tasks.find(t => t.id === id);
                if (task) task.completed = cb.checked;
                saveDayData();
                renderCategoryTasks();
                renderFrogElephant();
            });
        });
        document.querySelectorAll('.edit-task').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = btn.getAttribute('data-id');
                const task = dayData.tasks.find(t => t.id === id);
                if (!task) return;
                const newText = prompt('Редактировать задачу:', task.text);
                if (newText) { task.text = newText; saveDayData(); renderCategoryTasks(); renderFrogElephant(); }
            });
        });
        document.querySelectorAll('.delete-task').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = btn.getAttribute('data-id');
                dayData.tasks = dayData.tasks.filter(t => t.id !== id);
                if (dayData.frogTaskId === id) dayData.frogTaskId = null;
                if (dayData.elephantTaskId === id) dayData.elephantTaskId = null;
                saveDayData();
                renderCategoryTasks();
                renderFrogElephant();
            });
        });
    }
    document.getElementById('addTaskInCurrentCategoryBtn').addEventListener('click', () => {
        const text = prompt('Текст задачи:');
        if (!text) return;
        const newTask = {
            id: Date.now().toString(),
            category: currentCategory,
            text: text,
            completed: false,
            priority: 'medium',
            frog: false,
            elephant: false,
            parentId: null,
            subtasks: []
        };
        dayData.tasks.push(newTask);
        saveDayData();
        renderCategoryTasks();
    });

    // ---------- 7. Лягушка и Слон ----------
    function renderFrogElephant() {
        const frogTask = dayData.tasks.find(t => t.id === dayData.frogTaskId);
        const frogContainer = document.getElementById('frogContainer');
        if (frogTask) {
            frogContainer.innerHTML = `<div class="task-category-item"><span>${escapeHtml(frogTask.text)}</span><button class="remove-frog btn-icon" data-id="${frogTask.id}"><i class="fas fa-times"></i></button></div>`;
            document.querySelector('.remove-frog')?.addEventListener('click', () => { dayData.frogTaskId = null; saveDayData(); renderFrogElephant(); });
        } else {
            frogContainer.innerHTML = '<div class="badge">Лягушка не назначена</div>';
        }

        const elephantTask = dayData.tasks.find(t => t.id === dayData.elephantTaskId);
        const elephantContainer = document.getElementById('elephantContainer');
        if (elephantTask) {
            let subtasksHtml = '';
            if (elephantTask.subtasks && elephantTask.subtasks.length) {
                subtasksHtml = `<div class="subtasks-list">Подзадачи:<ul>${elephantTask.subtasks.map(st => `<li>${escapeHtml(st)}</li>`).join('')}</ul></div>`;
            }
            elephantContainer.innerHTML = `<div><strong>${escapeHtml(elephantTask.text)}</strong>${subtasksHtml}<button class="remove-elephant btn-icon" data-id="${elephantTask.id}"><i class="fas fa-times"></i></button></div>`;
            document.querySelector('.remove-elephant')?.addEventListener('click', () => { dayData.elephantTaskId = null; saveDayData(); renderFrogElephant(); });
        } else {
            elephantContainer.innerHTML = '<div class="badge">Слон не назначен</div>';
        }
    }
    document.getElementById('setFrogBtn').addEventListener('click', () => {
        const taskText = prompt('Какая задача сегодня лягушка?', '');
        if (!taskText) return;
        const newTask = {
            id: Date.now().toString(),
            category: 'Закупки',
            text: taskText,
            completed: false,
            priority: 'high',
            frog: true,
            elephant: false,
            parentId: null,
            subtasks: []
        };
        dayData.tasks.push(newTask);
        dayData.frogTaskId = newTask.id;
        saveDayData();
        renderCategoryTasks();
        renderFrogElephant();
    });
    document.getElementById('setElephantBtn').addEventListener('click', () => {
        const taskText = prompt('Какая стратегическая задача (слон)?', '');
        if (!taskText) return;
        const newTask = {
            id: Date.now().toString(),
            category: 'Проекты',
            text: taskText,
            completed: false,
            priority: 'high',
            frog: false,
            elephant: true,
            parentId: null,
            subtasks: []
        };
        dayData.tasks.push(newTask);
        dayData.elephantTaskId = newTask.id;
        saveDayData();
        renderCategoryTasks();
        renderFrogElephant();
    });
    document.getElementById('splitElephantBtn').addEventListener('click', () => {
        const elephant = dayData.tasks.find(t => t.id === dayData.elephantTaskId);
        if (!elephant) { alert('Сначала назначьте слона'); return; }
        const subtasksInput = prompt('Разбейте слона на подзадачи (через запятую):', '');
        if (subtasksInput) {
            elephant.subtasks = subtasksInput.split(',').map(s => s.trim());
            saveDayData();
            renderFrogElephant();
            // также создаём эти подзадачи как отдельные задачи в категории "Проекты" (бифштексы)
            for (let sub of elephant.subtasks) {
                dayData.tasks.push({
                    id: Date.now().toString() + Math.random(),
                    category: 'Проекты',
                    text: `[Бифштекс] ${sub}`,
                    completed: false,
                    priority: 'medium',
                    frog: false,
                    elephant: false,
                    parentId: elephant.id,
                    subtasks: []
                });
            }
            saveDayData();
            renderCategoryTasks();
        }
    });

    // ---------- 8. Мемуарник ----------
    document.getElementById('memoText').addEventListener('change', () => {
        dayData.memo = document.getElementById('memoText').value;
        saveDayData();
    });

    // ---------- 9. Сохранение и навигация по дням ----------
    document.getElementById('saveAllBtn').addEventListener('click', () => {
        dayData.memo = document.getElementById('memoText').value;
        saveDayData();
    });
    function changeDate(delta) {
        currentDate.setDate(currentDate.getDate() + delta);
        updateDatePicker();
        loadDayData();
    }
    function updateDatePicker() {
        const dateStr = currentDate.toISOString().split('T')[0];
        document.getElementById('datePicker').value = dateStr;
        document.querySelector('.daily-header h2')?.remove();
    }
    document.getElementById('prevDayBtn').addEventListener('click', () => changeDate(-1));
    document.getElementById('nextDayBtn').addEventListener('click', () => changeDate(1));
    document.getElementById('todayBtn').addEventListener('click', () => { currentDate = new Date(); updateDatePicker(); loadDayData(); });
    document.getElementById('datePicker').addEventListener('change', (e) => {
        currentDate = new Date(e.target.value);
        loadDayData();
    });

    // ---------- 10. Печать на бланке и отправка на почту ----------
    window.printDayWithLogo = function() {
        const mainContent = document.querySelector('.main-content');
        if (!mainContent) return;
        const clone = mainContent.cloneNode(true);
        clone.querySelectorAll('.theme-switch, .btn-group, .btn-icon, .branch-selector-container, .date-nav button, .add-event, .add-task-category, .remove-frog, .remove-elephant, .delete-event, .edit-task, .delete-task, .task-complete, #saveAllBtn').forEach(el => el.remove());
        const logoUrl = 'https://raw.githubusercontent.com/965910-bit/Panibratsky-Dmitry/main/scm-platform/assets/LargeTile.scale-200.png';
        const printWindow = window.open('', '_blank');
        printWindow.document.write(`
            <!DOCTYPE html>
            <html><head><meta charset="UTF-8"><title>Ежедневник SCM</title>
            <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
            <style>
                body { font-family: Inter; margin: 20px; }
                .print-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #1e40af; margin-bottom: 20px; padding-bottom: 10px; }
                .logo-img { height: 50px; }
                .contact-info { font-size: 10pt; line-height: 1.4; }
                .print-footer { margin-top: 40px; border-top: 1px solid #ccc; padding-top: 20px; display: flex; justify-content: space-between; gap: 20px; }
                .sign-line { border-bottom: 1px solid #000; display: inline-block; min-width: 180px; }
                .card { break-inside: avoid; }
            </style>
            </head><body>
            <div class="print-header">
                <div style="display:flex;align-items:center;gap:20px"><img src="${logoUrl}" class="logo-img"><div class="contact-info">Дмитрий Панибратский<br>Эксперт по SCM и логистике<br>scm-news.ru – экспертный портал<br>scm-news.online – Академия SCM<br>dmitry@scm-news.ru</div></div>
                <div>${new Date().toLocaleString()}</div>
            </div>
            ${clone.innerHTML}
            <div class="print-footer">
                <div>Ф.И.О. исполнителя: <span class="sign-line">_________________________</span></div>
                <div>Подпись: <span class="sign-line">_________________________</span></div>
                <div>Дата: ${new Date().toLocaleDateString()}</div>
            </div>
            <script>window.onload = () => { window.print(); window.onafterprint = () => window.close(); }<\/script>
            </body></html>
        `);
        printWindow.document.close();
    };
    window.sendDayByEmail = function() {
        const mainContent = document.querySelector('.main-content');
        if (!mainContent) return;
        const text = mainContent.innerText;
        const subject = encodeURIComponent(`Ежедневник SCM ${currentDate.toISOString().split('T')[0]}`);
        const body = encodeURIComponent(`Добрый день!\n\n${text}\n\n--\nСгенерировано автоматически.`);
        window.location.href = `mailto:?subject=${subject}&body=${body}`;
    };
    document.getElementById('printDayBtn').addEventListener('click', () => window.printDayWithLogo());
    document.getElementById('emailDayBtn').addEventListener('click', () => window.sendDayByEmail());

    // ---------- 11. Инициализация ----------
    function init() {
        BranchManager.ensureDefaultBranch();
        currentBranchId = getCurrentBranch();
        loadBranchSelector();
        renderKPIWidget();
        currentDate = new Date();
        updateDatePicker();
        loadDayData();
    }
    init();
})();
function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
</script>
</body>
</html>
