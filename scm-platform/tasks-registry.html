<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реестр поручений SCM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="scm-style.css">
    <script src="scm-common.js"></script>
    <style>
        .registry-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
            gap: 16px;
        }
        .filter-bar {
            background: white;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
            border: 1px solid #e2e8f0;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .filter-group label {
            font-size: 12px;
            font-weight: 500;
        }
        .filter-group select, .filter-group input {
            padding: 6px 10px;
            border-radius: 20px;
            border: 1px solid #cbd5e1;
            background: white;
        }
        .tasks-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 20px;
            overflow-x: auto;
            display: block;
        }
        .tasks-table th, .tasks-table td {
            border: 1px solid #e2e8f0;
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }
        .tasks-table th {
            background: #eef2ff;
            font-weight: 600;
        }
        .status-new { background-color: #e0f2fe; }
        .status-progress { background-color: #fef9c3; }
        .status-review { background-color: #fed7aa; }
        .status-done { background-color: #dcfce7; }
        .status-overdue { background-color: #fee2e2; color: #dc2626; font-weight: bold; }
        .priority-high { border-left: 4px solid #dc2626; }
        .priority-medium { border-left: 4px solid #f59e0b; }
        .priority-low { border-left: 4px solid #10b981; }
        .btn-icon {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            margin: 0 4px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 24px;
            width: 500px;
            max-width: 90%;
            max-height: 80%;
            overflow-y: auto;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
        }
        @media (max-width: 768px) {
            .filter-bar { flex-direction: column; align-items: stretch; }
            .tasks-table { font-size: 12px; }
        }
        @media print {
            .sidebar, .filter-bar, .btn-group, .branch-selector-container, .theme-switch, .btn-icon, .modal {
                display: none;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <aside class="sidebar">...</aside>
    <main class="main-content">
        <div class="theme-switch" id="themeToggle"><i class="fas fa-moon"></i> <span>Тёмная тема</span></div>
        <div class="registry-header">
            <h1>📋 Реестр поручений SCM</h1>
            <div class="branch-selector-container">
                <label><i class="fas fa-building"></i> Бизнес-единица:</label>
                <select id="branchSelector"></select>
            </div>
            <div>
                <button id="printRegistryBtn" style="background:#f59e0b;"><i class="fas fa-print"></i> Печать реестра</button>
                <button id="emailRegistryBtn" style="background:#10b981;"><i class="fas fa-envelope"></i> Отправить на почту</button>
                <button id="addTaskBtn"><i class="fas fa-plus"></i> Новое поручение</button>
            </div>
        </div>

        <div class="filter-bar">
            <div class="filter-group"><label>Статус</label><select id="filterStatus"><option value="">Все</option><option value="new">Новое</option><option value="progress">В работе</option><option value="review">На согласовании</option><option value="done">Готово</option><option value="overdue">Просрочено</option></select></div>
            <div class="filter-group"><label>Приоритет</label><select id="filterPriority"><option value="">Все</option><option value="high">Высокий</option><option value="medium">Средний</option><option value="low">Низкий</option></select></div>
            <div class="filter-group"><label>Ответственный</label><input type="text" id="filterAssignee" placeholder="ФИО"></div>
            <div class="filter-group"><label>Срок до</label><input type="date" id="filterDueDate"></div>
            <div class="filter-group"><label>Категория (тема)</label><select id="filterTheme"><option value="">Все</option><option value="Импорт из Китая">Импорт из Китая</option><option value="Запуск поставщика">Запуск поставщика</option><option value="Внедрение WMS">Внедрение WMS</option><option value="Оптимизация маршрутов">Оптимизация маршрутов</option><option value="Таможня">Таможня</option></select></div>
            <button id="resetFiltersBtn" class="secondary">Сбросить</button>
        </div>

        <div style="overflow-x: auto;">
            <table class="tasks-table" id="tasksTable">
                <thead>
                    <tr>
                        <th>ID</th><th>Содержание</th><th>Ответственный</th><th>Срок</th><th>Приоритет</th><th>Статус</th><th>Контролёр</th><th>Факт выполнения</th><th>Связь с совещанием</th><th>Категория</th><th>Действия</th>
                    </tr>
                </thead>
                <tbody id="tasksTableBody"></tbody>
            </table>
        </div>
    </main>
</div>

<!-- Модальное окно для создания/редактирования поручения -->
<div id="taskModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Новое поручение</h3>
        <div class="form-group"><label>Содержание</label><textarea id="taskText" rows="3"></textarea></div>
        <div class="form-group"><label>Ответственный</label><input type="text" id="taskAssignee"></div>
        <div class="form-group"><label>Срок исполнения</label><input type="date" id="taskDueDate"></div>
        <div class="form-group"><label>Приоритет</label><select id="taskPriority"><option value="high">Высокий</option><option value="medium">Средний</option><option value="low">Низкий</option></select></div>
        <div class="form-group"><label>Статус</label><select id="taskStatus"><option value="new">Новое</option><option value="progress">В работе</option><option value="review">На согласовании</option><option value="done">Готово</option></select></div>
        <div class="form-group"><label>Контролёр</label><input type="text" id="taskController"></div>
        <div class="form-group"><label>Категория (тематическая выборка)</label><select id="taskTheme"><option value="">-- Без категории --</option><option value="Импорт из Китая">Импорт из Китая</option><option value="Запуск поставщика">Запуск поставщика</option><option value="Внедрение WMS">Внедрение WMS</option><option value="Оптимизация маршрутов">Оптимизация маршрутов</option><option value="Таможня">Таможня</option></select></div>
        <div class="form-group"><label>Связь с совещанием (ID протокола)</label><input type="text" id="taskMeetingLink" placeholder="например, mtg_123"></div>
        <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:20px;">
            <button id="modalCancelBtn">Отмена</button>
            <button id="modalSaveBtn">Сохранить</button>
        </div>
    </div>
</div>

<script>
(function() {
    // ---- Тёмная тема ----
    const themeToggle = document.getElementById('themeToggle');
    const body = document.body;
    if (localStorage.getItem('scm_theme') === 'dark') body.classList.add('dark-theme');
    themeToggle.addEventListener('click', () => {
        body.classList.toggle('dark-theme');
        localStorage.setItem('scm_theme', body.classList.contains('dark-theme') ? 'dark' : 'light');
    });

    // ---- Филиал ----
    let currentBranchId = 'default';
    function loadBranchSelector() {
        const branches = BranchManager.getBranches();
        const tree = BranchManager.buildTree(branches);
        const select = document.getElementById('branchSelector');
        select.innerHTML = '';
        const addOptions = (nodes, prefix = '') => {
            for (let node of nodes) {
                const opt = document.createElement('option');
                opt.value = node.id;
                opt.textContent = prefix + node.name + ' (' + node.type + ')';
                if (node.id === currentBranchId) opt.selected = true;
                select.appendChild(opt);
                if (node.children) addOptions(node.children, prefix + '— ');
            }
        };
        addOptions(tree);
        select.addEventListener('change', (e) => {
            setCurrentBranch(e.target.value);
            currentBranchId = e.target.value;
            loadTasks();
        });
    }

    // ---- Хранилище поручений ----
    function getStorageKey() { return `tasks_registry_${currentBranchId}`; }
    function loadTasksFromStorage() {
        const data = localStorage.getItem(getStorageKey());
        return data ? JSON.parse(data) : [];
    }
    function saveTasksToStorage(tasks) {
        localStorage.setItem(getStorageKey(), JSON.stringify(tasks));
    }

    // ---- Синхронизация с планером (задачи, у которых есть date) ----
    function syncWithPlanner(tasks) {
        // получаем все задачи планера для текущего филиала
        const plannerTasks = getPlannerTasks(currentBranchId);
        // удаляем из планера старые задачи с типом registry_task (если они были)
        for (let date in plannerTasks) {
            plannerTasks[date] = plannerTasks[date].filter(t => t.source !== 'registry');
        }
        // Добавляем поручения как задачи в планер (на дату срока, если срок указан, иначе в бэклог)
        for (let task of tasks) {
            const targetDate = task.dueDate ? task.dueDate : 'backlog';
            if (!plannerTasks[targetDate]) plannerTasks[targetDate] = [];
            plannerTasks[targetDate].push({
                id: `reg_${task.id}`,
                text: task.text,
                completed: task.status === 'done',
                priority: task.priority,
                category: task.theme || 'Поручения',
                source: 'registry',
                originalId: task.id,
                dueDate: task.dueDate,
                assignee: task.assignee,
                status: task.status,
                branchId: currentBranchId
            });
        }
        savePlannerTasks(plannerTasks, currentBranchId);
    }

    // ---- Рендер таблицы с фильтрацией ----
    let allTasks = [];
    function renderTasks() {
        const statusFilter = document.getElementById('filterStatus').value;
        const priorityFilter = document.getElementById('filterPriority').value;
        const assigneeFilter = document.getElementById('filterAssignee').value.toLowerCase();
        const dueDateFilter = document.getElementById('filterDueDate').value;
        const themeFilter = document.getElementById('filterTheme').value;

        let filtered = allTasks.filter(t => {
            if (statusFilter && t.status !== statusFilter) return false;
            if (priorityFilter && t.priority !== priorityFilter) return false;
            if (assigneeFilter && !t.assignee.toLowerCase().includes(assigneeFilter)) return false;
            if (dueDateFilter && t.dueDate !== dueDateFilter) return false;
            if (themeFilter && t.theme !== themeFilter) return false;
            return true;
        });

        // Определяем просроченные
        const today = new Date().toISOString().split('T')[0];
        filtered = filtered.map(t => ({
            ...t,
            isOverdue: t.dueDate && t.dueDate < today && t.status !== 'done'
        }));

        const tbody = document.getElementById('tasksTableBody');
        tbody.innerHTML = '';
        for (let t of filtered) {
            const row = tbody.insertRow();
            const statusClass = t.isOverdue ? 'status-overdue' : 
                (t.status === 'new' ? 'status-new' : (t.status === 'progress' ? 'status-progress' : (t.status === 'review' ? 'status-review' : (t.status === 'done' ? 'status-done' : ''))));
            row.className = statusClass;
            row.insertCell(0).textContent = t.id;
            row.insertCell(1).textContent = t.text;
            row.insertCell(2).textContent = t.assignee;
            row.insertCell(3).textContent = t.dueDate || '—';
            row.insertCell(4).innerHTML = `<span class="priority-${t.priority}">${t.priority === 'high' ? 'Высокий' : (t.priority === 'medium' ? 'Средний' : 'Низкий')}</span>`;
            row.insertCell(5).textContent = t.status === 'new' ? 'Новое' : (t.status === 'progress' ? 'В работе' : (t.status === 'review' ? 'На согласовании' : 'Готово'));
            row.insertCell(6).textContent = t.controller || '—';
            row.insertCell(7).textContent = t.completedDate || '—';
            row.insertCell(8).textContent = t.meetingLink || '—';
            row.insertCell(9).textContent = t.theme || '—';
            const actions = row.insertCell(10);
            const editBtn = document.createElement('button'); editBtn.innerHTML = '<i class="fas fa-edit"></i>'; editBtn.className = 'btn-icon'; editBtn.onclick = () => openEditModal(t.id);
            const deleteBtn = document.createElement('button'); deleteBtn.innerHTML = '<i class="fas fa-trash-alt"></i>'; deleteBtn.className = 'btn-icon'; deleteBtn.onclick = () => { if(confirm('Удалить поручение?')) deleteTask(t.id); };
            actions.appendChild(editBtn);
            actions.appendChild(deleteBtn);
        }
    }

    function loadTasks() {
        allTasks = loadTasksFromStorage();
        renderTasks();
    }

    function saveTasksAndSync() {
        saveTasksToStorage(allTasks);
        syncWithPlanner(allTasks);
        renderTasks();
    }

    function addTask(task) {
        const newId = Date.now().toString();
        const newTask = { id: newId, ...task, createdAt: new Date().toISOString() };
        allTasks.push(newTask);
        saveTasksAndSync();
    }

    function updateTask(id, updates) {
        const index = allTasks.findIndex(t => t.id === id);
        if (index !== -1) {
            allTasks[index] = { ...allTasks[index], ...updates, updatedAt: new Date().toISOString() };
            if (updates.status === 'done') allTasks[index].completedDate = new Date().toISOString().split('T')[0];
            saveTasksAndSync();
        }
    }

    function deleteTask(id) {
        allTasks = allTasks.filter(t => t.id !== id);
        saveTasksAndSync();
    }

    // ---- Модальное окно для создания/редактирования ----
    let editId = null;
    function openEditModal(id) {
        editId = id;
        const task = allTasks.find(t => t.id === id);
        if (task) {
            document.getElementById('modalTitle').innerText = 'Редактировать поручение';
            document.getElementById('taskText').value = task.text;
            document.getElementById('taskAssignee').value = task.assignee;
            document.getElementById('taskDueDate').value = task.dueDate || '';
            document.getElementById('taskPriority').value = task.priority;
            document.getElementById('taskStatus').value = task.status;
            document.getElementById('taskController').value = task.controller || '';
            document.getElementById('taskTheme').value = task.theme || '';
            document.getElementById('taskMeetingLink').value = task.meetingLink || '';
        } else {
            editId = null;
            document.getElementById('modalTitle').innerText = 'Новое поручение';
            document.getElementById('taskText').value = '';
            document.getElementById('taskAssignee').value = '';
            document.getElementById('taskDueDate').value = '';
            document.getElementById('taskPriority').value = 'medium';
            document.getElementById('taskStatus').value = 'new';
            document.getElementById('taskController').value = '';
            document.getElementById('taskTheme').value = '';
            document.getElementById('taskMeetingLink').value = '';
        }
        document.getElementById('taskModal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('taskModal').style.display = 'none'; editId = null; }
    function saveModal() {
        const text = document.getElementById('taskText').value.trim();
        if (!text) { alert('Введите содержание'); return; }
        const taskData = {
            text: text,
            assignee: document.getElementById('taskAssignee').value.trim(),
            dueDate: document.getElementById('taskDueDate').value || null,
            priority: document.getElementById('taskPriority').value,
            status: document.getElementById('taskStatus').value,
            controller: document.getElementById('taskController').value.trim(),
            theme: document.getElementById('taskTheme').value,
            meetingLink: document.getElementById('taskMeetingLink').value.trim()
        };
        if (editId) {
            updateTask(editId, taskData);
        } else {
            addTask(taskData);
        }
        closeModal();
    }

    document.getElementById('addTaskBtn').addEventListener('click', () => openEditModal(null));
    document.getElementById('modalCancelBtn').addEventListener('click', closeModal);
    document.getElementById('modalSaveBtn').addEventListener('click', saveModal);
    document.getElementById('resetFiltersBtn').addEventListener('click', () => {
        document.getElementById('filterStatus').value = '';
        document.getElementById('filterPriority').value = '';
        document.getElementById('filterAssignee').value = '';
        document.getElementById('filterDueDate').value = '';
        document.getElementById('filterTheme').value = '';
        renderTasks();
    });
    document.getElementById('filterStatus').addEventListener('change', renderTasks);
    document.getElementById('filterPriority').addEventListener('change', renderTasks);
    document.getElementById('filterAssignee').addEventListener('input', renderTasks);
    document.getElementById('filterDueDate').addEventListener('change', renderTasks);
    document.getElementById('filterTheme').addEventListener('change', renderTasks);

    // ---- Печать и отправка ----
    window.printRegistryWithLogo = function() {
        const mainContent = document.querySelector('.main-content');
        if (!mainContent) return;
        const clone = mainContent.cloneNode(true);
        clone.querySelectorAll('.filter-bar, .branch-selector-container, .theme-switch, .btn-icon, #addTaskBtn, #printRegistryBtn, #emailRegistryBtn, .btn-group').forEach(el => el.remove());
        const logoUrl = 'https://raw.githubusercontent.com/965910-bit/Panibratsky-Dmitry/main/scm-platform/assets/LargeTile.scale-200.png';
        const printWindow = window.open('', '_blank');
        printWindow.document.write(`
            <!DOCTYPE html>
            <html><head><meta charset="UTF-8"><title>Реестр поручений SCM</title>
            <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
            <style>
                body { font-family: Inter; margin: 20px; }
                .print-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #1e40af; margin-bottom: 20px; padding-bottom: 10px; }
                .logo-img { height: 50px; }
                .contact-info { font-size: 10pt; line-height: 1.4; }
                .print-footer { margin-top: 40px; border-top: 1px solid #ccc; padding-top: 20px; display: flex; justify-content: space-between; gap: 20px; }
                .sign-line { border-bottom: 1px solid #000; display: inline-block; min-width: 180px; }
                table { border-collapse: collapse; width: 100%; }
                th, td { border: 1px solid #ccc; padding: 6px; }
            </style>
            </head><body>
            <div class="print-header">
                <div style="display:flex;align-items:center;gap:20px"><img src="${logoUrl}" class="logo-img"><div class="contact-info">Дмитрий Панибратский<br>Эксперт по SCM и логистике<br>scm-news.ru – экспертный портал<br>scm-news.online – Академия SCM<br>dmitry@scm-news.ru</div></div>
                <div>${new Date().toLocaleString()}</div>
            </div>
            ${clone.innerHTML}
            <div class="print-footer">
                <div>Ф.И.О. исполнителя: <span class="sign-line">_________________________</span></div>
                <div>Подпись: <span class="sign-line">_________________________</span></div>
                <div>Дата: ${new Date().toLocaleDateString()}</div>
            </div>
            <script>window.onload = () => { window.print(); window.onafterprint = () => window.close(); }<\/script>
            </body></html>
        `);
        printWindow.document.close();
    };
    window.sendRegistryByEmail = function() {
        const mainContent = document.querySelector('.main-content');
        if (!mainContent) return;
        const text = mainContent.innerText;
        const subject = encodeURIComponent('Реестр поручений SCM');
        const body = encodeURIComponent(`Добрый день!\n\n${text}\n\n--\nСгенерировано автоматически.`);
        window.location.href = `mailto:?subject=${subject}&body=${body}`;
    };
    document.getElementById('printRegistryBtn').addEventListener('click', () => window.printRegistryWithLogo());
    document.getElementById('emailRegistryBtn').addEventListener('click', () => window.sendRegistryByEmail());

    // ---- Инициализация ----
    function init() {
        BranchManager.ensureDefaultBranch();
        currentBranchId = getCurrentBranch();
        loadBranchSelector();
        loadTasks();
        // Подписываемся на изменение филиала из других вкладок
        window.addEventListener('branch-changed', () => {
            currentBranchId = getCurrentBranch();
            loadTasks();
        });
    }
    init();
})();
</script>
</body>
</html>
