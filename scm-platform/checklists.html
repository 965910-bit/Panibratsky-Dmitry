<!DOCTYPE html>
<html lang="ru">

        }

        }

        }
        .fact-unit {

            background: #e2e8f0;

<div class="app-container">
    <aside class="sidebar">...</aside>
    <main class="main-content">
        <div class="theme-switch" id="themeToggle"><i class="fas fa-moon"></i> <span>Тёмная тема</span></div>
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 20px;">
            <h1>✅ Чек-листы SCM (расширенная версия)</h1>
            <div class="branch-selector-container">
                <label><i class="fas fa-building"></i> Бизнес-единица:</label>
                <select id="branchSelector"></select>
            </div>
        </div>
        <div class="mode-switch" id="modeSwitch">
            <button id="auditModeBtn" class="active">🔍 Провести проверку</button>
            <button id="constructorModeBtn">🛠️ Конструктор шаблонов</button>
        </div>

        <div id="auditModePanel">
            <div class="template-selector">
                <label>Шаблон чек-листа: </label>
                <select id="auditTemplateSelect">
                    <option value="">-- Без шаблона (все пункты) --</option>
                </select>
                <button id="applyAuditTemplateBtn">Применить шаблон</button>
            </div>
            <div class="btn-group">
                <button id="resetAllChecklistsBtn" class="reset-btn">🔄 Сбросить все ответы</button>
                <button id="printPendingChecklistsBtn" class="print-btn">🖨️ Печать невыполненных</button>
                <button id="exportChecklistsBtn">📎 Экспорт чек-листов (JSON)</button>
                <button id="importChecklistsBtn">📂 Импорт чек-листов (JSON)</button>
                <input type="file" id="importFileInput" accept=".json" style="display: none;">
                <button id="createTasksFromPendingBtn" style="background:#10b981;">📋 Создать поручения из невыполненных</button>
            </div>
            <div id="checklistsContainer"></div>
        </div>

        <div id="constructorModePanel" style="display: none;">
            <div class="constructor-section">
                <h3>📌 Выберите пункты для шаблона</h3>
                <div id="allItemsPicker" class="item-picker"></div>
                <div class="custom-item-form">
                    <input type="text" id="newItemText" placeholder="Текст пункта" style="flex:2;">
                    <select id="newItemCondition"><option value="greater">≥</option><option value="less">≤</option></select>
                    <input type="number" id="newItemTarget" placeholder="Целевое значение">
                    <input type="text" id="newItemUnit" placeholder="Ед. изм. (%, дни, руб.)">
                    <button id="addCustomItemBtn">➕ Добавить свой пункт</button>
                </div>

                    <h3>📁 Мои шаблоны</h3>
                    <div id="templatesList"></div>
                    <div style="margin-top: 16px;">
                        <input type="text" id="newTemplateName" placeholder="Название шаблона">

                    </div>
                </div>
            </div>

    </main>
</div>

<script>

    const themeToggle = document.getElementById('themeToggle');
    const body = document.body;
    if (localStorage.getItem('scm_theme') === 'dark') body.classList.add('dark-theme');
    themeToggle.addEventListener('click', () => {
        body.classList.toggle('dark-theme');
        localStorage.setItem('scm_theme', body.classList.contains('dark-theme') ? 'dark' : 'light');
    });

    // ========== 2. Филиал ==========
    let currentBranchId = 'default';
    function loadBranchSelector() {
        const branches = BranchManager.getBranches();
        const tree = BranchManager.buildTree(branches);
        const select = document.getElementById('branchSelector');
        select.innerHTML = '';
        const addOptions = (nodes, prefix = '') => {
            for (let node of nodes) {
                const opt = document.createElement('option');
                opt.value = node.id;
                opt.textContent = prefix + node.name + ' (' + node.type + ')';
                if (node.id === currentBranchId) opt.selected = true;
                select.appendChild(opt);
                if (node.children) addOptions(node.children, prefix + '— ');
            }
        };
        addOptions(tree);
        select.addEventListener('change', (e) => {
            setCurrentBranch(e.target.value);
            currentBranchId = e.target.value;
            // Перезагружаем всё
            loadCustomItems();
            loadTemplates();
            renderAuditSections(currentFilterIds);

    let customItems = {};
    let templates = [];

    function getAllItems() { return { ...masterItems, ...customItems }; }

    function loadCustomItems() { const saved = localStorage.getItem(`checklist_custom_items_${currentBranchId}`); if(saved) customItems = JSON.parse(saved); }
    function saveCustomItems() { localStorage.setItem(`checklist_custom_items_${currentBranchId}`, JSON.stringify(customItems)); }
    function loadTemplates() { const saved = localStorage.getItem(`checklist_templates_${currentBranchId}`); if(saved) templates = JSON.parse(saved); else templates = []; }
    function saveTemplates() { localStorage.setItem(`checklist_templates_${currentBranchId}`, JSON.stringify(templates)); }

    let currentFilterIds = null;

    // Состояние формы
    function saveCurrentFormState() {
        const state = {};
        for (let id of Object.keys(getAllItems())) {
            const sel = document.getElementById(`status_${id}`);
            const inp = document.getElementById(`fact_${id}`);
            if (sel) state[id] = { status: sel.value, fact: inp ? inp.value : '' };
        }
        localStorage.setItem(`checklist_current_form_${currentBranchId}`, JSON.stringify(state));
    }
    function loadCurrentFormState() {
        const saved = localStorage.getItem(`checklist_current_form_${currentBranchId}`);
        if (saved) {
            const state = JSON.parse(saved);
            for (let [id, data] of Object.entries(state)) {
                const sel = document.getElementById(`status_${id}`);
                const inp = document.getElementById(`fact_${id}`);
                if (sel) sel.value = data.status;
                if (inp) inp.value = data.fact || '';
            }
        }
    }

    function isFactCompliant(itemId, factValue) {
        const item = getAllItems()[itemId];
        if (!item || item.inputType === 'none') return true;
        if (item.target === undefined) return true;
        const num = parseFloat(factValue);
        if (isNaN(num)) return false;
        if (item.condition === 'less') return num < item.target;
        if (item.condition === 'greater') return num > item.target;
        return false;
    }

    function computeSectionProgress(itemIds) {
        let total = 0, compliant = 0;
        for (let id of itemIds) {
            const sel = document.getElementById(`status_${id}`);
            if (!sel) continue;
            const status = sel.value;
            if (status === 'na') continue;
            total++;
            if (status === 'yes') {
                const item = getAllItems()[id];
                if (item && item.inputType !== 'none') {
                    const inp = document.getElementById(`fact_${id}`);
                    const fact = inp ? inp.value : '';
                    if (isFactCompliant(id, fact)) compliant++;
                } else compliant++;
            }
        }
        return total === 0 ? 0 : (compliant / total) * 100;
    }

    function updateAllScores() {
        const all = getAllItems();
        const groups = {};
        for (let id of Object.keys(all)) { let s = all[id].section; if (!groups[s]) groups[s] = []; groups[s].push(id); }
        for (let [sec, ids] of Object.entries(groups)) {
            let percent = computeSectionProgress(ids);
            let scoreSpan = document.getElementById(`score_${sec}`);
            if (scoreSpan) scoreSpan.innerText = `${Math.round(percent)}%`;
            let progFill = document.getElementById(`progress_${sec}`);
            if (progFill) progFill.style.width = `${percent}%`;
        }
        saveCurrentFormState();
    }

    function renderAuditSections(filterIds = null) {
        const all = getAllItems();
        let itemsToShow = {};
        if (filterIds && filterIds.length > 0) {
            for (let id of filterIds) if (all[id]) itemsToShow[id] = all[id];
        } else itemsToShow = all;
        const groups = {};
        for (let [id, item] of Object.entries(itemsToShow)) {
            if (!groups[item.section]) groups[item.section] = [];
            groups[item.section].push({ id, ...item });
        }
        const container = document.getElementById('checklistsContainer');
        container.innerHTML = '';
        for (let sec of sectionsOrder) {
            if (!groups[sec]) continue;
            const div = document.createElement('div'); div.className = 'checklist-category';
            div.innerHTML = `<div class="category-header">
                                <h2><i class="fas fa-list-check"></i> ${sectionTitles[sec]}</h2>
                                <div class="category-actions">
                                    <button class="reset-category" data-section="${sec}">Сбросить отметки</button>
                                    <button class="print-category-btn" data-category="${sec}">🖨️ Печать отчёта</button>
                                </div>
                             </div>
                             <div class="checklist-items" id="items_${sec}"></div>
                             <div class="progress-bar-container"><div class="progress-fill" id="progress_${sec}"></div></div>
                             <div class="add-item-form">
                                <input type="text" class="new-item-input" placeholder="Новый пункт...">
                                <button class="add-item-btn" data-section="${sec}">+ Добавить пункт</button>
                             </div>`;
            container.appendChild(div);
            const itemsContainer = div.querySelector(`.checklist-items`);
            for (let item of groups[sec]) {
                const row = document.createElement('div'); row.className = 'checklist-item';
                const select = document.createElement('select'); select.id = `status_${item.id}`; select.innerHTML = '<option value="yes">Да</option><option value="no" selected>Нет</option><option value="na">Не требуется</option>';
                const label = document.createElement('label'); label.textContent = item.text;
                row.appendChild(select); row.appendChild(label);
                if (item.inputType !== 'none') {
                    const inp = document.createElement('input'); inp.type = item.inputType; inp.id = `fact_${item.id}`; inp.placeholder = `Факт, ${item.unit}`; inp.className = 'fact-input';
                    const unitSpan = document.createElement('span'); unitSpan.className = 'fact-unit'; unitSpan.textContent = item.unit;
                    row.appendChild(inp); row.appendChild(unitSpan);
                }
                itemsContainer.appendChild(row);
            }
        }
        loadCurrentFormState();
        updateAllScores();
        attachAuditEvents();
    }

    function attachAuditEvents() {
        document.querySelectorAll('.checklist-item select, .checklist-item input').forEach(el => {
            el.removeEventListener('change', updateAllScores);
            el.removeEventListener('input', updateAllScores);
            el.addEventListener('change', updateAllScores);
            el.addEventListener('input', updateAllScores);
        });
        document.querySelectorAll('.reset-category').forEach(btn => {
            btn.removeEventListener('click', handleResetCategory);
            btn.addEventListener('click', handleResetCategory);
        });
        document.querySelectorAll('.add-item-btn').forEach(btn => {
            btn.removeEventListener('click', handleAddItem);
            btn.addEventListener('click', handleAddItem);
        });
        document.querySelectorAll('.print-category-btn').forEach(btn => {
            btn.removeEventListener('click', handlePrintCategory);
            btn.addEventListener('click', handlePrintCategory);
        });
    }

    function handleResetCategory(e) {
        const section = e.currentTarget.getAttribute('data-section');
        if (confirm(`Сбросить все ответы в категории "${sectionTitles[section]}"?`)) {
            const all = getAllItems();
            for (let [id, item] of Object.entries(all)) {
                if (item.section === section) {
                    const sel = document.getElementById(`status_${id}`);
                    const inp = document.getElementById(`fact_${id}`);
                    if (sel) sel.value = 'no';
                    if (inp) inp.value = '';
                }
            }
            saveCurrentFormState();
            updateAllScores();
        }
    }

    function handleAddItem(e) {
        const section = e.currentTarget.getAttribute('data-section');
        const input = e.currentTarget.parentElement.querySelector('.new-item-input');
        const newText = input.value.trim();
        if (!newText) return alert('Введите текст пункта');
        const newId = `custom_${Date.now()}_${Math.random()}`;
        customItems[newId] = { section: section, text: newText, recommend: "Да", inputType: "none", unit: "" };
        saveCustomItems();
        renderAuditSections(currentFilterIds);
        input.value = '';
    }

    function handlePrintCategory(e) {
        const sectionKey = e.currentTarget.getAttribute('data-category');
        const categoryName = sectionTitles[sectionKey];
        window.open(`report-generator.html?type=checklist&name=${encodeURIComponent(categoryName)}`, '_blank');
    }

    function resetAll() {
        if (confirm('Сбросить все ответы во всех категориях?')) {
            for (let id of Object.keys(getAllItems())) {
                const sel = document.getElementById(`status_${id}`);
                const inp = document.getElementById(`fact_${id}`);
                if (sel) sel.value = 'no';
                if (inp) inp.value = '';
            }
            saveCurrentFormState();
            updateAllScores();
        }

    function printPending() {
        let pending = [];
        const all = getAllItems();
        for (let [id, item] of Object.entries(all)) {
            const sel = document.getElementById(`status_${id}`);
            if (!sel) continue;
            const status = sel.value;
            if (status === 'no') {
                pending.push({ category: sectionTitles[item.section], text: item.text });
            } else if (status === 'yes' && item.inputType !== 'none') {
                const inp = document.getElementById(`fact_${id}`);
                const fact = inp ? inp.value : '';
                if (!isFactCompliant(id, fact)) {
                    pending.push({ category: sectionTitles[item.section], text: item.text, reason: `Факт ${fact} не соответствует цели ${item.recommend}` });
                }
            }
        }
        if (pending.length === 0) { alert('Нет невыполненных пунктов'); return; }
        const win = window.open('', '_blank');
        win.document.write(`<html><head><title>Невыполненные пункты чек-листов</title><style>body{font-family:Inter;margin:20px}</style></head><body>
        <h1>Невыполненные пункты чек-листов</h1><p>Дата: ${new Date().toLocaleString()}</p><ul>${pending.map(p => `<li><strong>${p.category}</strong>: ${p.text} ${p.reason ? '('+p.reason+')' : ''}</li>`).join('')}</ul></body></html>`);
        win.document.close(); win.print();
    }

    // Создание поручений из невыполненных пунктов
    function createTasksFromPending() {
        const all = getAllItems();
        const pending = [];
        for (let [id, item] of Object.entries(all)) {
            const sel = document.getElementById(`status_${id}`);
            if (!sel) continue;
            const status = sel.value;
            if (status === 'no') {
                pending.push({ text: item.text, recommend: item.recommend });
            } else if (status === 'yes' && item.inputType !== 'none') {
                const inp = document.getElementById(`fact_${id}`);
                const fact = inp ? inp.value : '';
                if (!isFactCompliant(id, fact)) {
                    pending.push({ text: item.text, recommend: item.recommend, fact: fact });
                }
            }
        }
        if (pending.length === 0) { alert('Нет невыполненных пунктов для создания поручений'); return; }
        const registryKey = `tasks_registry_${currentBranchId}`;
        let registry = JSON.parse(localStorage.getItem(registryKey) || '[]');
        let created = 0;
        for (let p of pending) {
            const newTask = {
                id: Date.now().toString() + '_' + Math.random().toString(36).substr(2, 6),
                text: `[Чек-лист] ${p.text} (цель: ${p.recommend})`,
                assignee: 'Руководитель',
                dueDate: '',
                priority: 'medium',
                status: 'new',
                controller: 'Аудитор',
                theme: 'Чек-лист SCM',
                createdAt: new Date().toISOString()
            };
            registry.push(newTask);
            created++;
            // Синхронизация с планером
            const plannerTasks = getPlannerTasks(currentBranchId);
            const targetDate = new Date().toISOString().split('T')[0];
            if (!plannerTasks[targetDate]) plannerTasks[targetDate] = [];
            plannerTasks[targetDate].push({
                id: `checklist_${newTask.id}`,
                text: newTask.text,
                completed: false,
                priority: 'medium',
                category: 'Чек-лист',
                source: 'checklist',
                originalId: newTask.id,
                branchId: currentBranchId
            });
            savePlannerTasks(plannerTasks, currentBranchId);
        }
        localStorage.setItem(registryKey, JSON.stringify(registry));
        alert(`Создано поручений: ${created}`);
    }

    function exportData() {
        const allStates = {};
        for (let id of Object.keys(getAllItems())) {
            const sel = document.getElementById(`status_${id}`);
            const inp = document.getElementById(`fact_${id}`);
            if (sel) allStates[id] = { status: sel.value, fact: inp ? inp.value : '' };
        }
        const exportObj = { customItems, templates, currentFormState: allStates, exportDate: new Date().toISOString() };
        const blob = new Blob([JSON.stringify(exportObj, null, 2)], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `checklists_${currentBranchId}_${Date.now()}.json`; a.click();
    }

    function importData(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if (data.customItems) { customItems = data.customItems; saveCustomItems(); }
                if (data.templates) { templates = data.templates; saveTemplates(); }
                if (data.currentFormState) {
                    for (let [id, state] of Object.entries(data.currentFormState)) {
                        const sel = document.getElementById(`status_${id}`);
                        const inp = document.getElementById(`fact_${id}`);
                        if (sel) sel.value = state.status;
                        if (inp) inp.value = state.fact || '';
                    }
                    saveCurrentFormState();
                    updateAllScores();
                }
                renderAuditSections(currentFilterIds);
                alert('Импорт выполнен');
            } catch(err) { alert('Ошибка импорта: ' + err.message); }
        };
        reader.readAsText(file);
    }

        let all = getAllItems();
        let selectedIds = JSON.parse(sessionStorage.getItem(`constructor_selected_ids_${currentBranchId}`) || '[]');
        container.innerHTML = '';
        for (let sec of sectionsOrder) {
            let secDiv = document.createElement('div'); secDiv.style.marginBottom = '16px';
            let title = document.createElement('div'); title.style.fontWeight = 'bold'; title.innerText = sectionTitles[sec];
            secDiv.appendChild(title);
            let itemsDiv = document.createElement('div'); itemsDiv.className = 'item-picker';
            for (let [id, item] of Object.entries(all)) {
                if (item.section === sec) {
                    let label = document.createElement('label');
                    let cb = document.createElement('input'); cb.type = 'checkbox'; cb.value = id; cb.checked = selectedIds.includes(id);
                    cb.addEventListener('change', (e) => {
                        if (e.target.checked) { if (!selectedIds.includes(id)) selectedIds.push(id); }
                        else { selectedIds = selectedIds.filter(i => i !== id); }
                        sessionStorage.setItem(`constructor_selected_ids_${currentBranchId}`, JSON.stringify(selectedIds));
                    });
                    label.appendChild(cb); label.appendChild(document.createTextNode(item.text));
                    itemsDiv.appendChild(label);
                }
            }
            secDiv.appendChild(itemsDiv);
            container.appendChild(secDiv);
        }
        let customDiv = document.createElement('div'); customDiv.style.marginTop = '20px'; customDiv.innerHTML = '<strong>Свои пункты:</strong>';
        for (let [id, item] of Object.entries(customItems)) {
            let row = document.createElement('div'); row.style.display = 'flex'; row.style.gap = '8px'; row.style.alignItems = 'center'; row.style.marginTop = '4px';
            row.innerHTML = `<span>${item.text} (${item.unit})</span> <button class="remove-custom" data-id="${id}">❌</button>`;
            customDiv.appendChild(row);
        }
        container.appendChild(customDiv);
        document.querySelectorAll('.remove-custom').forEach(btn => {
            btn.addEventListener('click', (e) => { delete customItems[btn.getAttribute('data-id')]; saveCustomItems(); renderConstructor(); });
        });
        renderTemplatesList();
    }

    function renderTemplatesList() {
        let container = document.getElementById('templatesList');
        container.innerHTML = '';
        templates.forEach(tmpl => {
            let div = document.createElement('div'); div.className = 'template-item';
            div.innerHTML = `<span><strong>${tmpl.name}</strong> (${tmpl.itemIds.length} пунктов)</span>
                             <div><button class="use-template" data-id="${tmpl.id}">Использовать в аудите</button>
                             <button class="delete-template" data-id="${tmpl.id}">🗑️</button></div>`;
            container.appendChild(div);
        });
        document.querySelectorAll('.use-template').forEach(btn => {
            btn.addEventListener('click', (e) => { applyTemplate(btn.getAttribute('data-id')); });
        });
        document.querySelectorAll('.delete-template').forEach(btn => {
            btn.addEventListener('click', (e) => { templates = templates.filter(t => t.id !== btn.getAttribute('data-id')); saveTemplates(); renderTemplatesList(); populateTemplateSelect(); });
        });
    }

    function applyTemplate(templateId) {
        const tmpl = templates.find(t => t.id === templateId);
        if (tmpl) {
            currentFilterIds = tmpl.itemIds;
            auditModeBtn.click();
            renderAuditSections(currentFilterIds);
            const select = document.getElementById('auditTemplateSelect');
            if (select) select.value = templateId;
        }
    }

    function populateTemplateSelect() {
        const select = document.getElementById('auditTemplateSelect');
        if (!select) return;
        select.innerHTML = '<option value="">-- Без шаблона (все пункты) --</option>';
        templates.forEach(tmpl => {
            const opt = document.createElement('option');
            opt.value = tmpl.id;
            opt.textContent = `${tmpl.name} (${tmpl.itemIds.length} пунктов)`;
            select.appendChild(opt);
        });
    }

    document.getElementById('addCustomItemBtn').addEventListener('click', () => {
        let text = document.getElementById('newItemText').value.trim();
        let condition = document.getElementById('newItemCondition').value;
        let target = parseFloat(document.getElementById('newItemTarget').value);
        let unit = document.getElementById('newItemUnit').value.trim();
        if (!text) return alert('Введите текст пункта');
        let id = 'custom_' + Date.now();
        customItems[id] = { section: "warehouse", text: text, recommend: (condition === 'greater' ? '≥' : '≤') + target + unit, inputType: "number", unit: unit, target: target, condition: condition };
        saveCustomItems();
        document.getElementById('newItemText').value = ''; document.getElementById('newItemTarget').value = ''; document.getElementById('newItemUnit').value = '';
        renderConstructor();
    });

    document.getElementById('saveTemplateBtn').addEventListener('click', () => {
        let name = document.getElementById('newTemplateName').value.trim();
        if (!name) return alert('Введите название шаблона');
        let selectedIds = JSON.parse(sessionStorage.getItem(`constructor_selected_ids_${currentBranchId}`) || '[]');
        if (selectedIds.length === 0) return alert('Выберите хотя бы один пункт');
        let newTemplate = { id: Date.now().toString(), name: name, itemIds: selectedIds };
        templates.push(newTemplate);
        saveTemplates();
        document.getElementById('newTemplateName').value = '';
        renderTemplatesList();
        populateTemplateSelect();
    });

    // Переключение режимов
    const auditPanel = document.getElementById('auditModePanel');
    const constructorPanel = document.getElementById('constructorModePanel');
    const auditModeBtn = document.getElementById('auditModeBtn');
    const constructorModeBtn = document.getElementById('constructorModeBtn');
    auditModeBtn.addEventListener('click', () => {
        auditPanel.style.display = 'block';
        constructorPanel.style.display = 'none';
        auditModeBtn.classList.add('active');
        constructorModeBtn.classList.remove('active');
        populateTemplateSelect();
        if (currentFilterIds) renderAuditSections(currentFilterIds);
        else renderAuditSections(null);
    });
    constructorModeBtn.addEventListener('click', () => {
        auditPanel.style.display = 'none';
        constructorPanel.style.display = 'block';
        auditModeBtn.classList.remove('active');
        constructorModeBtn.classList.add('active');
        renderConstructor();
    });

    // Кнопки
    document.getElementById('resetAllChecklistsBtn').addEventListener('click', resetAll);
    document.getElementById('printPendingChecklistsBtn').addEventListener('click', printPending);
    document.getElementById('exportChecklistsBtn').addEventListener('click', exportData);
    document.getElementById('importChecklistsBtn').addEventListener('click', () => document.getElementById('importFileInput').click());
    document.getElementById('importFileInput').addEventListener('change', (e) => { if (e.target.files[0]) importData(e.target.files[0]); e.target.value = ''; });
    document.getElementById('applyAuditTemplateBtn').addEventListener('click', () => {
        const select = document.getElementById('auditTemplateSelect');
        const templateId = select.value;
        if (templateId) applyTemplate(templateId);
        else { currentFilterIds = null; renderAuditSections(null); }
    });
    document.getElementById('createTasksFromPendingBtn').addEventListener('click', createTasksFromPending);

    // Печать всей страницы (бланк)
    window.printChecklistsWithLogo = function() {
        const mainContent = document.querySelector('.main-content');
        if (!mainContent) return;
        const clone = mainContent.cloneNode(true);
        clone.querySelectorAll('.btn-group, .mode-switch, .branch-selector-container, .theme-switch, .category-actions, .add-item-form, .template-selector, button, select, input[type="checkbox"], input[type="radio"], .fact-input').forEach(el => el.remove());
        clone.querySelectorAll('.checklist-item select').forEach(select => {
            const span = document.createElement('span');
            span.textContent = select.options[select.selectedIndex]?.text || '';
            select.parentNode.replaceChild(span, select);
        });
        clone.querySelectorAll('.fact-input').forEach(inp => {
            const span = document.createElement('span');
            span.textContent = inp.value;
            inp.parentNode.replaceChild(span, inp);
        });
        const logoUrl = 'https://raw.githubusercontent.com/965910-bit/Panibratsky-Dmitry/main/scm-platform/assets/LargeTile.scale-200.png';
        const printWindow = window.open('', '_blank');
        printWindow.document.write(`
            <!DOCTYPE html>
            <html><head><meta charset="UTF-8"><title>Чек-листы SCM</title>
            <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
            <style>
                body { font-family: Inter; margin: 20px; }
                .print-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #1e40af; margin-bottom: 20px; padding-bottom: 10px; }
                .logo-img { height: 50px; }
                .contact-info { font-size: 10pt; line-height: 1.4; }
                .print-footer { margin-top: 40px; border-top: 1px solid #ccc; padding-top: 20px; display: flex; justify-content: space-between; gap: 20px; }
                .sign-line { border-bottom: 1px solid #000; display: inline-block; min-width: 180px; }
                .checklist-category { break-inside: avoid; }
            </style>
            </head><body>
            <div class="print-header">
                <div style="display:flex;align-items:center;gap:20px"><img src="${logoUrl}" class="logo-img"><div class="contact-info">Дмитрий Панибратский<br>Эксперт по SCM и логистике<br>scm-news.ru – экспертный портал<br>scm-news.online – Академия SCM<br>dmitry@scm-news.ru</div></div>
                <div>${new Date().toLocaleString()}</div>
            </div>
            ${clone.innerHTML}
            <div class="print-footer">
                <div>Ф.И.О. исполнителя: <span class="sign-line">_________________________</span></div>
                <div>Подпись: <span class="sign-line">_________________________</span></div>
                <div>Дата: ${new Date().toLocaleDateString()}</div>
            </div>
            <script>window.onload = () => { window.print(); window.onafterprint = () => window.close(); }<\/script>
            </body></html>
        `);
        printWindow.document.close();
    };
    window.sendChecklistsByEmail = function() {
        const mainContent = document.querySelector('.main-content');
        if (!mainContent) return;
        const text = mainContent.innerText;
        const subject = encodeURIComponent('Чек-листы SCM');
        const body = encodeURIComponent(`Добрый день!\n\n${text}\n\n--\nСгенерировано автоматически.`);
        window.location.href = `mailto:?subject=${subject}&body=${body}`;
    };
    // Добавляем кнопки печати и отправки в btn-group
    const printAllBtn = document.createElement('button');
    printAllBtn.innerHTML = '<i class="fas fa-print"></i> Печать всех чек-листов (бланк)';
    printAllBtn.style.background = '#f59e0b';
    printAllBtn.addEventListener('click', () => window.printChecklistsWithLogo());
    const emailAllBtn = document.createElement('button');
    emailAllBtn.innerHTML = '<i class="fas fa-envelope"></i> Отправить на почту';
    emailAllBtn.style.background = '#10b981';
    emailAllBtn.addEventListener('click', () => window.sendChecklistsByEmail());
    document.querySelector('#auditModePanel .btn-group').appendChild(printAllBtn);
    document.querySelector('#auditModePanel .btn-group').appendChild(emailAllBtn);

    // Инициализация
    function init() {
        BranchManager.ensureDefaultBranch();
        currentBranchId = getCurrentBranch();
        loadBranchSelector();
        loadCustomItems();
        loadTemplates();
        renderAuditSections(null);
        populateTemplateSelect();
    }
    init();
})();
</script>
</body>
</html>
