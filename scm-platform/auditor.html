<!DOCTYPE html>
<html lang="ru">

        button { background: #1e40af; color: white; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; }
        .reset-btn { background: #94a3b8; }
        .print-btn { background: #f59e0b; }
        .finish-btn { background: #10b981; }
        .mode-switch {

            gap: 8px;
            margin-bottom: 20px;
            background: white;
            border-radius: 40px;
            padding: 6px;
            border: 1px solid #e2e8f0;
            width: fit-content;

<body>
<div class="app-container">
    <aside class="sidebar">...</aside>

    </main>
</div>

<script>

    // ========== 1. Тёмная тема ==========
    const themeToggle = document.getElementById('themeToggle');
    const body = document.body;
    if (localStorage.getItem('scm_theme') === 'dark') body.classList.add('dark-theme');
    themeToggle.addEventListener('click', () => {
        body.classList.toggle('dark-theme');
        localStorage.setItem('scm_theme', body.classList.contains('dark-theme') ? 'dark' : 'light');
    });

    // ========== 2. Филиал ==========
    let currentBranchId = 'default';
    function loadBranchSelector() {
        const branches = BranchManager.getBranches();
        const tree = BranchManager.buildTree(branches);
        const select = document.getElementById('branchSelector');
        select.innerHTML = '';
        const addOptions = (nodes, prefix = '') => {
            for (let node of nodes) {
                const opt = document.createElement('option');
                opt.value = node.id;
                opt.textContent = prefix + node.name + ' (' + node.type + ')';
                if (node.id === currentBranchId) opt.selected = true;
                select.appendChild(opt);
                if (node.children) addOptions(node.children, prefix + '— ');
            }
        };
        addOptions(tree);
        select.addEventListener('change', (e) => {
            setCurrentBranch(e.target.value);
            currentBranchId = e.target.value;
            // Перезагружаем всё
            loadCurrentFormState();
            updateAllScores();
            populateAuditLoadSelect();
            renderConstructor();
            populateTemplateSelect();
        });
    }

    let customItems = {};
    let templates = [];

    function getAllItems() { return { ...masterItems, ...customItems }; }

    function loadCustomItems() { const saved = localStorage.getItem(`audit_custom_items_${currentBranchId}`); if(saved) customItems = JSON.parse(saved); }
    function saveCustomItems() { localStorage.setItem(`audit_custom_items_${currentBranchId}`, JSON.stringify(customItems)); }
    function loadTemplates() { const saved = localStorage.getItem(`audit_templates_${currentBranchId}`); if(saved) templates = JSON.parse(saved); else templates = []; }
    function saveTemplates() { localStorage.setItem(`audit_templates_${currentBranchId}`, JSON.stringify(templates)); }

    function saveCurrentFormState() {
        const state = {};
        for (let id of Object.keys(getAllItems())) {
            const sel = document.getElementById(`status_${id}`);
            const inp = document.getElementById(`fact_${id}`);
            if (sel) state[id] = { status: sel.value, fact: inp ? inp.value : '' };
        }
        localStorage.setItem(`audit_current_form_${currentBranchId}`, JSON.stringify(state));
    }
    function loadCurrentFormState() {
        const saved = localStorage.getItem(`audit_current_form_${currentBranchId}`);
        if (saved) {
            const state = JSON.parse(saved);
            for (let [id, data] of Object.entries(state)) {
                const sel = document.getElementById(`status_${id}`);
                const inp = document.getElementById(`fact_${id}`);
                if (sel) sel.value = data.status;
                if (inp) inp.value = data.fact || '';
            }
        }
    }
    function isFactCompliant(itemId, factValue) {
        const item = getAllItems()[itemId];
        if (!item || item.inputType === 'none') return true;
        if (item.target === undefined) return true;
        const num = parseFloat(factValue);
        if (isNaN(num)) return false;
        if (item.condition === 'less') return num < item.target;
        if (item.condition === 'greater') return num > item.target;
        if (item.condition === 'equal') return Math.abs(num - item.target) < 0.01;
        return false;
    }
    function computeSectionProgress(itemIds) {
        let total = 0, compliant = 0;
        for (let id of itemIds) {
            const sel = document.getElementById(`status_${id}`);
            if (!sel) continue;
            const status = sel.value;
            if (status === 'na') continue;
            total++;
            if (status === 'yes') {
                const item = getAllItems()[id];
                if (item && item.inputType !== 'none') {
                    const inp = document.getElementById(`fact_${id}`);
                    const fact = inp ? inp.value : '';
                    if (isFactCompliant(id, fact)) compliant++;
                } else compliant++;
            }
        }
        return total === 0 ? 0 : (compliant / total) * 100;
    }
    function updateAllScores() {
        const all = getAllItems();
        const groups = {};
        for (let id of Object.keys(all)) { let s = all[id].section; if (!groups[s]) groups[s] = []; groups[s].push(id); }
        for (let [sec, ids] of Object.entries(groups)) {
            let percent = computeSectionProgress(ids);
            let scoreSpan = document.getElementById(`score_${sec}`);
            if (scoreSpan) scoreSpan.innerText = `${Math.round(percent)}%`;
            let progFill = document.getElementById(`progress_${sec}`);
            if (progFill) progFill.style.width = `${percent}%`;
        }
        let total = 0, count = 0;
        for (let sec of sectionsOrder) {
            if (groups[sec]) { total += computeSectionProgress(groups[sec]); count++; }
        }
        let avg = count === 0 ? 0 : total / count;
        document.getElementById('totalScorePercent').innerText = `${Math.round(avg)}%`;
        let maturity = avg<30?'🔴 Критический уровень':avg<50?'🟠 Низкий уровень':avg<70?'🟡 Средний уровень':avg<85?'🟢 Высокий уровень':'🏆 Отличный уровень';
        document.getElementById('maturityLabel').innerHTML = maturity;
        saveCurrentFormState();
    }
    function renderAuditSections(filterIds = null) {
        const all = getAllItems();
        let itemsToShow = {};
        if (filterIds && filterIds.length > 0) {
            for (let id of filterIds) if (all[id]) itemsToShow[id] = all[id];
        } else itemsToShow = all;
        const groups = {};
        for (let [id, item] of Object.entries(itemsToShow)) {
            if (!groups[item.section]) groups[item.section] = [];
            groups[item.section].push({ id, ...item });
        }
        const container = document.getElementById('auditSectionsContainer');
        container.innerHTML = '';
        for (let sec of sectionsOrder) {
            if (!groups[sec]) continue;
            const div = document.createElement('div'); div.className = 'audit-section';
            div.innerHTML = `<div class="section-header"><h2>${sectionTitles[sec]}</h2><div class="section-score" id="score_${sec}">0%</div></div>
                             <div class="checklist-items" id="items_${sec}"></div>
                             <div class="progress-bar-container"><div class="progress-fill" id="progress_${sec}"></div></div>`;
            container.appendChild(div);
            const itemsContainer = div.querySelector(`.checklist-items`);
            for (let item of groups[sec]) {
                const row = document.createElement('div'); row.className = 'checklist-item';
                const select = document.createElement('select'); select.id = `status_${item.id}`; select.innerHTML = '<option value="yes">Да</option><option value="no" selected>Нет</option><option value="na">Не требуется</option>';
                const label = document.createElement('label'); label.textContent = item.text;
                row.appendChild(select); row.appendChild(label);
                if (item.inputType !== 'none') {
                    const inp = document.createElement('input'); inp.type = item.inputType; inp.id = `fact_${item.id}`; inp.placeholder = `Факт, ${item.unit}`; inp.className = 'fact-input';
                    const unitSpan = document.createElement('span'); unitSpan.className = 'fact-unit'; unitSpan.textContent = item.unit;
                    row.appendChild(inp); row.appendChild(unitSpan);
                }
                itemsContainer.appendChild(row);
            }
        }
        loadCurrentFormState();
        updateAllScores();
        attachAuditEvents();
    }
    function attachAuditEvents() {
        document.querySelectorAll('.checklist-item select, .checklist-item input').forEach(el => {
            el.removeEventListener('change', updateAllScores);
            el.removeEventListener('input', updateAllScores);
            el.addEventListener('change', updateAllScores);
            el.addEventListener('input', updateAllScores);
        });
    }
    function resetAll() {
        if (confirm('Сбросить все ответы во всех категориях?')) {
            for (let id of Object.keys(getAllItems())) {
                const sel = document.getElementById(`status_${id}`);
                const inp = document.getElementById(`fact_${id}`);
                if (sel) sel.value = 'no';
                if (inp) inp.value = '';
            }
            saveCurrentFormState();
            updateAllScores();
        }
    }

    function addTaskToRegistry(task) {
        const registryKey = `tasks_registry_${currentBranchId}`;
        let registry = JSON.parse(localStorage.getItem(registryKey) || '[]');
        const newId = Date.now().toString() + '_' + Math.random().toString(36).substr(2, 6);
        const newTask = {
            id: newId,
            text: task.text,
            assignee: task.assignee,
            dueDate: task.dueDate || '',
            priority: 'high',
            status: 'new',
            controller: task.controller || 'Аудитор',
            theme: task.theme || 'Аудит SCM',
            meetingLink: task.meetingLink,
            createdAt: new Date().toISOString()
        };
        registry.push(newTask);
        localStorage.setItem(registryKey, JSON.stringify(registry));
        // Синхронизация с планером
        const plannerTasks = getPlannerTasks(currentBranchId);
        const targetDate = new Date().toISOString().split('T')[0];
        if (!plannerTasks[targetDate]) plannerTasks[targetDate] = [];
        plannerTasks[targetDate].push({
            id: `audit_${newId}`,
            text: newTask.text,
            completed: false,
            priority: 'high',
            category: 'Аудит',
            source: 'audit',
            originalId: newId,
            dueDate: '',
            assignee: newTask.assignee,
            status: 'new',
            branchId: currentBranchId
        });
        savePlannerTasks(plannerTasks, currentBranchId);
    }
    function saveAuditToRegistry(createTasks = true) {
        const auditType = document.querySelector('input[name="auditType"]:checked').value;
        const all = getAllItems();
        const statuses = {};
        const facts = {};
        for (let id of Object.keys(all)) {
            const sel = document.getElementById(`status_${id}`);
            const inp = document.getElementById(`fact_${id}`);
            if (sel) statuses[id] = sel.value;
            if (inp) facts[id] = inp.value;
        }
        const nonConform = [];
        for (let id of Object.keys(all)) {
            const status = statuses[id];
            if (status === 'no') {
                nonConform.push({ id, text: all[id].text, reason: 'Статус "Нет"' });
            } else if (status === 'yes' && all[id].inputType !== 'none') {
                const fact = facts[id];
                if (!isFactCompliant(id, fact)) {
                    nonConform.push({ id, text: all[id].text, reason: `Факт ${fact} не соответствует цели ${all[id].recommend}` });
                }
            }
        }
        const groups = {};
        for (let id of Object.keys(all)) { let s = all[id].section; if (!groups[s]) groups[s] = []; groups[s].push(id); }
        const sectionScores = {};
        for (let [sec, ids] of Object.entries(groups)) sectionScores[sec] = computeSectionProgress(ids);
        const totalPercent = parseFloat(document.getElementById('totalScorePercent').innerText);
        const auditData = {
            id: Date.now().toString(),
            type: auditType,
            date: new Date().toISOString(),
            branchId: currentBranchId,
            totalPercent: totalPercent,
            sectionScores: sectionScores,
            nonConformances: nonConform,
            statuses: statuses,
            facts: facts
        };
        const registryKey = `audit_registry_${currentBranchId}`;
        let audits = JSON.parse(localStorage.getItem(registryKey) || '[]');
        audits.push(auditData);
        localStorage.setItem(registryKey, JSON.stringify(audits));
        if (createTasks && nonConform.length > 0) {
            for (let nc of nonConform) {
                addTaskToRegistry({
                    text: `[Аудит] ${nc.text}: ${nc.reason}`,
                    assignee: document.getElementById('chairpersonTemp')?.value || 'Руководитель',
                    dueDate: '',
                    controller: 'Аудитор',
                    theme: 'Аудит SCM',
                    meetingLink: auditData.id
                });
            }
            alert(`Аудит сохранён. Создано поручений: ${nonConform.length}`);
        } else {
            alert('Аудит сохранён');
        }
        return auditData.id;
    }
    function finishAudit() {
        saveAuditToRegistry(true);
        resetAll();
    }

    // ========== 5. ЗАГРУЗКА АУДИТОВ ИЗ РЕЕСТРА ==========
    function populateAuditLoadSelect() {
        const select = document.getElementById('loadAuditSelect');
        const registryKey = `audit_registry_${currentBranchId}`;
        const audits = JSON.parse(localStorage.getItem(registryKey) || '[]');
        select.innerHTML = '<option value="">-- Загрузить аудит --</option>';
        audits.forEach(a => {
            const opt = document.createElement('option');
            opt.value = a.id;
            opt.textContent = `${new Date(a.date).toLocaleString()} (${a.type}) – ${a.totalPercent}%`;
            select.appendChild(opt);
        });
    }
    function loadAuditById(auditId) {
        const registryKey = `audit_registry_${currentBranchId}`;
        const audits = JSON.parse(localStorage.getItem(registryKey) || '[]');
        const audit = audits.find(a => a.id === auditId);
        if (!audit) return;
        document.querySelector(`input[name="auditType"][value="${audit.type}"]`).checked = true;
        for (let [id, status] of Object.entries(audit.statuses)) {
            const sel = document.getElementById(`status_${id}`);
            if (sel) sel.value = status;
        }
        for (let [id, fact] of Object.entries(audit.facts)) {
            const inp = document.getElementById(`fact_${id}`);
            if (inp) inp.value = fact;
        }
        updateAllScores();
        alert(`Загружен аудит от ${new Date(audit.date).toLocaleString()}`);
    }

    // ========== 6. КОНСТРУКТОР ШАБЛОНОВ ==========
    function renderConstructor() {
        const container = document.getElementById('allItemsPicker');
        let all = getAllItems();
        let selectedIds = JSON.parse(sessionStorage.getItem(`constructor_selected_ids_${currentBranchId}`) || '[]');
        container.innerHTML = '';
        for (let sec of sectionsOrder) {
            let secDiv = document.createElement('div'); secDiv.style.marginBottom = '16px';
            let title = document.createElement('div'); title.style.fontWeight = 'bold'; title.innerText = sectionTitles[sec];
            secDiv.appendChild(title);
            let itemsDiv = document.createElement('div'); itemsDiv.className = 'item-picker';
            for (let [id, item] of Object.entries(all)) {
                if (item.section === sec) {
                    let label = document.createElement('label');
                    let cb = document.createElement('input'); cb.type = 'checkbox'; cb.value = id; cb.checked = selectedIds.includes(id);
                    cb.addEventListener('change', (e) => {
                        if (e.target.checked) { if (!selectedIds.includes(id)) selectedIds.push(id); }
                        else { selectedIds = selectedIds.filter(i => i !== id); }
                        sessionStorage.setItem(`constructor_selected_ids_${currentBranchId}`, JSON.stringify(selectedIds));
                    });
                    label.appendChild(cb); label.appendChild(document.createTextNode(item.text));
                    itemsDiv.appendChild(label);
                }
            }
            secDiv.appendChild(itemsDiv);
            container.appendChild(secDiv);
        }
        let customDiv = document.createElement('div'); customDiv.style.marginTop = '20px'; customDiv.innerHTML = '<strong>Свои пункты:</strong>';
        for (let [id, item] of Object.entries(customItems)) {
            let row = document.createElement('div'); row.style.display = 'flex'; row.style.gap = '8px'; row.style.alignItems = 'center'; row.style.marginTop = '4px';
            row.innerHTML = `<span>${item.text} (${item.unit})</span> <button class="remove-custom" data-id="${id}">❌</button>`;
            customDiv.appendChild(row);
        }
        container.appendChild(customDiv);
        document.querySelectorAll('.remove-custom').forEach(btn => {
            btn.addEventListener('click', (e) => { delete customItems[btn.getAttribute('data-id')]; saveCustomItems(); renderConstructor(); });
        });
        renderTemplatesList();
    }
    function renderTemplatesList() {
        let container = document.getElementById('templatesList');
        container.innerHTML = '';
        templates.forEach(tmpl => {
            let div = document.createElement('div'); div.className = 'template-item';
            div.innerHTML = `<span><strong>${tmpl.name}</strong> (${tmpl.itemIds.length} пунктов)</span>
                             <div><button class="use-template" data-id="${tmpl.id}">Использовать в аудите</button>
                             <button class="delete-template" data-id="${tmpl.id}">🗑️</button></div>`;
            container.appendChild(div);
        });
        document.querySelectorAll('.use-template').forEach(btn => {
            btn.addEventListener('click', (e) => { applyTemplate(btn.getAttribute('data-id')); });
        });
        document.querySelectorAll('.delete-template').forEach(btn => {
            btn.addEventListener('click', (e) => { templates = templates.filter(t => t.id !== btn.getAttribute('data-id')); saveTemplates(); renderTemplatesList(); populateTemplateSelect(); });
        });
    }
    function applyTemplate(templateId) {
        const tmpl = templates.find(t => t.id === templateId);
        if (tmpl) {
            renderAuditSections(tmpl.itemIds);
            const select = document.getElementById('templateSelectForAudit');
            if (select) select.value = templateId;
        }
    }
    function populateTemplateSelect() {
        const select = document.getElementById('templateSelectForAudit');
        select.innerHTML = '<option value="">-- Без шаблона (все пункты) --</option>';
        templates.forEach(tmpl => {
            const opt = document.createElement('option');
            opt.value = tmpl.id;
            opt.textContent = `${tmpl.name} (${tmpl.itemIds.length} пунктов)`;
            select.appendChild(opt);
        });
    }
    document.getElementById('addCustomItemBtn').addEventListener('click', () => {
        let text = document.getElementById('newItemText').value.trim();
        let condition = document.getElementById('newItemCondition').value;
        let target = parseFloat(document.getElementById('newItemTarget').value);
        let unit = document.getElementById('newItemUnit').value.trim();
        if (!text) return alert('Введите текст пункта');
        let id = 'custom_' + Date.now();
        customItems[id] = { section: "warehouse", text: text, recommend: (condition === 'greater' ? '≥' : condition === 'less' ? '≤' : '=') + target + unit, inputType: "number", unit: unit, target: target, condition: condition };
        saveCustomItems();
        document.getElementById('newItemText').value = ''; document.getElementById('newItemTarget').value = ''; document.getElementById('newItemUnit').value = '';
        renderConstructor();
    });
    document.getElementById('saveTemplateBtn').addEventListener('click', () => {
        let name = document.getElementById('newTemplateName').value.trim();
        if (!name) return alert('Введите название шаблона');
        let selectedIds = JSON.parse(sessionStorage.getItem(`constructor_selected_ids_${currentBranchId}`) || '[]');
        if (selectedIds.length === 0) return alert('Выберите хотя бы один пункт');
        let newTemplate = { id: Date.now().toString(), name: name, itemIds: selectedIds };
        templates.push(newTemplate);
        saveTemplates();
        document.getElementById('newTemplateName').value = '';
        renderTemplatesList();
        populateTemplateSelect();
    });

    // ========== 7. ПЕРЕКЛЮЧЕНИЕ РЕЖИМОВ ==========
    const auditPanel = document.getElementById('auditModePanel');
    const constructorPanel = document.getElementById('constructorModePanel');
    const auditModeBtn = document.getElementById('auditModeBtn');
    const constructorModeBtn = document.getElementById('constructorModeBtn');
    auditModeBtn.addEventListener('click', () => {
        auditPanel.style.display = 'block';
        constructorPanel.style.display = 'none';
        auditModeBtn.classList.add('active');
        constructorModeBtn.classList.remove('active');
        populateTemplateSelect();
        renderAuditSections();
    });
    constructorModeBtn.addEventListener('click', () => {
        auditPanel.style.display = 'none';
        constructorPanel.style.display = 'block';
        auditModeBtn.classList.remove('active');
        constructorModeBtn.classList.add('active');
        renderConstructor();
    });

    // ========== 8. ПЕЧАТЬ ОТЧЁТА НА БЛАНКЕ ==========
    window.printAuditReport = function() {
        const mainContent = document.querySelector('.main-content');
        if (!mainContent) return;
        const clone = mainContent.cloneNode(true);
        clone.querySelectorAll('.btn-group, .audit-type-selector, .template-selector, .branch-selector-container, .theme-switch, .mode-switch, .btn-icon, button, select, input[type="radio"], input[type="checkbox"], .checklist-item select, .checklist-item input').forEach(el => el.remove());
        clone.querySelectorAll('.checklist-item').forEach(item => {
            const select = item.querySelector('select');
            if (select) {
                const selectedText = select.options[select.selectedIndex]?.text || '';
                const span = document.createElement('span');
                span.textContent = selectedText;
                select.parentNode.replaceChild(span, select);
            }
            const factInput = item.querySelector('.fact-input');
            if (factInput) {
                const span = document.createElement('span');
                span.textContent = factInput.value;
                factInput.parentNode.replaceChild(span, factInput);
            }
        });
        const logoUrl = 'https://raw.githubusercontent.com/965910-bit/Panibratsky-Dmitry/main/scm-platform/assets/LargeTile.scale-200.png';
        const printWindow = window.open('', '_blank');
        printWindow.document.write(`
            <!DOCTYPE html>
            <html><head><meta charset="UTF-8"><title>Аудит SCM</title>
            <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
            <style>
                body { font-family: Inter; margin: 20px; }
                .print-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #1e40af; margin-bottom: 20px; padding-bottom: 10px; }
                .logo-img { height: 50px; }
                .contact-info { font-size: 10pt; line-height: 1.4; }
                .print-footer { margin-top: 40px; border-top: 1px solid #ccc; padding-top: 20px; display: flex; justify-content: space-between; gap: 20px; }
                .sign-line { border-bottom: 1px solid #000; display: inline-block; min-width: 180px; }
                .audit-section { break-inside: avoid; }
            </style>
            </head><body>
            <div class="print-header">
                <div style="display:flex;align-items:center;gap:20px"><img src="${logoUrl}" class="logo-img"><div class="contact-info">Дмитрий Панибратский<br>Эксперт по SCM и логистике<br>scm-news.ru – экспертный портал<br>scm-news.online – Академия SCM<br>dmitry@scm-news.ru</div></div>
                <div>${new Date().toLocaleString()}</div>
            </div>
            ${clone.innerHTML}
            <div class="print-footer">
                <div>Ф.И.О. исполнителя: <span class="sign-line">_________________________</span></div>
                <div>Подпись: <span class="sign-line">_________________________</span></div>
                <div>Дата: ${new Date().toLocaleDateString()}</div>
            </div>
            <script>window.onload = () => { window.print(); window.onafterprint = () => window.close(); }<\/script>
            </body></html>
        `);
        printWindow.document.close();
    };
    window.sendAuditByEmail = function() {
        const mainContent = document.querySelector('.main-content');
        if (!mainContent) return;
        const text = mainContent.innerText;
        const subject = encodeURIComponent('Отчёт аудита SCM');
        const body = encodeURIComponent(`Добрый день!\n\n${text}\n\n--\nСгенерировано автоматически.`);
        window.location.href = `mailto:?subject=${subject}&body=${body}`;
    };
    document.getElementById('printReportBtn').addEventListener('click', () => window.printAuditReport());
    // Добавляем кнопку отправки на почту, если её нет в btn-group
    const emailBtn = document.createElement('button');
    emailBtn.innerHTML = '<i class="fas fa-envelope"></i> Отправить на почту';
    emailBtn.style.background = '#10b981';
    emailBtn.addEventListener('click', () => window.sendAuditByEmail());
    document.querySelector('#auditModePanel .btn-group').appendChild(emailBtn);

    // ========== 9. КНОПКИ УПРАВЛЕНИЯ ==========
    document.getElementById('saveAuditBtn').addEventListener('click', () => saveAuditToRegistry(false));
    document.getElementById('finishAuditBtn').addEventListener('click', finishAudit);
    document.getElementById('calculateBtn').addEventListener('click', updateAllScores);
    document.getElementById('resetAuditBtn').addEventListener('click', resetAll);
    document.getElementById('templateSelectForAudit').addEventListener('change', (e) => { if (e.target.value) applyTemplate(e.target.value); else renderAuditSections(); });
    document.getElementById('loadAuditSelect').addEventListener('change', (e) => { if (e.target.value) loadAuditById(e.target.value); });

    // ========== 10. ИНИЦИАЛИЗАЦИЯ ==========
    function init() {
        BranchManager.ensureDefaultBranch();
        currentBranchId = getCurrentBranch();
        loadBranchSelector();
        loadCustomItems();
        loadTemplates();
        renderAuditSections();
        populateTemplateSelect();
        populateAuditLoadSelect();
        if (!document.getElementById('chairpersonTemp')) {
            const inp = document.createElement('input');
            inp.type = 'hidden';
            inp.id = 'chairpersonTemp';
            inp.value = 'Руководитель';
            document.body.appendChild(inp);
        }
    }
    init();
})();
</script>
</body>
</html>
