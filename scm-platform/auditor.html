<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аудитор SCM – оценка зрелости цепи поставок</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="scm-style.css">
    <script src="scm-common.js"></script>
    <style>
        .audit-type-selector, .template-selector {
            background: white;
            border-radius: 20px;
            padding: 16px 24px;
            margin-bottom: 24px;
            display: flex;
            gap: 24px;
            align-items: center;
            flex-wrap: wrap;
            border: 1px solid #e2e8f0;
        }
        .total-score-card {
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            color: white;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .total-score-number { font-size: 48px; font-weight: 800; }
        .maturity-label { background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 40px; }
        .audit-section {
            background: white;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid #e2e8f0;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #eef2ff;
        }
        .section-header h2 { font-size: 22px; color: #1e40af; }
        .section-score { font-weight: 700; background: #eef2ff; padding: 6px 14px; border-radius: 30px; }
        .checklist-item {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #f1f5f9;
        }
        .checklist-item select, .checklist-item input {
            padding: 6px 10px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            background: white;
        }
        .checklist-item label { flex: 2; cursor: pointer; font-size: 14px; }
        .fact-input { width: 120px; }
        .fact-unit { font-size: 12px; color: #64748b; margin-left: 4px; }
        .progress-bar-container {
            height: 8px;
            background: #e2e8f0;
            border-radius: 10px;
            margin: 12px 0;
            overflow: hidden;
        }
        .progress-fill { height: 100%; background: #1e40af; width: 0%; border-radius: 10px; }
        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
        button { background: #1e40af; color: white; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; }
        .reset-btn { background: #94a3b8; }
        .print-btn { background: #f59e0b; }
        .finish-btn { background: #10b981; }
        @media (max-width: 768px) {
            .checklist-item { flex-direction: column; align-items: flex-start; }
            .fact-input { width: 100%; }
        }
        @media print {
            .sidebar, .btn-group, .audit-type-selector, .template-selector, .branch-selector-container, .theme-switch {
                display: none;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <aside class="sidebar">...</aside>
    <main class="main-content">
        <div class="theme-switch" id="themeToggle"><i class="fas fa-moon"></i> <span>Тёмная тема</span></div>
        <div class="branch-selector-container" style="float:right; margin-bottom:16px;">
            <label><i class="fas fa-building"></i> Бизнес-единица:</label>
            <select id="branchSelector"></select>
        </div>
        <h1>📋 Аудитор SCM</h1>
        <div class="audit-type-selector">
            <div><label><input type="radio" name="auditType" value="Плановый" checked> Плановый</label>
                 <label><input type="radio" name="auditType" value="Внеплановый"> Внеплановый</label>
                 <label><input type="radio" name="auditType" value="Целевой"> Целевой</label></div>
            <div><label>Шаблон аудита: </label><select id="templateSelectForAudit"></select></div>
            <div><label>Загрузить сохранённый аудит: </label><select id="loadAuditSelect"></select></div>
        </div>
        <div class="total-score-card">
            <div><div style="font-size:18px;">Общий уровень зрелости SCM</div><div class="total-score-number" id="totalScorePercent">0%</div></div>
            <div class="maturity-label" id="maturityLabel">—</div>
        </div>
        <div id="auditSectionsContainer"></div>
        <div class="btn-group">
            <button id="saveAuditBtn">💾 Сохранить аудит</button>
            <button id="finishAuditBtn" class="finish-btn">✅ Завершить аудит (создать поручения)</button>
            <button id="calculateBtn">📊 Пересчитать оценку</button>
            <button id="resetAuditBtn" class="reset-btn">🔄 Сбросить все ответы</button>
            <button id="printReportBtn" class="print-btn">🖨️ Печать отчёта</button>
        </div>
    </main>
</div>

<script>
(function() {
    // ---- Тёмная тема ----
    const themeToggle = document.getElementById('themeToggle');
    const body = document.body;
    if (localStorage.getItem('scm_theme') === 'dark') body.classList.add('dark-theme');
    themeToggle.addEventListener('click', () => {
        body.classList.toggle('dark-theme');
        localStorage.setItem('scm_theme', body.classList.contains('dark-theme') ? 'dark' : 'light');
    });

    // ---- Филиал ----
    let currentBranchId = 'default';
    function loadBranchSelector() {
        const branches = BranchManager.getBranches();
        const tree = BranchManager.buildTree(branches);
        const select = document.getElementById('branchSelector');
        select.innerHTML = '';
        const addOptions = (nodes, prefix = '') => {
            for (let node of nodes) {
                const opt = document.createElement('option');
                opt.value = node.id;
                opt.textContent = prefix + node.name + ' (' + node.type + ')';
                if (node.id === currentBranchId) opt.selected = true;
                select.appendChild(opt);
                if (node.children) addOptions(node.children, prefix + '— ');
            }
        };
        addOptions(tree);
        select.addEventListener('change', (e) => {
            setCurrentBranch(e.target.value);
            currentBranchId = e.target.value;
            // Перезагружаем всё (аудиты и чек-листы)
            loadCurrentFormState();
            updateAllScores();
            populateAuditLoadSelect();
        });
    }

    // ---------- ПОЛНЫЙ ПЕРЕЧЕНЬ ПУНКТОВ АУДИТА (11 секций) ----------
    const sectionTitles = {
        personnel: '1. Персонал и ФОТ',
        operations: '2. Операционная эффективность (склад)',
        transport: '3. Транспорт и логистика',
        procurement: '4. Закупки и управление поставщиками',
        finance: '5. Финансы и бюджетирование',
        data_it: '6. Данные и IT',
        compliance: '7. Комплаенс и риски',
        esg: '8. Устойчивое развитие (ESG)',
        customer: '9. Клиентский сервис и качество',
        digital: '10. Цифровая трансформация и инновации',
        safety: '11. Охрана труда, пожарная и промышленная безопасность'
    };
    const sectionsOrder = ['personnel','operations','transport','procurement','finance','data_it','compliance','esg','customer','digital','safety'];

    let masterItems = {
        p1: { section: "personnel", text: "Численность персонала рассчитана driver-based", recommend: "Да", inputType: "none", unit: "" },
        p2: { section: "personnel", text: "Северные надбавки и районный коэффициент корректны", recommend: "Да", inputType: "none", unit: "" },
        p3: { section: "personnel", text: "Учтены льготы для женщин (36-часовая неделя)", recommend: "Да", inputType: "none", unit: "" },
        p4: { section: "personnel", text: "Внедрена сдельная оплата (за скан / паллету)", recommend: "Да", inputType: "none", unit: "" },
        p5: { section: "personnel", text: "Текучесть кадров на складе", recommend: "<25%", inputType: "number", unit: "%", target: 25, condition: "less" },
        p6: { section: "personnel", text: "Текучесть среди водителей и экспедиторов", recommend: "<20%", inputType: "number", unit: "%", target: 20, condition: "less" },
        p7: { section: "personnel", text: "Доля сотрудников, прошедших обучение цифровой грамотности", recommend: "≥80%", inputType: "number", unit: "%", target: 80, condition: "greater" },
        p8: { section: "personnel", text: "Доля сотрудников, охваченных KPI-премированием", recommend: "≥90%", inputType: "number", unit: "%", target: 90, condition: "greater" },
        o1: { section: "operations", text: "Производительность склада (строк/чел.-час)", recommend: "≥80", inputType: "number", unit: "строк/час", target: 80, condition: "greater" },
        o2: { section: "operations", text: "Ошибки сборки", recommend: "<0,5%", inputType: "number", unit: "%", target: 0.5, condition: "less" },
        o3: { section: "operations", text: "OTD отгрузки со склада", recommend: "≥98%", inputType: "number", unit: "%", target: 98, condition: "greater" },
        o4: { section: "operations", text: "Fill Rate (наличие товара)", recommend: "≥97%", inputType: "number", unit: "%", target: 97, condition: "greater" },
        o5: { section: "operations", text: "Внедрена WMS и адресное хранение", recommend: "Да", inputType: "none", unit: "" },
        o6: { section: "operations", text: "Точность инвентаризации", recommend: "≥99,5%", inputType: "number", unit: "%", target: 99.5, condition: "greater" },
        t1: { section: "transport", text: "OTD доставки клиентам", recommend: "≥96%", inputType: "number", unit: "%", target: 96, condition: "greater" },
        t2: { section: "transport", text: "Доля повреждённых грузов", recommend: "<0,5%", inputType: "number", unit: "%", target: 0.5, condition: "less" },
        t3: { section: "transport", text: "Стоимость доставки 1 т-км", recommend: "≤12 руб.", inputType: "number", unit: "руб.", target: 12, condition: "less" },
        t4: { section: "transport", text: "Доля порожнего пробега", recommend: "<20%", inputType: "number", unit: "%", target: 20, condition: "less" },
        t5: { section: "transport", text: "Использование TMS", recommend: "Да", inputType: "none", unit: "" },
        pr1: { section: "procurement", text: "Доля закупок у сертифицированных поставщиков", recommend: "≥80%", inputType: "number", unit: "%", target: 80, condition: "greater" },
        pr2: { section: "procurement", text: "Своевременность поставок от поставщиков", recommend: "≥96%", inputType: "number", unit: "%", target: 96, condition: "greater" },
        pr3: { section: "procurement", text: "Доля брака от поставщиков", recommend: "<1%", inputType: "number", unit: "%", target: 1, condition: "less" },
        pr4: { section: "procurement", text: "Наличие альтернативных поставщиков", recommend: "Да", inputType: "none", unit: "" },
        f1: { section: "finance", text: "Бюджет SCM утверждён и не превышен", recommend: "Да", inputType: "none", unit: "" },
        f2: { section: "finance", text: "Доля ФОТ в выручке SCM", recommend: "≤5%", inputType: "number", unit: "%", target: 5, condition: "less" },
        f3: { section: "finance", text: "Cash-to-Cash цикл", recommend: "≤45 дней", inputType: "number", unit: "дней", target: 45, condition: "less" },
        f4: { section: "finance", text: "GMROI для категории A", recommend: ">2", inputType: "number", unit: "", target: 2, condition: "greater" },
        d1: { section: "data_it", text: "Внедрена WMS с адресным хранением", recommend: "Да", inputType: "none", unit: "" },
        d2: { section: "data_it", text: "Точность данных в WMS", recommend: "≥99%", inputType: "number", unit: "%", target: 99, condition: "greater" },
        d3: { section: "data_it", text: "Data Latency", recommend: "<1 минуты", inputType: "number", unit: "сек", target: 60, condition: "less" },
        d4: { section: "data_it", text: "MAPE прогноза спроса", recommend: "≤15%", inputType: "number", unit: "%", target: 15, condition: "less" },
        c1: { section: "compliance", text: "Все сотрудники прошли инструктаж по ОТ", recommend: "Да", inputType: "none", unit: "" },
        c2: { section: "compliance", text: "Страхование грузов и складов", recommend: "100%", inputType: "number", unit: "%", target: 100, condition: "greater" },
        e1: { section: "esg", text: "Учёт Scope 1,2,3 выбросов CO₂", recommend: "Да", inputType: "none", unit: "" },
        e2: { section: "esg", text: "Снижение выбросов CO₂ за год", recommend: "≥5%", inputType: "number", unit: "%", target: 5, condition: "greater" },
        cs1: { section: "customer", text: "NPS по логистике", recommend: "≥50", inputType: "number", unit: "баллов", target: 50, condition: "greater" },
        cs2: { section: "customer", text: "Customer Effort Score (CES)", recommend: "≤2", inputType: "number", unit: "баллов", target: 2, condition: "less" },
        x1: { section: "digital", text: "Внедрены RPA-боты", recommend: "Да", inputType: "none", unit: "" },
        x2: { section: "digital", text: "Доля процессов, автоматизированных RPA", recommend: "≥20%", inputType: "number", unit: "%", target: 20, condition: "greater" },
        s1: { section: "safety", text: "Назначен ответственный за охрану труда", recommend: "Да", inputType: "none", unit: "" },
        s2: { section: "safety", text: "Проведены вводные и первичные инструктажи", recommend: "Да", inputType: "none", unit: "" },
        s3: { section: "safety", text: "Медицинские осмотры", recommend: "100%", inputType: "number", unit: "%", target: 100, condition: "greater" },
        s4: { section: "safety", text: "Наличие журнала выдачи СИЗ", recommend: "Да", inputType: "none", unit: "" },
        f1_pb: { section: "safety", text: "Назначен ответственный за пожарную безопасность", recommend: "Да", inputType: "none", unit: "" },
        f2_pb: { section: "safety", text: "Проведён противопожарный инструктаж", recommend: "Да", inputType: "none", unit: "" },
        f3_pb: { section: "safety", text: "Наличие планов эвакуации", recommend: "Да", inputType: "none", unit: "" },
        f4_pb: { section: "safety", text: "АПС и СОУЭ в рабочем состоянии", recommend: "Да", inputType: "none", unit: "" },
    };

    // Функции работы с формой
    function getCurrentBranchKey() { return currentBranchId; }

    function saveCurrentFormState() {
        const state = {};
        for (let id of Object.keys(masterItems)) {
            const sel = document.getElementById(`status_${id}`);
            const inp = document.getElementById(`fact_${id}`);
            if (sel) state[id] = { status: sel.value, fact: inp ? inp.value : '' };
        }
        localStorage.setItem(`audit_current_form_${currentBranchId}`, JSON.stringify(state));
    }
    function loadCurrentFormState() {
        const saved = localStorage.getItem(`audit_current_form_${currentBranchId}`);
        if (saved) {
            const state = JSON.parse(saved);
            for (let [id, data] of Object.entries(state)) {
                const sel = document.getElementById(`status_${id}`);
                const inp = document.getElementById(`fact_${id}`);
                if (sel) sel.value = data.status;
                if (inp) inp.value = data.fact || '';
            }
        }
    }
    function isFactCompliant(itemId, factValue) {
        const item = masterItems[itemId];
        if (!item || item.inputType === 'none') return true;
        if (item.target === undefined) return true;
        const num = parseFloat(factValue);
        if (isNaN(num)) return false;
        if (item.condition === 'less') return num < item.target;
        if (item.condition === 'greater') return num > item.target;
        return false;
    }
    function computeSectionProgress(itemIds) {
        let total = 0, compliant = 0;
        for (let id of itemIds) {
            const sel = document.getElementById(`status_${id}`);
            if (!sel) continue;
            const status = sel.value;
            if (status === 'na') continue;
            total++;
            if (status === 'yes') {
                const item = masterItems[id];
                if (item && item.inputType !== 'none') {
                    const inp = document.getElementById(`fact_${id}`);
                    const fact = inp ? inp.value : '';
                    if (isFactCompliant(id, fact)) compliant++;
                } else compliant++;
            }
        }
        return total === 0 ? 0 : (compliant / total) * 100;
    }
    function updateAllScores() {
        const groups = {};
        for (let id of Object.keys(masterItems)) { let s = masterItems[id].section; if (!groups[s]) groups[s] = []; groups[s].push(id); }
        for (let [sec, ids] of Object.entries(groups)) {
            let percent = computeSectionProgress(ids);
            let scoreSpan = document.getElementById(`score_${sec}`);
            if (scoreSpan) scoreSpan.innerText = `${Math.round(percent)}%`;
            let progFill = document.getElementById(`progress_${sec}`);
            if (progFill) progFill.style.width = `${percent}%`;
        }
        let total = 0, count = 0;
        for (let sec of sectionsOrder) {
            if (groups[sec]) { total += computeSectionProgress(groups[sec]); count++; }
        }
        let avg = count === 0 ? 0 : total / count;
        document.getElementById('totalScorePercent').innerText = `${Math.round(avg)}%`;
        let maturity = avg<30?'🔴 Критический':avg<50?'🟠 Низкий':avg<70?'🟡 Средний':avg<85?'🟢 Высокий':'🏆 Отличный';
        document.getElementById('maturityLabel').innerHTML = maturity;
        saveCurrentFormState();
    }
    function renderAuditSections() {
        const groups = {};
        for (let [id, item] of Object.entries(masterItems)) {
            if (!groups[item.section]) groups[item.section] = [];
            groups[item.section].push({ id, ...item });
        }
        const container = document.getElementById('auditSectionsContainer');
        container.innerHTML = '';
        for (let sec of sectionsOrder) {
            if (!groups[sec]) continue;
            const div = document.createElement('div'); div.className = 'audit-section';
            div.innerHTML = `<div class="section-header"><h2>${sectionTitles[sec]}</h2><div class="section-score" id="score_${sec}">0%</div></div>
                             <div class="checklist-items" id="items_${sec}"></div>
                             <div class="progress-bar-container"><div class="progress-fill" id="progress_${sec}"></div></div>`;
            container.appendChild(div);
            const itemsContainer = div.querySelector(`.checklist-items`);
            for (let item of groups[sec]) {
                const row = document.createElement('div'); row.className = 'checklist-item';
                const select = document.createElement('select'); select.id = `status_${item.id}`; select.innerHTML = '<option value="yes">Да</option><option value="no" selected>Нет</option><option value="na">Не требуется</option>';
                const label = document.createElement('label'); label.textContent = item.text;
                row.appendChild(select); row.appendChild(label);
                if (item.inputType !== 'none') {
                    const inp = document.createElement('input'); inp.type = item.inputType; inp.id = `fact_${item.id}`; inp.placeholder = `Факт, ${item.unit}`; inp.className = 'fact-input';
                    const unitSpan = document.createElement('span'); unitSpan.className = 'fact-unit'; unitSpan.textContent = item.unit;
                    row.appendChild(inp); row.appendChild(unitSpan);
                }
                itemsContainer.appendChild(row);
            }
        }
        loadCurrentFormState();
        updateAllScores();
        attachAuditEvents();
    }
    function attachAuditEvents() {
        document.querySelectorAll('.checklist-item select, .checklist-item input').forEach(el => {
            el.removeEventListener('change', updateAllScores);
            el.removeEventListener('input', updateAllScores);
            el.addEventListener('change', updateAllScores);
            el.addEventListener('input', updateAllScores);
        });
    }
    function resetAll() {
        if (confirm('Сбросить все ответы во всех категориях?')) {
            for (let id of Object.keys(masterItems)) {
                const sel = document.getElementById(`status_${id}`);
                const inp = document.getElementById(`fact_${id}`);
                if (sel) sel.value = 'no';
                if (inp) inp.value = '';
            }
            saveCurrentFormState();
            updateAllScores();
        }
    }
    // Сохранение аудита и создание поручений
    function saveAuditToRegistry(createTasks = true) {
        const auditType = document.querySelector('input[name="auditType"]:checked').value;
        const statuses = {};
        const facts = {};
        for (let id of Object.keys(masterItems)) {
            const sel = document.getElementById(`status_${id}`);
            const inp = document.getElementById(`fact_${id}`);
            if (sel) statuses[id] = sel.value;
            if (inp) facts[id] = inp.value;
        }
        const nonConform = [];
        for (let id of Object.keys(masterItems)) {
            const status = statuses[id];
            if (status === 'no') {
                nonConform.push({ id, text: masterItems[id].text, reason: 'Статус "Нет"' });
            } else if (status === 'yes' && masterItems[id].inputType !== 'none') {
                const fact = facts[id];
                if (!isFactCompliant(id, fact)) {
                    nonConform.push({ id, text: masterItems[id].text, reason: `Факт ${fact} не соответствует цели ${masterItems[id].recommend}` });
                }
            }
        }
        const groups = {};
        for (let id of Object.keys(masterItems)) { let s = masterItems[id].section; if (!groups[s]) groups[s] = []; groups[s].push(id); }
        const sectionScores = {};
        for (let [sec, ids] of Object.entries(groups)) sectionScores[sec] = computeSectionProgress(ids);
        const totalPercent = parseFloat(document.getElementById('totalScorePercent').innerText);
        const auditData = {
            id: Date.now().toString(),
            type: auditType,
            date: new Date().toISOString(),
            branchId: currentBranchId,
            totalPercent: totalPercent,
            sectionScores: sectionScores,
            nonConformances: nonConform,
            statuses: statuses,
            facts: facts
        };
        const registryKey = `audit_registry_${currentBranchId}`;
        let audits = JSON.parse(localStorage.getItem(registryKey) || '[]');
        audits.push(auditData);
        localStorage.setItem(registryKey, JSON.stringify(audits));
        if (createTasks && nonConform.length > 0) {
            const tasksRegistryKey = `tasks_registry_${currentBranchId}`;
            let tasks = JSON.parse(localStorage.getItem(tasksRegistryKey) || '[]');
            for (let nc of nonConform) {
                const newTask = {
                    id: Date.now().toString() + '_' + Math.random().toString(36).substr(2, 6),
                    text: `[Аудит] ${nc.text}: ${nc.reason}`,
                    assignee: document.getElementById('chairpersonTemp')?.value || 'Руководитель',
                    dueDate: '',
                    priority: 'high',
                    status: 'new',
                    controller: 'Аудитор',
                    theme: 'Аудит SCM',
                    meetingLink: auditData.id,
                    createdAt: new Date().toISOString()
                };
                tasks.push(newTask);
                // Синхронизация с планером
                const plannerTasks = getPlannerTasks(currentBranchId);
                const targetDate = new Date().toISOString().split('T')[0];
                if (!plannerTasks[targetDate]) plannerTasks[targetDate] = [];
                plannerTasks[targetDate].push({
                    id: `audit_${newTask.id}`,
                    text: newTask.text,
                    completed: false,
                    priority: 'high',
                    category: 'Аудит',
                    source: 'audit',
                    originalId: newTask.id,
                    dueDate: '',
                    assignee: newTask.assignee,
                    status: 'new',
                    branchId: currentBranchId
                });
                savePlannerTasks(plannerTasks, currentBranchId);
            }
            localStorage.setItem(tasksRegistryKey, JSON.stringify(tasks));
            alert(`Аудит сохранён. Создано поручений: ${nonConform.length}`);
        } else {
            alert('Аудит сохранён');
        }
        return auditData.id;
    }
    function finishAudit() {
        saveAuditToRegistry(true);
        resetAll();
        // Не переходим, просто очищаем форму
    }
    function populateAuditLoadSelect() {
        const select = document.getElementById('loadAuditSelect');
        const registryKey = `audit_registry_${currentBranchId}`;
        const audits = JSON.parse(localStorage.getItem(registryKey) || '[]');
        select.innerHTML = '<option value="">-- Загрузить аудит --</option>';
        audits.forEach(a => {
            const opt = document.createElement('option');
            opt.value = a.id;
            opt.textContent = `${new Date(a.date).toLocaleString()} (${a.type}) – ${a.totalPercent}%`;
            select.appendChild(opt);
        });
    }
    function loadAuditById(auditId) {
        const registryKey = `audit_registry_${currentBranchId}`;
        const audits = JSON.parse(localStorage.getItem(registryKey) || '[]');
        const audit = audits.find(a => a.id === auditId);
        if (!audit) return;
        document.querySelector(`input[name="auditType"][value="${audit.type}"]`).checked = true;
        for (let [id, status] of Object.entries(audit.statuses)) {
            const sel = document.getElementById(`status_${id}`);
            if (sel) sel.value = status;
        }
        for (let [id, fact] of Object.entries(audit.facts)) {
            const inp = document.getElementById(`fact_${id}`);
            if (inp) inp.value = fact;
        }
        updateAllScores();
        alert(`Загружен аудит от ${new Date(audit.date).toLocaleString()}`);
    }
    // Печать
    window.printAuditReport = function() {
        const mainContent = document.querySelector('.main-content');
        if (!mainContent) return;
        const clone = mainContent.cloneNode(true);
        clone.querySelectorAll('.btn-group, .audit-type-selector, .template-selector, .branch-selector-container, .theme-switch, .btn-icon, button, select, input[type="radio"], input[type="checkbox"], .checklist-item select, .checklist-item input').forEach(el => el.remove());
        // заменяем выпадающие списки и поля ввода на текст
        clone.querySelectorAll('.checklist-item').forEach(item => {
            const select = item.querySelector('select');
            if (select) {
                const selectedText = select.options[select.selectedIndex]?.text || '';
                const span = document.createElement('span');
                span.textContent = selectedText;
                select.parentNode.replaceChild(span, select);
            }
            const factInput = item.querySelector('.fact-input');
            if (factInput) {
                const span = document.createElement('span');
                span.textContent = factInput.value;
                factInput.parentNode.replaceChild(span, factInput);
            }
        });
        const logoUrl = 'https://raw.githubusercontent.com/965910-bit/Panibratsky-Dmitry/main/scm-platform/assets/LargeTile.scale-200.png';
        const printWindow = window.open('', '_blank');
        printWindow.document.write(`
            <!DOCTYPE html>
            <html><head><meta charset="UTF-8"><title>Аудит SCM</title>
            <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
            <style>
                body { font-family: Inter; margin: 20px; }
                .print-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #1e40af; margin-bottom: 20px; padding-bottom: 10px; }
                .logo-img { height: 50px; }
                .contact-info { font-size: 10pt; line-height: 1.4; }
                .print-footer { margin-top: 40px; border-top: 1px solid #ccc; padding-top: 20px; display: flex; justify-content: space-between; gap: 20px; }
                .sign-line { border-bottom: 1px solid #000; display: inline-block; min-width: 180px; }
                .audit-section { break-inside: avoid; }
            </style>
            </head><body>
            <div class="print-header">
                <div style="display:flex;align-items:center;gap:20px"><img src="${logoUrl}" class="logo-img"><div class="contact-info">Дмитрий Панибратский<br>Эксперт по SCM и логистике<br>scm-news.ru – экспертный портал<br>scm-news.online – Академия SCM<br>dmitry@scm-news.ru</div></div>
                <div>${new Date().toLocaleString()}</div>
            </div>
            ${clone.innerHTML}
            <div class="print-footer">
                <div>Ф.И.О. исполнителя: <span class="sign-line">_________________________</span></div>
                <div>Подпись: <span class="sign-line">_________________________</span></div>
                <div>Дата: ${new Date().toLocaleDateString()}</div>
            </div>
            <script>window.onload = () => { window.print(); window.onafterprint = () => window.close(); }<\/script>
            </body></html>
        `);
        printWindow.document.close();
    };
    document.getElementById('saveAuditBtn').addEventListener('click', () => saveAuditToRegistry(false));
    document.getElementById('finishAuditBtn').addEventListener('click', finishAudit);
    document.getElementById('calculateBtn').addEventListener('click', updateAllScores);
    document.getElementById('resetAuditBtn').addEventListener('click', resetAll);
    document.getElementById('printReportBtn').addEventListener('click', () => window.printAuditReport());
    document.getElementById('loadAuditSelect').addEventListener('change', (e) => { if (e.target.value) loadAuditById(e.target.value); });
    // Инициализация
    function init() {
        BranchManager.ensureDefaultBranch();
        currentBranchId = getCurrentBranch();
        loadBranchSelector();
        renderAuditSections();
        populateAuditLoadSelect();
        // добавим скрытое поле для временного хранения председателя (можно потом вынести)
        if (!document.getElementById('chairpersonTemp')) {
            const inp = document.createElement('input');
            inp.type = 'hidden';
            inp.id = 'chairpersonTemp';
            inp.value = 'Руководитель';
            document.body.appendChild(inp);
        }
    }
    init();
})();
</script>
