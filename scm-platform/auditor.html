    // Кастомные пункты и шаблоны
    let customItems = {};
    let templates = [];

    // ------------------------------------------------------------------
    // 2. ФУНКЦИИ ДЛЯ РАБОТЫ С LOCALSTORAGE (совместимость с scm-common.js)
    // ------------------------------------------------------------------
    function loadCustomItems() { const saved = localStorage.getItem('audit_custom_items'); if(saved) customItems = JSON.parse(saved); }
    function saveCustomItems() { localStorage.setItem('audit_custom_items', JSON.stringify(customItems)); }
    function loadTemplates() { const saved = localStorage.getItem('audit_templates'); if(saved) templates = JSON.parse(saved); else templates = []; }
    function saveTemplates() { localStorage.setItem('audit_templates', JSON.stringify(templates)); }
    function getAllItems() { return { ...masterItems, ...customItems }; }
    function getAuditRegistry() { const reg = localStorage.getItem('audit_registry'); return reg ? JSON.parse(reg) : []; }
    function saveAuditRegistry(registry) { localStorage.setItem('audit_registry', JSON.stringify(registry)); }
    function addAudit(auditData) { const reg = getAuditRegistry(); auditData.id = Date.now().toString(); auditData.createdAt = new Date().toISOString(); reg.push(auditData); saveAuditRegistry(reg); return auditData.id; }
    function getAuditById(id) { return getAuditRegistry().find(a => a.id === id); }

    // ------------------------------------------------------------------
    // 3. РЕЖИМ АУДИТА – ОТРИСОВКА, ПРОГРЕСС, СОХРАНЕНИЕ, ПЕЧАТЬ
    // ------------------------------------------------------------------
    let currentTemplateId = null;

    function renderAuditSections(selectedItemIds) {
        const all = getAllItems();
        let itemsToShow = {};
        if (!selectedItemIds || selectedItemIds.length === 0) itemsToShow = all;
        else { for(let id of selectedItemIds) if(all[id]) itemsToShow[id]=all[id]; }
        const groups = {};
        for(let [id,item] of Object.entries(itemsToShow)) { if(!groups[item.section]) groups[item.section]=[]; groups[item.section].push({id,...item}); }
        const container = document.getElementById('auditSectionsContainer');
        container.innerHTML = '';
        for(let sec of sectionsOrder) {
            if(!groups[sec]) continue;
            const div = document.createElement('div'); div.className='audit-section'; div.setAttribute('data-section',sec);
            div.innerHTML = `<div class="section-header"><h2>${sectionTitles[sec]}</h2><div class="section-score" id="score_${sec}">0%</div></div>
                             <div class="checklist-items" id="items_${sec}"></div>
                             <div class="progress-bar-container"><div class="progress-fill" id="progress_${sec}"></div></div>`;
            container.appendChild(div);
            const itemsContainer = div.querySelector('.checklist-items');
            for(let item of groups[sec]) {
                const row = document.createElement('div'); row.className='checklist-item';
                const select = document.createElement('select'); select.id=`status_${item.id}`; select.innerHTML='<option value="yes">Да</option><option value="no" selected>Нет</option><option value="na">Не требуется</option>';
                const label = document.createElement('label'); label.textContent = item.text;
                row.appendChild(select); row.appendChild(label);
                if(item.inputType !== 'none') {
                    const inp = document.createElement('input'); inp.type=item.inputType; inp.id=`fact_${item.id}`; inp.placeholder=`Факт, ${item.unit}`; inp.className='fact-input';
                    const unitSpan = document.createElement('span'); unitSpan.className='fact-unit'; unitSpan.textContent=item.unit;
                    row.appendChild(inp); row.appendChild(unitSpan);
                }
                itemsContainer.appendChild(row);
            }
        }
        loadCurrentFormStateForAudit();
        updateAllScoresForAudit();
        attachAuditEvents();
    }

    function saveCurrentFormStateForAudit() {
        const state = {};
        for(let id of Object.keys(getAllItems())) {
            const sel = document.getElementById(`status_${id}`);
            const inp = document.getElementById(`fact_${id}`);
            if(sel) state[id] = { status: sel.value, fact: inp ? inp.value : '' };
        }
        localStorage.setItem('audit_current_form', JSON.stringify(state));
    }
    function loadCurrentFormStateForAudit() {
        const saved = localStorage.getItem('audit_current_form');
        if(saved) {
            const state = JSON.parse(saved);
            for(let [id,data] of Object.entries(state)) {
                const sel = document.getElementById(`status_${id}`);
                const inp = document.getElementById(`fact_${id}`);
                if(sel) sel.value = data.status;
                if(inp) inp.value = data.fact || '';
            }
        }
    }
    function isFactCompliant(itemId, factValue) {
        const all = getAllItems(); const item = all[itemId];
        if(!item || item.inputType==='none') return true;
        if(item.target===undefined) return true;
        const num = parseFloat(factValue); if(isNaN(num)) return false;
        if(item.condition==='less') return num < item.target;
        if(item.condition==='greater') return num > item.target;
        return false;
    }
    function computeSectionProgressForAudit(ids) {
        let total=0, compliant=0;
        for(let id of ids) {
            const sel = document.getElementById(`status_${id}`);
            if(!sel) continue;
            const status = sel.value;
            if(status==='na') continue;
            total++;
            if(status==='yes') {
                const item = getAllItems()[id];
                if(item && item.inputType!=='none') {
                    const inp = document.getElementById(`fact_${id}`);
                    const fact = inp ? inp.value : '';
                    if(isFactCompliant(id, fact)) compliant++;
                } else compliant++;
            }
        }
        return total===0 ? 0 : (compliant/total)*100;
    }
    function updateAllScoresForAudit() {
        const all = getAllItems();
        const groups = {};
        for(let id of Object.keys(all)) { let s = all[id].section; if(!groups[s]) groups[s]=[]; groups[s].push(id); }
        for(let [sec, ids] of Object.entries(groups)) {
            let percent = computeSectionProgressForAudit(ids);
            let scoreSpan = document.getElementById(`score_${sec}`);
            if(scoreSpan) scoreSpan.innerText = `${Math.round(percent)}%`;
            let progFill = document.getElementById(`progress_${sec}`);
            if(progFill) progFill.style.width = `${percent}%`;
        }
        let total=0, count=0;
        for(let sec of sectionsOrder) {
            if(groups[sec]) { total += computeSectionProgressForAudit(groups[sec]); count++; }
        }
        let avg = count===0 ? 0 : total/count;
        document.getElementById('totalScorePercent').innerText = `${Math.round(avg)}%`;
        let maturity = avg<30?'🔴 Критический уровень':avg<50?'🟠 Низкий уровень':avg<70?'🟡 Средний уровень':avg<85?'🟢 Высокий уровень':'🏆 Отличный уровень';
        document.getElementById('maturityLabel').innerHTML = maturity;
        saveCurrentFormStateForAudit();
    }
    function attachAuditEvents() {
        document.querySelectorAll('.checklist-item select, .checklist-item input').forEach(el => {
            el.removeEventListener('change', updateAllScoresForAudit);
            el.removeEventListener('input', updateAllScoresForAudit);
            el.addEventListener('change', updateAllScoresForAudit);
            el.addEventListener('input', updateAllScoresForAudit);
        });
    }
    function resetAudit() {
        for(let id of Object.keys(getAllItems())) {
            let sel = document.getElementById(`status_${id}`);
            let inp = document.getElementById(`fact_${id}`);
            if(sel) sel.value = 'no';
            if(inp) inp.value = '';
        }
        saveCurrentFormStateForAudit();
        updateAllScoresForAudit();
    }
    function saveAuditToRegistry() {
        let auditType = document.querySelector('input[name="auditType"]:checked').value;
        let templateId = document.getElementById('templateSelectForAudit').value;
        let all = getAllItems();
        let statuses={}, facts={};
        for(let id of Object.keys(all)) {
            let sel = document.getElementById(`status_${id}`);
            let inp = document.getElementById(`fact_${id}`);
            if(sel) statuses[id]=sel.value;
            if(inp) facts[id]=inp.value;
        }
        let nonConform = [];
        for(let id of Object.keys(all)) {
            let status = statuses[id];
            if(status==='no') nonConform.push({id, text:all[id].text, reason:'Статус "Нет"'});
            else if(status==='yes' && all[id].inputType!=='none') {
                let fact = facts[id];
                if(!isFactCompliant(id, fact)) nonConform.push({id, text:all[id].text, reason:`Факт ${fact} не соответствует цели ${all[id].recommend}`});
            }
        }
        let groups = {};
        for(let id of Object.keys(all)) { let s = all[id].section; if(!groups[s]) groups[s]=[]; groups[s].push(id); }
        let sectionScores = {};
        for(let [sec, ids] of Object.entries(groups)) sectionScores[sec] = computeSectionProgressForAudit(ids);
        let totalPercent = parseFloat(document.getElementById('totalScorePercent').innerText);
        let auditData = { type: auditType, date: new Date().toISOString(), templateId: templateId || null, totalPercent, sectionScores, nonConformances: nonConform, statuses, facts };
        addAudit(auditData);
        alert('Аудит сохранён');
        populateAuditLoadSelect();
    }
    function populateAuditLoadSelect() {
        let select = document.getElementById('loadAuditSelect');
        if(!select) return;
        let registry = getAuditRegistry();
        select.innerHTML = '<option value="">-- Загрузить аудит --</option>';
        registry.forEach(a => { let opt = document.createElement('option'); opt.value = a.id; opt.textContent = `${new Date(a.date).toLocaleString()} (${a.type}) – ${a.totalPercent}%`; select.appendChild(opt); });
    }
    function loadAuditById(auditId) {
        let audit = getAuditById(auditId);
        if(!audit) return;
        document.querySelector(`input[name="auditType"][value="${audit.type}"]`).checked = true;
        if(audit.templateId) {
            document.getElementById('templateSelectForAudit').value = audit.templateId;
            applyTemplateToAudit(audit.templateId);
        } else {
            renderAuditSections([]);
        }
        for(let [id,status] of Object.entries(audit.statuses)) {
            let sel = document.getElementById(`status_${id}`);
            if(sel) sel.value = status;
        }
        for(let [id,fact] of Object.entries(audit.facts)) {
            let inp = document.getElementById(`fact_${id}`);
            if(inp) inp.value = fact;
        }
        updateAllScoresForAudit();
        alert(`Загружен аудит от ${new Date(audit.date).toLocaleString()}`);
    }
    function printReport() {
        let all = getAllItems();
        let nonConform = [];
        for(let id of Object.keys(all)) {
            let sel = document.getElementById(`status_${id}`);
            if(!sel) continue;
            let status = sel.value;
            if(status==='no') nonConform.push({text:all[id].text, reason:'Статус "Нет"', recommend:`Рекомендуется: ${all[id].text}.`});
            else if(status==='yes' && all[id].inputType!=='none') {
                let inp = document.getElementById(`fact_${id}`);
                let fact = inp ? inp.value : '';
                if(!isFactCompliant(id, fact)) nonConform.push({text:all[id].text, reason:`Факт ${fact} не соответствует цели ${all[id].recommend}`, recommend:`Достигните ${all[id].recommend}`});
            }
        }
        if(nonConform.length===0) { alert('Нет несоответствий'); return; }
        let win = window.open('', '_blank');

        <h1>Отчёт аудита SCM</h1><p>Дата: ${new Date().toLocaleString()}</p><p>Тип: ${document.querySelector('input[name="auditType"]:checked').value}</p>
        <p>Общий уровень зрелости: ${document.getElementById('totalScorePercent').innerText}</p><h2>Рекомендации</h2>
        <table><thead><tr><th>Пункт</th><th>Причина</th><th>Рекомендация</th></tr></thead><tbody>
        ${nonConform.map(nc=>`<tr><td>${nc.text}</td><td>${nc.reason}</td><td>${nc.recommend}</td></tr>`).join('')}
        </tbody></table></body></html>`);
        win.document.close(); win.print();
    }

    // ------------------------------------------------------------------
    // 4. РЕЖИМ КОНСТРУКТОРА (выбор пунктов, кастомные, шаблоны)
    // ------------------------------------------------------------------
    function renderConstructor() {
        const container = document.getElementById('allItemsPicker');
        let all = getAllItems();
        let selectedIds = JSON.parse(sessionStorage.getItem('constructor_selected_ids') || '[]');
        container.innerHTML = '';
        for(let sec of sectionsOrder) {
            let secDiv = document.createElement('div'); secDiv.style.marginBottom='16px';
            let title = document.createElement('div'); title.style.fontWeight='bold'; title.innerText = sectionTitles[sec];
            secDiv.appendChild(title);
            let itemsDiv = document.createElement('div'); itemsDiv.className='item-picker';
            for(let [id,item] of Object.entries(all)) {
                if(item.section===sec) {
                    let label = document.createElement('label');
                    let cb = document.createElement('input'); cb.type='checkbox'; cb.value=id; cb.checked=selectedIds.includes(id);
                    cb.addEventListener('change', (e) => {
                        if(e.target.checked) { if(!selectedIds.includes(id)) selectedIds.push(id); }
                        else { selectedIds = selectedIds.filter(i=>i!==id); }
                        sessionStorage.setItem('constructor_selected_ids', JSON.stringify(selectedIds));
                    });
                    label.appendChild(cb); label.appendChild(document.createTextNode(item.text));
                    itemsDiv.appendChild(label);
                }
            }
            secDiv.appendChild(itemsDiv);
            container.appendChild(secDiv);
        }
        let customDiv = document.createElement('div'); customDiv.style.marginTop='20px'; customDiv.innerHTML='<strong>Свои пункты:</strong>';
        for(let [id,item] of Object.entries(customItems)) {
            let row = document.createElement('div'); row.style.display='flex'; row.style.gap='8px'; row.style.alignItems='center'; row.style.marginTop='4px';
            row.innerHTML = `<span>${item.text} (${item.unit})</span> <button class="remove-custom" data-id="${id}">❌</button>`;
            customDiv.appendChild(row);
        }
        container.appendChild(customDiv);
        document.querySelectorAll('.remove-custom').forEach(btn => {
            btn.addEventListener('click', (e) => { delete customItems[btn.getAttribute('data-id')]; saveCustomItems(); renderConstructor(); });
        });
        renderTemplatesList();
    }
    function renderTemplatesList() {
        let container = document.getElementById('templatesList');
        container.innerHTML = '';
        templates.forEach(tmpl => {
            let div = document.createElement('div'); div.className='template-item';
            div.innerHTML = `<span><strong>${tmpl.name}</strong> (${tmpl.itemIds.length} пунктов)</span>
                             <div><button class="use-template" data-id="${tmpl.id}">Использовать в аудите</button>
                             <button class="delete-template" data-id="${tmpl.id}">🗑️</button></div>`;
            container.appendChild(div);
        });
        document.querySelectorAll('.use-template').forEach(btn => {
            btn.addEventListener('click', (e) => { auditModeBtn.click(); let id = btn.getAttribute('data-id'); let select = document.getElementById('templateSelectForAudit'); let opt = Array.from(select.options).find(o=>o.value===id); if(opt) select.value=id; applyTemplateToAudit(id); });
        });
        document.querySelectorAll('.delete-template').forEach(btn => {
            btn.addEventListener('click', (e) => { templates = templates.filter(t=>t.id!==btn.getAttribute('data-id')); saveTemplates(); renderTemplatesList(); populateTemplateSelect(); });
        });
    }
    function populateTemplateSelect() {
        let select = document.getElementById('templateSelectForAudit');
        select.innerHTML = '<option value="">-- Без шаблона (все пункты) --</option>';
        templates.forEach(tmpl => { let opt = document.createElement('option'); opt.value = tmpl.id; opt.textContent = tmpl.name; select.appendChild(opt); });
    }
    function applyTemplateToAudit(templateId) {
        let tmpl = templates.find(t=>t.id===templateId);
        if(tmpl) renderAuditSections(tmpl.itemIds);
        else renderAuditSections([]);
    }

    // ------------------------------------------------------------------
    // 5. ПЕРЕКЛЮЧЕНИЕ МЕЖДУ РЕЖИМАМИ, ОБРАБОТЧИКИ
    // ------------------------------------------------------------------
    const auditPanel = document.getElementById('auditModePanel');
    const constructorPanel = document.getElementById('constructorModePanel');
    const auditModeBtn = document.getElementById('auditModeBtn');
    const constructorModeBtn = document.getElementById('constructorModeBtn');
    auditModeBtn.addEventListener('click', () => { auditPanel.style.display='block'; constructorPanel.style.display='none'; auditModeBtn.classList.add('active'); constructorModeBtn.classList.remove('active'); populateTemplateSelect(); if(currentTemplateId) applyTemplateToAudit(currentTemplateId); else renderAuditSections([]); });
    constructorModeBtn.addEventListener('click', () => { auditPanel.style.display='none'; constructorPanel.style.display='block'; auditModeBtn.classList.remove('active'); constructorModeBtn.classList.add('active'); renderConstructor(); });

    document.getElementById('addCustomItemBtn').addEventListener('click', () => {
        let text = document.getElementById('newItemText').value.trim();
        let condition = document.getElementById('newItemCondition').value;
        let target = parseFloat(document.getElementById('newItemTarget').value);
        let unit = document.getElementById('newItemUnit').value.trim();
        if(!text) return alert('Введите текст пункта');
        let id = 'custom_'+Date.now();
        customItems[id] = { section:"personnel", text:text, recommend:(condition==='greater'?'≥':'≤')+target+unit, inputType:"number", unit:unit, target:target, condition:condition };
        saveCustomItems();
        document.getElementById('newItemText').value=''; document.getElementById('newItemTarget').value=''; document.getElementById('newItemUnit').value='';
        renderConstructor();
    });
    document.getElementById('saveTemplateBtn').addEventListener('click', () => {
        let name = document.getElementById('newTemplateName').value.trim();
        if(!name) return alert('Введите название шаблона');
        let selectedIds = JSON.parse(sessionStorage.getItem('constructor_selected_ids') || '[]');
        if(selectedIds.length===0) return alert('Выберите хотя бы один пункт');
        let newTemplate = { id: Date.now().toString(), name: name, itemIds: selectedIds };
        templates.push(newTemplate);
        saveTemplates();
        document.getElementById('newTemplateName').value='';
        renderTemplatesList();
        populateTemplateSelect();
    });
    document.getElementById('saveAuditBtn').addEventListener('click', saveAuditToRegistry);
    document.getElementById('calculateBtn').addEventListener('click', updateAllScoresForAudit);
    document.getElementById('resetAuditBtn').addEventListener('click', resetAudit);
    document.getElementById('printPdfBtn').addEventListener('click', printReport);
    document.getElementById('templateSelectForAudit').addEventListener('change', (e) => { currentTemplateId = e.target.value; if(e.target.value) applyTemplateToAudit(e.target.value); else renderAuditSections([]); });
    document.getElementById('loadAuditSelect').addEventListener('change', (e) => { if(e.target.value) loadAuditById(e.target.value); });

    // Инициализация
    function init() {
        loadCustomItems(); loadTemplates();
        populateTemplateSelect(); populateAuditLoadSelect();
        renderAuditSections([]);
        attachAuditEvents();
        let urlLoad = new URLSearchParams(window.location.search).get('load');
        if(urlLoad) loadAuditById(urlLoad);
    }
    init();
</script>
</body>
</html>
