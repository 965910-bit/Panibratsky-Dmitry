        .section-header h2 { font-size: 22px; color: #1e40af; }
        .section-score { font-weight: 700; background: #eef2ff; padding: 6px 14px; border-radius: 30px; font-size: 14px; }

        .checklist-item select, .checklist-item input { padding: 6px 10px; border: 1px solid #e2e8f0; border-radius: 12px; background: white; }
        .checklist-item label { flex: 2; cursor: pointer; font-size: 14px; }
        .fact-input { width: 120px; }
        .fact-unit { font-size: 12px; color: #64748b; margin-left: 4px; }
        .progress-bar-container { height: 8px; background: #e2e8f0; border-radius: 10px; margin: 12px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: #1e40af; width: 0%; border-radius: 10px; }
        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }

        button.print-btn { background: #f59e0b; }
        button.finish-btn { background: #10b981; }

</head>

<div class="app-container">
    <aside class="sidebar">

    <main class="main-content">

            <button id="constructorModeBtn">🛠️ Конструктор шаблонов</button>
        </div>

        <div id="auditModePanel">

                     <label><input type="radio" name="auditType" value="Внеплановый"> Внеплановый</label>
                     <label><input type="radio" name="auditType" value="Целевой"> Целевой</label></div>
                <div><label>Шаблон аудита: </label><select id="templateSelectForAudit"></select></div>
                <div><label>Загрузить сохранённый аудит: </label><select id="loadAuditSelect"></select></div>
            </div>
            <div class="total-score-card">

                <div class="maturity-label" id="maturityLabel">—</div>
            </div>
            <div id="auditSectionsContainer"></div>
            <div class="btn-group">

                <button id="printPdfBtn" class="print-btn">🖨️ Печать PDF (отчёт с рекомендациями)</button>
            </div>
        </div>

        <div id="constructorModePanel" style="display: none;">
            <div class="constructor-section">
                <h3>📌 Выберите пункты для шаблона</h3>

                <div class="custom-item-form">
                    <input type="text" id="newItemText" placeholder="Текст пункта" style="flex:2;">
                    <select id="newItemCondition"><option value="greater">≥</option><option value="less">≤</option><option value="equal">=</option></select>
                    <input type="number" id="newItemTarget" placeholder="Целевое значение">
                    <input type="text" id="newItemUnit" placeholder="Ед. изм. (%, дни, руб.)">
                    <button id="addCustomItemBtn">➕ Добавить свой пункт</button>
                </div>
                <div class="template-list">
                    <h3>📁 Мои шаблоны</h3>
                    <div id="templatesList"></div>
                    <div style="margin-top: 16px;">
                        <input type="text" id="newTemplateName" placeholder="Название шаблона">
                        <button id="saveTemplateBtn">💾 Сохранить текущий набор как шаблон</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

    // Кастомные пункты и шаблоны

    const sectionsOrder = ["personnel","operations","transport","procurement","finance","data_it","compliance","esg","customer","digital","safety"];

    function getAllItems() { return { ...masterItems, ...customItems }; }

    // Загрузка/сохранение кастомных пунктов и шаблонов
    function loadCustomItems() { const saved = localStorage.getItem('audit_custom_items'); if(saved) customItems = JSON.parse(saved); }
    function saveCustomItems() { localStorage.setItem('audit_custom_items', JSON.stringify(customItems)); }
    function loadTemplates() { const saved = localStorage.getItem('audit_templates'); if(saved) templates = JSON.parse(saved); else templates = []; }
    function saveTemplates() { localStorage.setItem('audit_templates', JSON.stringify(templates)); }

    // Состояние текущей формы
    let currentFormState = {};
    function saveCurrentFormState() {
        const state = {};
        for (let id of Object.keys(getAllItems())) {
            const sel = document.getElementById(`status_${id}`);
            const inp = document.getElementById(`fact_${id}`);
            if (sel) state[id] = { status: sel.value, fact: inp ? inp.value : '' };
        }
        localStorage.setItem('audit_current_form', JSON.stringify(state));
    }
    function loadCurrentFormState() {
        const saved = localStorage.getItem('audit_current_form');
        if (saved) {
            const state = JSON.parse(saved);
            for (let [id, data] of Object.entries(state)) {
                const sel = document.getElementById(`status_${id}`);
                const inp = document.getElementById(`fact_${id}`);
                if (sel) sel.value = data.status;
                if (inp) inp.value = data.fact || '';
            }
        }
    }

    // ИСПРАВЛЕННАЯ ЛОГИКА СООТВЕТСТВИЯ (учитывает равенство)
    function isFactCompliant(itemId, factValue) {
        const item = getAllItems()[itemId];
        if (!item || item.inputType === 'none') return true;
        if (item.target === undefined) return true;
        const num = parseFloat(factValue);
        if (isNaN(num)) return false;
        if (item.condition === 'less') return num < item.target;
        if (item.condition === 'greater') return num > item.target;
        if (item.condition === 'equal') return Math.abs(num - item.target) < 0.01;
        return false;
    }

    // Расчёт процента для секции
    function computeSectionProgress(itemIds) {
        let total = 0, compliant = 0;
        for (let id of itemIds) {
            const sel = document.getElementById(`status_${id}`);
            if (!sel) continue;
            const status = sel.value;
            if (status === 'na') continue;
            total++;
            if (status === 'yes') {
                const item = getAllItems()[id];
                if (item && item.inputType !== 'none') {
                    const inp = document.getElementById(`fact_${id}`);
                    const fact = inp ? inp.value : '';
                    if (isFactCompliant(id, fact)) compliant++;
                } else compliant++;
            }
        }
        return total === 0 ? 0 : (compliant / total) * 100;
    }

    function updateAllScores() {
        const all = getAllItems();
        const groups = {};
        for (let id of Object.keys(all)) { let s = all[id].section; if (!groups[s]) groups[s] = []; groups[s].push(id); }
        for (let [sec, ids] of Object.entries(groups)) {
            let percent = computeSectionProgress(ids);
            let scoreSpan = document.getElementById(`score_${sec}`);
            if (scoreSpan) scoreSpan.innerText = `${Math.round(percent)}%`;
            let progFill = document.getElementById(`progress_${sec}`);
            if (progFill) progFill.style.width = `${percent}%`;
        }
        let total = 0, count = 0;
        for (let sec of sectionsOrder) {
            if (groups[sec]) { total += computeSectionProgress(groups[sec]); count++; }
        }
        let avg = count === 0 ? 0 : total / count;
        document.getElementById('totalScorePercent').innerText = `${Math.round(avg)}%`;
        let maturity = avg<30?'🔴 Критический уровень':avg<50?'🟠 Низкий уровень':avg<70?'🟡 Средний уровень':avg<85?'🟢 Высокий уровень':'🏆 Отличный уровень';
        document.getElementById('maturityLabel').innerHTML = maturity;
        saveCurrentFormState();
    }

    // Рендеринг аудита с возможной фильтрацией по шаблону
    let currentFilterIds = null;
    function renderAuditSections(filterIds = null) {
        const all = getAllItems();
        let itemsToShow = {};
        if (filterIds && filterIds.length > 0) {
            for (let id of filterIds) if (all[id]) itemsToShow[id] = all[id];
        } else itemsToShow = all;
        const groups = {};
        for (let [id, item] of Object.entries(itemsToShow)) {
            if (!groups[item.section]) groups[item.section] = [];
            groups[item.section].push({ id, ...item });
        }
        const container = document.getElementById('auditSectionsContainer');
        container.innerHTML = '';
        for (let sec of sectionsOrder) {
            if (!groups[sec]) continue;
            const div = document.createElement('div'); div.className = 'audit-section';
            div.innerHTML = `<div class="section-header"><h2><i class="fas fa-list-check"></i> ${sectionTitles[sec]}</h2><div class="section-score" id="score_${sec}">0%</div></div>
                             <div class="checklist-items" id="items_${sec}"></div>
                             <div class="progress-bar-container"><div class="progress-fill" id="progress_${sec}"></div></div>`;
            container.appendChild(div);
            const itemsContainer = div.querySelector(`.checklist-items`);
            for (let item of groups[sec]) {
                const row = document.createElement('div'); row.className = 'checklist-item';
                const select = document.createElement('select'); select.id = `status_${item.id}`; select.innerHTML = '<option value="yes">Да</option><option value="no" selected>Нет</option><option value="na">Не требуется</option>';
                const label = document.createElement('label'); label.textContent = item.text;
                row.appendChild(select); row.appendChild(label);
                if (item.inputType !== 'none') {
                    const inp = document.createElement('input'); inp.type = item.inputType; inp.id = `fact_${item.id}`; inp.placeholder = `Факт, ${item.unit}`; inp.className = 'fact-input';
                    const unitSpan = document.createElement('span'); unitSpan.className = 'fact-unit'; unitSpan.textContent = item.unit;
                    row.appendChild(inp); row.appendChild(unitSpan);
                }
                itemsContainer.appendChild(row);
            }
        }
        loadCurrentFormState();
        updateAllScores();
        attachAuditEvents();
    }

    function attachAuditEvents() {
        document.querySelectorAll('.checklist-item select, .checklist-item input').forEach(el => {
            el.removeEventListener('change', updateAllScores);
            el.removeEventListener('input', updateAllScores);
            el.addEventListener('change', updateAllScores);
            el.addEventListener('input', updateAllScores);
        });
        document.querySelectorAll('.reset-category').forEach(btn => {
            btn.removeEventListener('click', handleResetCategory);
            btn.addEventListener('click', handleResetCategory);
        });
        document.querySelectorAll('.add-item-btn').forEach(btn => {
            btn.removeEventListener('click', handleAddItem);
            btn.addEventListener('click', handleAddItem);
        });
    }

    function handleResetCategory(e) {
        const section = e.currentTarget.getAttribute('data-section');
        if (confirm(`Сбросить все ответы в категории "${sectionTitles[section]}"?`)) {
            const all = getAllItems();
            for (let [id, item] of Object.entries(all)) {
                if (item.section === section) {
                    const sel = document.getElementById(`status_${id}`);
                    const inp = document.getElementById(`fact_${id}`);
                    if (sel) sel.value = 'no';
                    if (inp) inp.value = '';
                }
            }
            saveCurrentFormState();
            updateAllScores();
        }
    }

    function handleAddItem(e) {
        const section = e.currentTarget.getAttribute('data-section');
        const input = e.currentTarget.parentElement.querySelector('.new-item-input');
        const newText = input.value.trim();
        if (!newText) return alert('Введите текст пункта');
        const newId = `custom_${Date.now()}_${Math.random()}`;
        customItems[newId] = { section: section, text: newText, recommend: "Да", inputType: "none", unit: "" };
        saveCustomItems();
        renderAuditSections(currentFilterIds);
        input.value = '';
    }

    function resetAll() {
        if (confirm('Сбросить все ответы во всех категориях?')) {
            for (let id of Object.keys(getAllItems())) {
                const sel = document.getElementById(`status_${id}`);
                const inp = document.getElementById(`fact_${id}`);
                if (sel) sel.value = 'no';
                if (inp) inp.value = '';
            }
            saveCurrentFormState();
            updateAllScores();
        }
    }

    function printReport() {
        const all = getAllItems();
        const nonConform = [];
        for (let [id, item] of Object.entries(all)) {
            const sel = document.getElementById(`status_${id}`);
            if (!sel) continue;
            const status = sel.value;
            if (status === 'no') {
                nonConform.push({ text: item.text, reason: 'Статус "Нет"', recommend: `Рекомендуется: ${item.text}.` });
            } else if (status === 'yes' && item.inputType !== 'none') {
                const inp = document.getElementById(`fact_${id}`);
                const fact = inp ? inp.value : '';
                if (!isFactCompliant(id, fact)) {
                    nonConform.push({ text: item.text, reason: `Факт ${fact} не соответствует цели ${item.recommend}`, recommend: `Достигните ${item.recommend}` });
                }
            }
        }
        if (nonConform.length === 0) { alert('Нет несоответствий'); return; }
        const win = window.open('', '_blank');
        win.document.write(`<html><head><title>Отчёт аудита SCM</title><style>body{font-family:Inter;margin:20px}table{border-collapse:collapse;width:100%}th,td{border:1px solid #ccc;padding:8px}</style></head><body>
        <h1>Отчёт аудита SCM</h1><p>Дата: ${new Date().toLocaleString()}</p><p>Тип: ${document.querySelector('input[name="auditType"]:checked').value}</p>
        <p>Общий уровень зрелости: ${document.getElementById('totalScorePercent').innerText}</p><h2>Рекомендации</h2>
        <table><thead><tr><th>Пункт</th><th>Причина</th><th>Рекомендация</th></tr></thead><tbody>
        ${nonConform.map(nc => `<tr><td>${nc.text}</td><td>${nc.reason}</td><td>${nc.recommend}</td></tr>`).join('')}
        </tbody></table></body></html>`);
        win.document.close(); win.print();
    }

    function saveAuditToRegistry() {
        const auditType = document.querySelector('input[name="auditType"]:checked').value;
        const templateId = document.getElementById('templateSelectForAudit').value;
        const all = getAllItems();
        const statuses = {};
        const facts = {};
        for (let id of Object.keys(all)) {
            const sel = document.getElementById(`status_${id}`);
            const inp = document.getElementById(`fact_${id}`);
            if (sel) statuses[id] = sel.value;
            if (inp) facts[id] = inp.value;
        }
        const nonConform = [];
        for (let id of Object.keys(all)) {
            const status = statuses[id];
            if (status === 'no') {
                nonConform.push({ id, text: all[id].text, reason: 'Статус "Нет"' });
            } else if (status === 'yes' && all[id].inputType !== 'none') {
                const fact = facts[id];
                if (!isFactCompliant(id, fact)) {
                    nonConform.push({ id, text: all[id].text, reason: `Факт ${fact} не соответствует цели ${all[id].recommend}` });
                }
            }
        }
        const groups = {};
        for (let id of Object.keys(all)) { let s = all[id].section; if (!groups[s]) groups[s] = []; groups[s].push(id); }
        const sectionScores = {};
        for (let [sec, ids] of Object.entries(groups)) sectionScores[sec] = computeSectionProgress(ids);
        const totalPercent = parseFloat(document.getElementById('totalScorePercent').innerText);
        const auditData = {
            type: auditType,
            date: new Date().toISOString(),
            templateId: templateId || null,
            totalPercent: totalPercent,
            sectionScores: sectionScores,
            nonConformances: nonConform,
            statuses: statuses,
            facts: facts
        };
        if (window.SCMData && SCMData.addAudit) {
            SCMData.addAudit(auditData);
            alert('Аудит сохранён');
            populateAuditLoadSelect();
        } else alert('SCMData не определён');
    }

    function finishAudit() {
        saveAuditToRegistry();
        resetAll();
        window.location.href = 'audit-registry.html';
    }

    function populateAuditLoadSelect() {
        const select = document.getElementById('loadAuditSelect');
        if (!select) return;
        const registry = window.SCMData ? SCMData.getAuditRegistry() : [];
        select.innerHTML = '<option value="">-- Загрузить аудит --</option>';
        registry.forEach(a => { const opt = document.createElement('option'); opt.value = a.id; opt.textContent = `${new Date(a.date).toLocaleString()} (${a.type}) – ${a.totalPercent}%`; select.appendChild(opt); });
    }

    function loadAuditById(auditId) {
        const audit = window.SCMData?.getAuditById(auditId);
        if (!audit) return;
        document.querySelector(`input[name="auditType"][value="${audit.type}"]`).checked = true;
        if (audit.templateId) {
            document.getElementById('templateSelectForAudit').value = audit.templateId;
            applyTemplate(audit.templateId);
        } else {
            renderAuditSections(null);
        }
        for (let [id, status] of Object.entries(audit.statuses)) {
            const sel = document.getElementById(`status_${id}`);
            if (sel) sel.value = status;
        }
        for (let [id, fact] of Object.entries(audit.facts)) {
            const inp = document.getElementById(`fact_${id}`);
            if (inp) inp.value = fact;
        }
        updateAllScores();
        alert(`Загружен аудит от ${new Date(audit.date).toLocaleString()}`);
    }

    // Конструктор шаблонов
    function renderConstructor() {
        const container = document.getElementById('allItemsPicker');
        let all = getAllItems();
        let selectedIds = JSON.parse(sessionStorage.getItem('constructor_selected_ids') || '[]');
        container.innerHTML = '';
        for (let sec of sectionsOrder) {
            let secDiv = document.createElement('div'); secDiv.style.marginBottom = '16px';
            let title = document.createElement('div'); title.style.fontWeight = 'bold'; title.innerText = sectionTitles[sec];
            secDiv.appendChild(title);
            let itemsDiv = document.createElement('div'); itemsDiv.className = 'item-picker';
            for (let [id, item] of Object.entries(all)) {
                if (item.section === sec) {
                    let label = document.createElement('label');
                    let cb = document.createElement('input'); cb.type = 'checkbox'; cb.value = id; cb.checked = selectedIds.includes(id);
                    cb.addEventListener('change', (e) => {
                        if (e.target.checked) { if (!selectedIds.includes(id)) selectedIds.push(id); }
                        else { selectedIds = selectedIds.filter(i => i !== id); }
                        sessionStorage.setItem('constructor_selected_ids', JSON.stringify(selectedIds));
                    });
                    label.appendChild(cb); label.appendChild(document.createTextNode(item.text));
                    itemsDiv.appendChild(label);
                }
            }
            secDiv.appendChild(itemsDiv);
            container.appendChild(secDiv);
        }
        let customDiv = document.createElement('div'); customDiv.style.marginTop = '20px'; customDiv.innerHTML = '<strong>Свои пункты:</strong>';
        for (let [id, item] of Object.entries(customItems)) {
            let row = document.createElement('div'); row.style.display = 'flex'; row.style.gap = '8px'; row.style.alignItems = 'center'; row.style.marginTop = '4px';
            row.innerHTML = `<span>${item.text} (${item.unit})</span> <button class="remove-custom" data-id="${id}">❌</button>`;
            customDiv.appendChild(row);
        }
        container.appendChild(customDiv);
        document.querySelectorAll('.remove-custom').forEach(btn => {
            btn.addEventListener('click', (e) => { delete customItems[btn.getAttribute('data-id')]; saveCustomItems(); renderConstructor(); });
        });
        renderTemplatesList();
    }

    function renderTemplatesList() {
        let container = document.getElementById('templatesList');
        container.innerHTML = '';
        templates.forEach(tmpl => {
            let div = document.createElement('div'); div.className = 'template-item';
            div.innerHTML = `<span><strong>${tmpl.name}</strong> (${tmpl.itemIds.length} пунктов)</span>
                             <div><button class="use-template" data-id="${tmpl.id}">Использовать в аудите</button>
                             <button class="delete-template" data-id="${tmpl.id}">🗑️</button></div>`;
            container.appendChild(div);
        });
        document.querySelectorAll('.use-template').forEach(btn => {
            btn.addEventListener('click', (e) => { auditModeBtn.click(); let id = btn.getAttribute('data-id'); applyTemplate(id); });
        });
        document.querySelectorAll('.delete-template').forEach(btn => {
            btn.addEventListener('click', (e) => { templates = templates.filter(t => t.id !== btn.getAttribute('data-id')); saveTemplates(); renderTemplatesList(); populateAuditTemplateSelect(); });
        });
    }

    function populateAuditTemplateSelect() {
        const select = document.getElementById('templateSelectForAudit');
        if (!select) return;
        select.innerHTML = '<option value="">-- Без шаблона (все пункты) --</option>';
        templates.forEach(tmpl => {
            const opt = document.createElement('option');
            opt.value = tmpl.id;
            opt.textContent = `${tmpl.name} (${tmpl.itemIds.length} пунктов)`;
            select.appendChild(opt);
        });
    }

    function applyTemplate(templateId) {
        const tmpl = templates.find(t => t.id === templateId);
        if (tmpl) {
            currentFilterIds = tmpl.itemIds;
            renderAuditSections(currentFilterIds);
            const select = document.getElementById('templateSelectForAudit');
            if (select) select.value = templateId;
        }
    }

    function onApplyAuditTemplate() {
        const select = document.getElementById('templateSelectForAudit');
        const templateId = select.value;
        if (templateId) applyTemplate(templateId);
        else { currentFilterIds = null; renderAuditSections(null); }
    }

    document.getElementById('addCustomItemBtn').addEventListener('click', () => {
        let text = document.getElementById('newItemText').value.trim();
        let condition = document.getElementById('newItemCondition').value;
        let target = parseFloat(document.getElementById('newItemTarget').value);
        let unit = document.getElementById('newItemUnit').value.trim();
        if (!text) return alert('Введите текст пункта');
        let id = 'custom_' + Date.now();
        customItems[id] = { section: "personnel", text: text, recommend: (condition === 'greater' ? '≥' : condition === 'less' ? '≤' : '=') + target + unit, inputType: "number", unit: unit, target: target, condition: condition };
        saveCustomItems();
        document.getElementById('newItemText').value = ''; document.getElementById('newItemTarget').value = ''; document.getElementById('newItemUnit').value = '';
        renderConstructor();
    });

    document.getElementById('saveTemplateBtn').addEventListener('click', () => {
        let name = document.getElementById('newTemplateName').value.trim();
        if (!name) return alert('Введите название шаблона');
        let selectedIds = JSON.parse(sessionStorage.getItem('constructor_selected_ids') || '[]');
        if (selectedIds.length === 0) return alert('Выберите хотя бы один пункт');
        let newTemplate = { id: Date.now().toString(), name: name, itemIds: selectedIds };
        templates.push(newTemplate);
        saveTemplates();
        document.getElementById('newTemplateName').value = '';
        renderTemplatesList();
        populateAuditTemplateSelect();
    });

    const auditPanel = document.getElementById('auditModePanel');
    const constructorPanel = document.getElementById('constructorModePanel');
    const auditModeBtn = document.getElementById('auditModeBtn');
    const constructorModeBtn = document.getElementById('constructorModeBtn');
    auditModeBtn.addEventListener('click', () => {
        auditPanel.style.display = 'block';
        constructorPanel.style.display = 'none';
        auditModeBtn.classList.add('active');
        constructorModeBtn.classList.remove('active');
        populateAuditTemplateSelect();
        if (currentFilterIds) renderAuditSections(currentFilterIds);
        else renderAuditSections(null);
    });
    constructorModeBtn.addEventListener('click', () => {
        auditPanel.style.display = 'none';
        constructorPanel.style.display = 'block';
        auditModeBtn.classList.remove('active');
        constructorModeBtn.classList.add('active');
        renderConstructor();
    });

    document.getElementById('saveAuditBtn').addEventListener('click', saveAuditToRegistry);
    document.getElementById('finishAuditBtn').addEventListener('click', finishAudit);
    document.getElementById('calculateBtn').addEventListener('click', updateAllScores);
    document.getElementById('resetAuditBtn').addEventListener('click', resetAll);
    document.getElementById('printPdfBtn').addEventListener('click', printReport);
    document.getElementById('templateSelectForAudit').addEventListener('change', onApplyAuditTemplate);
    document.getElementById('loadAuditSelect').addEventListener('change', (e) => { if (e.target.value) loadAuditById(e.target.value); });

    loadCustomItems(); loadTemplates();
    populateAuditTemplateSelect();
    renderAuditSections(null);
    const urlLoad = new URLSearchParams(window.location.search).get('load');
    if (urlLoad) loadAuditById(urlLoad);
</script>
</body>
</html>
