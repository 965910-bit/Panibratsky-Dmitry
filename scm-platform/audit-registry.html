<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Реестр аудитов и чек-листов SCM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="scm-style.css">
    <script src="scm-common.js"></script>
    <style>
        .registry-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            margin-top: 16px;
        }
        .registry-table th, .registry-table td {
            border: 1px solid #e2e8f0;
            padding: 12px;
            text-align: left;
            vertical-align: top;
        }
        .registry-table th {
            background: #eef2ff;
            font-weight: 600;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        button {
            background: #1e40af;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
        }
        button.danger {
            background: #dc2626;
        }
        button.warning {
            background: #f59e0b;
        }
        button.small {
            padding: 4px 10px;
            font-size: 12px;
            margin: 2px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 24px;
            max-width: 700px;
            width: 90%;
            max-height: 80%;
            overflow-y: auto;
        }
        .modal-content h3 {
            margin-bottom: 16px;
            color: #1e40af;
        }
        .nonconform-item {
            background: #fef2f2;
            padding: 8px;
            margin-bottom: 8px;
            border-radius: 12px;
            border-left: 4px solid #dc2626;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
        .section-title {
            margin-top: 32px;
            margin-bottom: 16px;
            font-size: 24px;
            color: #1e40af;
        }
        .branch-selector-container {
            float: right;
            margin-bottom: 16px;
            background: white;
            padding: 6px 12px;
            border-radius: 30px;
            border: 1px solid #e2e8f0;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .filter-bar {
            background: white;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: flex-end;
            border: 1px solid #e2e8f0;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .filter-group label {
            font-size: 12px;
            font-weight: 500;
        }
        .filter-group input, .filter-group select {
            padding: 6px 10px;
            border-radius: 20px;
            border: 1px solid #cbd5e1;
            background: white;
        }
        @media (max-width: 768px) {
            .registry-table {
                font-size: 12px;
            }
            th, td {
                padding: 8px;
            }
            .branch-selector-container {
                float: none;
                margin-bottom: 16px;
                display: flex;
            }
        }
        @media print {
            .sidebar, .btn-group, .filter-bar, .branch-selector-container, .theme-switch, .modal {
                display: none;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <aside class="sidebar">...</aside>
    <main class="main-content">
        <div class="theme-switch" id="themeToggle"><i class="fas fa-moon"></i> <span>Тёмная тема</span></div>
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 20px;">
            <h1>📋 Реестр аудитов и чек-листов</h1>
            <div class="branch-selector-container">
                <label><i class="fas fa-building"></i> Бизнес-единица:</label>
                <select id="branchSelector"></select>
            </div>
        </div>
        <p>Просмотр, удаление, экспорт, импорт и печать сохранённых аудитов и чек-листов для выбранной бизнес-единицы.</p>
        <div class="btn-group">
            <button id="exportRegistryBtn">📎 Экспорт реестра (JSON)</button>
            <button id="importRegistryBtn">📂 Импорт реестра (JSON)</button>
            <button id="deleteAllBtn" class="danger">🗑️ Удалить всё</button>
            <button id="printAllBtn" class="warning">🖨️ Печать сводного отчёта</button>
        </div>

        <!-- Фильтры для аудитов -->
        <div class="filter-bar">
            <div class="filter-group"><label>Тип аудита</label><select id="filterAuditType"><option value="">Все</option><option value="Плановый">Плановый</option><option value="Внеплановый">Внеплановый</option><option value="Целевой">Целевой</option></select></div>
            <div class="filter-group"><label>Дата от</label><input type="date" id="filterDateFrom"></div>
            <div class="filter-group"><label>Дата до</label><input type="date" id="filterDateTo"></div>
            <div class="filter-group"><label>Мин. зрелость (%)</label><input type="number" id="filterMinScore" placeholder="0-100" min="0" max="100"></div>
            <button id="resetFiltersBtn">Сбросить</button>
        </div>

        <div id="auditsSection">
            <h2 class="section-title">📌 Аудиты</h2>
            <div id="auditsList"></div>
        </div>

        <div id="checklistsSection">
            <h2 class="section-title">✅ Чек-листы</h2>
            <div id="checklistsList"></div>
        </div>
    </main>
</div>

<script>
(function() {
    // ---- Тёмная тема ----
    const themeToggle = document.getElementById('themeToggle');
    const body = document.body;
    if (localStorage.getItem('scm_theme') === 'dark') body.classList.add('dark-theme');
    themeToggle.addEventListener('click', () => {
        body.classList.toggle('dark-theme');
        localStorage.setItem('scm_theme', body.classList.contains('dark-theme') ? 'dark' : 'light');
    });

    // ---- Филиал ----
    let currentBranchId = 'default';
    function loadBranchSelector() {
        const branches = BranchManager.getBranches();
        const tree = BranchManager.buildTree(branches);
        const select = document.getElementById('branchSelector');
        select.innerHTML = '';
        const addOptions = (nodes, prefix = '') => {
            for (let node of nodes) {
                const opt = document.createElement('option');
                opt.value = node.id;
                opt.textContent = prefix + node.name + ' (' + node.type + ')';
                if (node.id === currentBranchId) opt.selected = true;
                select.appendChild(opt);
                if (node.children) addOptions(node.children, prefix + '— ');
            }
        };
        addOptions(tree);
        select.addEventListener('change', (e) => {
            setCurrentBranch(e.target.value);
            currentBranchId = e.target.value;
            renderAudits();
            renderChecklists();
        });
    }

    // ---- Получение данных для текущего филиала ----
    function getAuditRegistry() {
        const key = `audit_registry_${currentBranchId}`;
        return JSON.parse(localStorage.getItem(key) || '[]');
    }
    function saveAuditRegistry(registry) {
        const key = `audit_registry_${currentBranchId}`;
        localStorage.setItem(key, JSON.stringify(registry));
    }
    function getChecklistResults() {
        const results = [];
        const categoriesKey = `scm_checklists_${currentBranchId}`;
        const categories = JSON.parse(localStorage.getItem(categoriesKey) || '{}');
        for (let [catName, items] of Object.entries(categories)) {
            const savedState = SCMData.loadChecklist(catName, currentBranchId);
            let completed = 0;
            for (let i = 0; i < items.length; i++) {
                const itemId = `${catName}_${i}`;
                if (savedState[itemId] === true) completed++;
            }
            const percent = items.length === 0 ? 0 : (completed / items.length) * 100;
            results.push({
                id: `checklist_${catName}`,
                type: 'Чек-лист',
                name: catName,
                date: localStorage.getItem(`checklist_last_modified_${catName}_${currentBranchId}`) || new Date().toISOString(),
                totalPercent: percent,
                items: items,
                state: savedState
            });
        }
        return results;
    }

    // ---- Рендер аудитов с фильтрацией ----
    function renderAudits() {
        let audits = getAuditRegistry();
        const typeFilter = document.getElementById('filterAuditType').value;
        const dateFrom = document.getElementById('filterDateFrom').value;
        const dateTo = document.getElementById('filterDateTo').value;
        const minScore = parseInt(document.getElementById('filterMinScore').value);
        if (typeFilter) audits = audits.filter(a => a.type === typeFilter);
        if (dateFrom) audits = audits.filter(a => a.date >= dateFrom);
        if (dateTo) audits = audits.filter(a => a.date <= dateTo);
        if (!isNaN(minScore)) audits = audits.filter(a => a.totalPercent >= minScore);
        audits.sort((a,b) => new Date(b.date) - new Date(a.date));
        const container = document.getElementById('auditsList');
        if (!audits.length) {
            container.innerHTML = '<div class="empty-state">Нет сохранённых аудитов</div>';
            return;
        }
        const table = document.createElement('table'); table.className = 'registry-table';
        table.innerHTML = `<thead><tr><th>Дата</th><th>Тип</th><th>Зрелость</th><th>Действия</th></tr></thead><tbody></tbody>`;
        const tbody = table.querySelector('tbody');
        audits.forEach(audit => {
            const row = tbody.insertRow();
            row.insertCell(0).textContent = new Date(audit.date).toLocaleString();
            row.insertCell(1).textContent = audit.type;
            row.insertCell(2).textContent = `${audit.totalPercent}%`;
            const actions = row.insertCell(3);
            const viewBtn = document.createElement('button'); viewBtn.textContent = 'Просмотр'; viewBtn.className = 'small';
            viewBtn.onclick = () => showAuditDetails(audit);
            const loadBtn = document.createElement('button'); loadBtn.textContent = 'Загрузить'; loadBtn.className = 'small';
            loadBtn.onclick = () => { window.location.href = `auditor.html?load=${audit.id}`; };
            const printBtn = document.createElement('button'); printBtn.textContent = '🖨️ Печать'; printBtn.className = 'small warning';
            printBtn.onclick = () => { window.open(`report-generator.html?type=audit&id=${audit.id}`, '_blank'); };
            const deleteBtn = document.createElement('button'); deleteBtn.textContent = 'Удалить'; deleteBtn.className = 'small danger';
            deleteBtn.onclick = () => { if(confirm('Удалить аудит?')) { let reg = getAuditRegistry(); reg = reg.filter(a => a.id !== audit.id); saveAuditRegistry(reg); renderAudits(); } };
            actions.appendChild(viewBtn); actions.appendChild(loadBtn); actions.appendChild(printBtn); actions.appendChild(deleteBtn);
        });
        container.innerHTML = ''; container.appendChild(table);
    }

    function renderChecklists() {
        const checklists = getChecklistResults();
        const container = document.getElementById('checklistsList');
        if (!checklists.length) {
            container.innerHTML = '<div class="empty-state">Нет сохранённых чек-листов</div>';
            return;
        }
        const table = document.createElement('table'); table.className = 'registry-table';
        table.innerHTML = `<thead><tr><th>Название</th><th>Дата</th><th>Выполнение</th><th>Действия</th></tr></thead><tbody></tbody>`;
        const tbody = table.querySelector('tbody');
        checklists.forEach(cl => {
            const row = tbody.insertRow();
            row.insertCell(0).textContent = cl.name;
            row.insertCell(1).textContent = new Date(cl.date).toLocaleString();
            row.insertCell(2).textContent = `${Math.round(cl.totalPercent)}%`;
            const actions = row.insertCell(3);
            const viewBtn = document.createElement('button'); viewBtn.textContent = 'Просмотр'; viewBtn.className = 'small';
            viewBtn.onclick = () => showChecklistDetails(cl);
            const printBtn = document.createElement('button'); printBtn.textContent = '🖨️ Печать'; printBtn.className = 'small warning';
            printBtn.onclick = () => { window.open(`report-generator.html?type=checklist&name=${encodeURIComponent(cl.name)}`, '_blank'); };
            const deleteBtn = document.createElement('button'); deleteBtn.textContent = 'Удалить'; deleteBtn.className = 'small danger';
            deleteBtn.onclick = () => {
                if(confirm(`Удалить чек-лист "${cl.name}"?`)) {
                    const categories = JSON.parse(localStorage.getItem(`scm_checklists_${currentBranchId}`) || '{}');
                    delete categories[cl.name];
                    localStorage.setItem(`scm_checklists_${currentBranchId}`, JSON.stringify(categories));
                    localStorage.removeItem(`checklist_${cl.name}_${currentBranchId}`);
                    localStorage.removeItem(`checklist_last_modified_${cl.name}_${currentBranchId}`);
                    renderChecklists();
                }
            };
            actions.appendChild(viewBtn); actions.appendChild(printBtn); actions.appendChild(deleteBtn);
        });
        container.innerHTML = ''; container.appendChild(table);
    }

    function showAuditDetails(audit) {
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>Аудит от ${new Date(audit.date).toLocaleString()}</h3>
                <p><strong>Тип:</strong> ${audit.type}</p>
                <p><strong>Общий уровень зрелости:</strong> ${audit.totalPercent}%</p>
                <p><strong>Оценки по секциям:</strong></p>
                <ul>${Object.entries(audit.sectionScores || {}).map(([sec, score]) => `<li>${sec}: ${Math.round(score)}%</li>`).join('')}</ul>
                <p><strong>Несоответствия (${audit.nonConformances?.length || 0}):</strong></p>
                <div>${(audit.nonConformances || []).map(nc => `<div class="nonconform-item"><strong>${escapeHtml(nc.text)}</strong><br>Причина: ${escapeHtml(nc.reason)}<br>Рекомендация: ${escapeHtml(nc.recommendation || '—')}</div>`).join('')}</div>
                <div style="margin-top: 16px;"><button class="print-report" data-id="${audit.id}">🖨️ Распечатать отчёт</button><button class="close-modal">Закрыть</button></div>
            </div>
        `;
        document.body.appendChild(modal);
        modal.style.display = 'flex';
        modal.querySelector('.close-modal').onclick = () => modal.remove();
        modal.querySelector('.print-report').onclick = () => {
            window.open(`report-generator.html?type=audit&id=${audit.id}`, '_blank');
        };
    }

    function showChecklistDetails(cl) {
        const modal = document.createElement('div'); modal.className = 'modal';
        let itemsHtml = '';
        cl.items.forEach((item, idx) => {
            const itemId = `${cl.name}_${idx}`;
            const checked = cl.state[itemId] === true;
            itemsHtml += `<div class="nonconform-item">${escapeHtml(item)} — ${checked ? '✅ Выполнено' : '❌ Не выполнено'}</div>`;
        });
        modal.innerHTML = `
            <div class="modal-content">
                <h3>Чек-лист: ${escapeHtml(cl.name)}</h3>
                <p><strong>Дата:</strong> ${new Date(cl.date).toLocaleString()}</p>
                <p><strong>Выполнение:</strong> ${Math.round(cl.totalPercent)}%</p>
                <p><strong>Пункты:</strong></p>
                <div>${itemsHtml}</div>
                <div style="margin-top: 16px;"><button class="print-checklist" data-name="${cl.name}">🖨️ Распечатать отчёт</button><button class="close-modal">Закрыть</button></div>
            </div>
        `;
        document.body.appendChild(modal);
        modal.style.display = 'flex';
        modal.querySelector('.close-modal').onclick = () => modal.remove();
        modal.querySelector('.print-checklist').onclick = () => {
            window.open(`report-generator.html?type=checklist&name=${encodeURIComponent(cl.name)}`, '_blank');
        };
    }

    function printAllSummary() {
        const audits = getAuditRegistry();
        const checklists = getChecklistResults();
        const win = window.open('', '_blank');
        win.document.write(`
            <!DOCTYPE html>
            <html><head><title>Сводный отчёт SCM</title>
            <style>
                body{font-family:Inter;margin:20px}h1{color:#1e40af}table{border-collapse:collapse;width:100%}th,td{border:1px solid #ccc;padding:8px}
            </style>
            </head><body>
            <h1>Сводный отчёт по аудитам и чек-листам</h1>
            <p>Бизнес-единица: ${currentBranchId}</p>
            <p>Дата: ${new Date().toLocaleString()}</p>
            <h2>Аудиты</h2>
            <table><thead><tr><th>Дата</th><th>Тип</th><th>Зрелость</th></tr></thead><tbody>
            ${audits.map(a => `<tr><td>${new Date(a.date).toLocaleString()}</td><td>${a.type}</td><td>${a.totalPercent}%</td></tr>`).join('')}
            </tbody></table>
            <h2>Чек-листы</h2>
            <table><thead><tr><th>Название</th><th>Дата</th><th>Выполнение</th></tr></thead><tbody>
            ${checklists.map(c => `<tr><td>${c.name}</td><td>${new Date(c.date).toLocaleString()}</td><td>${Math.round(c.totalPercent)}%</td></tr>`).join('')}
            </tbody></table>
            </body></html>
        `);
        win.document.close();
        win.print();
    }

    function exportRegistry() {
        const data = { audits: getAuditRegistry(), checklists: getChecklistResults(), exportDate: new Date().toISOString(), branchId: currentBranchId };
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `scm_registry_${currentBranchId}_${Date.now()}.json`; a.click();
    }

    function importRegistry(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if (data.audits) { saveAuditRegistry(data.audits); }
                if (data.checklists) {
                    for (let cl of data.checklists) {
                        const categories = JSON.parse(localStorage.getItem(`scm_checklists_${currentBranchId}`) || '{}');
                        if (!categories[cl.name]) categories[cl.name] = cl.items;
                        localStorage.setItem(`scm_checklists_${currentBranchId}`, JSON.stringify(categories));
                        localStorage.setItem(`checklist_${cl.name}_${currentBranchId}`, JSON.stringify(cl.state));
                        localStorage.setItem(`checklist_last_modified_${cl.name}_${currentBranchId}`, cl.date);
                    }
                }
                renderAudits(); renderChecklists();
                alert('Импорт выполнен');
            } catch(err) { alert('Ошибка импорта: ' + err.message); }
        };
        reader.readAsText(file);
    }

    function deleteAll() {
        if (confirm('Удалить ВСЕ аудиты и результаты чек-листов для выбранной бизнес-единицы? Это действие необратимо.')) {
            saveAuditRegistry([]);
            localStorage.setItem(`scm_checklists_${currentBranchId}`, '{}');
            // удаляем также отдельные чек-листы
            const keys = Object.keys(localStorage);
            for (let key of keys) {
                if (key.startsWith(`checklist_`) && key.endsWith(`_${currentBranchId}`)) {
                    localStorage.removeItem(key);
                }
            }
            renderAudits(); renderChecklists();
        }
    }

    document.getElementById('exportRegistryBtn').addEventListener('click', exportRegistry);
    document.getElementById('importRegistryBtn').addEventListener('click', () => {
        const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
        input.onchange = (e) => { if (e.target.files[0]) importRegistry(e.target.files[0]); };
        input.click();
    });
    document.getElementById('deleteAllBtn').addEventListener('click', deleteAll);
    document.getElementById('printAllBtn').addEventListener('click', printAllSummary);
    document.getElementById('resetFiltersBtn').addEventListener('click', () => {
        document.getElementById('filterAuditType').value = '';
        document.getElementById('filterDateFrom').value = '';
        document.getElementById('filterDateTo').value = '';
        document.getElementById('filterMinScore').value = '';
        renderAudits();
    });
    document.getElementById('filterAuditType').addEventListener('change', renderAudits);
    document.getElementById('filterDateFrom').addEventListener('change', renderAudits);
    document.getElementById('filterDateTo').addEventListener('change', renderAudits);
    document.getElementById('filterMinScore').addEventListener('input', renderAudits);

    // Печать всей страницы на бланке
    window.printRegistryWithLogo = function() {
        const mainContent = document.querySelector('.main-content');
        if (!mainContent) return;
        const clone = mainContent.cloneNode(true);
        clone.querySelectorAll('.btn-group, .filter-bar, .branch-selector-container, .theme-switch, button, .small').forEach(el => el.remove());
        const logoUrl = 'https://raw.githubusercontent.com/965910-bit/Panibratsky-Dmitry/main/scm-platform/assets/LargeTile.scale-200.png';
        const printWindow = window.open('', '_blank');
        printWindow.document.write(`
            <!DOCTYPE html>
            <html><head><meta charset="UTF-8"><title>Реестр аудитов и чек-листов</title>
            <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
            <style>
                body { font-family: Inter; margin: 20px; }
                .print-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #1e40af; margin-bottom: 20px; padding-bottom: 10px; }
                .logo-img { height: 50px; }
                .contact-info { font-size: 10pt; line-height: 1.4; }
                .print-footer { margin-top: 40px; border-top: 1px solid #ccc; padding-top: 20px; display: flex; justify-content: space-between; gap: 20px; }
                .sign-line { border-bottom: 1px solid #000; display: inline-block; min-width: 180px; }
                .registry-table { font-size: 9pt; }
            </style>
            </head><body>
            <div class="print-header">
                <div style="display:flex;align-items:center;gap:20px"><img src="${logoUrl}" class="logo-img"><div class="contact-info">Дмитрий Панибратский<br>Эксперт по SCM и логистике<br>scm-news.ru – экспертный портал<br>scm-news.online – Академия SCM<br>dmitry@scm-news.ru</div></div>
                <div>${new Date().toLocaleString()}</div>
            </div>
            ${clone.innerHTML}
            <div class="print-footer">
                <div>Ф.И.О. исполнителя: <span class="sign-line">_________________________</span></div>
                <div>Подпись: <span class="sign-line">_________________________</span></div>
                <div>Дата: ${new Date().toLocaleDateString()}</div>
            </div>
            <script>window.onload = () => { window.print(); window.onafterprint = () => window.close(); }<\/script>
            </body></html>
        `);
        printWindow.document.close();
    };
    // Добавляем кнопку печати страницы, если её нет
    const printPageBtn = document.createElement('button');
    printPageBtn.innerHTML = '<i class="fas fa-print"></i> Печать страницы (бланк)';
    printPageBtn.style.background = '#f59e0b';
    printPageBtn.addEventListener('click', () => window.printRegistryWithLogo());
    document.querySelector('.btn-group').appendChild(printPageBtn);

    // Инициализация
    function init() {
        BranchManager.ensureDefaultBranch();
        currentBranchId = getCurrentBranch();
        loadBranchSelector();
        renderAudits();
        renderChecklists();
    }
    init();
})();
function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
